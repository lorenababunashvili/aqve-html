<!DOCTYPE html>
<html class="light" lang="ka">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>აქვე - თანხის გადარიცხვა</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link href="https://cdn.web-fonts.ge/fonts/bpg-phone-sans/css/bpg-phone-sans.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#009485",
                        "primary-bright": "#00C2AF",
                        "background-light": "#f8fafc",
                        "background-dark": "#0f2321",
                        "surface": "#ffffff",
                    },
                    fontFamily: {
                        "display": ["BPG Phone Sans", "sans-serif"],
                        "sans": ["BPG Phone Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "2xl": "1rem",
                        "3xl": "1.5rem",
                    },
                    boxShadow: {
                        "soft": "0 10px 40px -10px rgba(0,0,0,0.05)",
                    }
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'BPG Phone Sans', sans-serif;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body class="bg-gray-50 dark:bg-background-dark text-gray-900 dark:text-white min-h-screen flex flex-col">

    <!-- Header -->
    <div
        class="px-6 pt-12 pb-6 flex items-center justify-between z-10 sticky top-0 bg-gray-50/80 dark:bg-background-dark/80 backdrop-blur-md">
        <div class="flex items-center gap-4">
            <button onclick="history.back()"
                class="p-3 bg-white dark:bg-white/10 rounded-full shadow-sm hover:bg-gray-50 transition-colors">
                <span class="material-symbols-rounded text-gray-600 dark:text-gray-200">arrow_back</span>
            </button>
            <h1 class="text-xl font-bold text-gray-800 dark:text-white">გადარიცხვა</h1>
        </div>
        <div class="w-10"></div>
    </div>

    <!-- Scrollable Content -->
    <div class="flex-1 overflow-y-auto no-scrollbar pb-32 px-6">

        <form class="flex flex-col gap-6">

            <!-- Recipient Input -->
            <div>
                <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-2 ml-2">მიმღები</label>
                <div class="relative">
                    <input type="text"
                        class="w-full bg-white dark:bg-white/5 border-none rounded-xl py-4 pl-12 pr-4 font-bold text-gray-800 dark:text-white placeholder:text-gray-400 focus:ring-2 focus:ring-primary/20"
                        placeholder="პირადი ნომერი ან მობილური">
                    <span
                        class="material-symbols-rounded absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">person_search</span>
                </div>
            </div>

            <!-- Amount Input -->
            <div
                class="bg-white dark:bg-white/5 p-6 rounded-[2rem] shadow-sm flex flex-col items-center justify-center text-center">
                <label class="text-sm font-medium text-gray-400 mb-2">თანხა</label>
                <div class="flex items-baseline gap-1 relative">
                    <input type="number" value=""
                        class="bg-transparent border-none text-5xl font-bold text-gray-800 dark:text-white text-center w-40 p-0 focus:ring-0 placeholder:text-gray-200"
                        placeholder="0">
                    <span class="text-2xl font-bold text-gray-400 absolute -right-6 top-3">₾</span>
                </div>
            </div>

            <!-- Source Account/Card -->
            <div>
                <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-2 ml-2">საიდან</label>

                <div class="flex flex-col gap-3">
                    <!-- Balance (Selected) -->
                    <label class="cursor-pointer">
                        <input type="radio" name="source" class="peer sr-only" checked>
                        <div
                            class="bg-white dark:bg-white/5 p-4 rounded-[1.5rem] shadow-sm border-2 border-transparent peer-checked:border-primary peer-checked:bg-primary/5 flex items-center justify-between transition-all">
                            <div class="flex items-center gap-4">
                                <div
                                    class="w-12 h-12 bg-primary/10 rounded-full flex items-center justify-center text-primary">
                                    <span class="material-symbols-rounded">account_balance_wallet</span>
                                </div>
                                <div>
                                    <p class="font-bold text-gray-800 dark:text-white">ჩემი ბალანსი</p>
                                    <p class="text-sm text-gray-500 font-bold">24.50 ₾</p>
                                </div>
                            </div>
                            <div
                                class="w-6 h-6 rounded-full border-2 border-gray-300 peer-checked:border-primary peer-checked:bg-primary flex items-center justify-center">
                                <span
                                    class="material-symbols-rounded text-white text-[14px] opacity-0 peer-checked:opacity-100">check</span>
                            </div>
                        </div>
                    </label>

                    <!-- Visa Card -->
                    <label class="cursor-pointer">
                        <input type="radio" name="source" class="peer sr-only">
                        <div
                            class="bg-white dark:bg-white/5 p-4 rounded-[1.5rem] shadow-sm border-2 border-transparent peer-checked:border-primary peer-checked:bg-primary/5 flex items-center justify-between transition-all">
                            <div class="flex items-center gap-4">
                                <div class="w-12 h-8 bg-gray-100 rounded flex items-center justify-center p-1">
                                    <img src="https://upload.wikimedia.org/wikipedia/commons/5/5e/Visa_Inc._logo.svg"
                                        class="h-full object-contain">
                                </div>
                                <div>
                                    <p class="font-bold text-gray-800 dark:text-white">Visa</p>
                                    <p class="text-xs text-gray-400 font-mono">•••• 4242</p>
                                </div>
                            </div>
                            <div
                                class="w-6 h-6 rounded-full border-2 border-gray-300 peer-checked:border-primary peer-checked:bg-primary flex items-center justify-center">
                                <span
                                    class="material-symbols-rounded text-white text-[14px] opacity-0 peer-checked:opacity-100">check</span>
                            </div>
                        </div>
                    </label>
                </div>
            </div>

            <!-- Submit Button -->
            <a href="transfer-success.html"
                class="w-full bg-primary text-white font-bold py-4 rounded-[1.5rem] mt-4 shadow-lg shadow-primary/30 hover:bg-primary-dark transition-colors flex items-center justify-center gap-2 group">
                <span class="material-symbols-rounded">send</span>
                <span>გადარიცხვა</span>
            </a>

        </form>

    </div>

</body>

</html>
