<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AQUE - Transfer Funds</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: "#14d0a1", background: "#f8f9fb" },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body class="bg-background text-gray-900 font-sans min-h-[100dvh] flex flex-col relative pb-10">

    <!-- Header -->
    <header
        class="px-5 pt-10 pb-4 flex items-center justify-between z-20 sticky top-0 bg-background/90 backdrop-blur-md">
        <div class="flex items-center gap-3">
            <button onclick="history.back()" class="p-1 text-[#001736]">
                <span class="material-symbols-rounded text-2xl">arrow_back</span>
            </button>
            <h1 class="text-[22px] font-extrabold text-[#001736]">Transfer Funds</h1>
        </div>
        <div class="w-10"></div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto hide-scrollbar px-5 pt-2 pb-10">

        <form class="flex flex-col gap-6" action="transfer-success.html">

            <!-- Recipient Input -->
            <div class="flex flex-col gap-1.5">
                <label class="text-[12px] font-bold uppercase tracking-wider text-gray-400 ml-1">Recipient</label>
                <div class="relative group">
                    <input type="text"
                        class="w-full bg-white pl-12 pr-4 py-3.5 rounded-[20px] border border-gray-100 shadow-sm font-bold text-[15px] outline-none transition-all placeholder:font-normal placeholder:text-gray-400 focus:border-[#14d0a1]"
                        placeholder="Mobile Number or ID">
                    <div
                        class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400 group-focus-within:text-[#14d0a1] transition-colors">
                        <span class="material-symbols-rounded text-[20px]">person_search</span>
                    </div>
                </div>
            </div>

            <!-- Amount Input -->
            <div
                class="bg-white p-8 rounded-[28px] shadow-sm border border-gray-100 flex flex-col items-center justify-center text-center">
                <label class="text-[14px] font-bold text-gray-400 uppercase tracking-widest mb-2">Amount</label>
                <div class="flex items-center justify-center gap-1 relative">
                    <input type="number"
                        class="bg-transparent border-none text-[56px] font-extrabold text-[#001736] text-center w-36 p-0 focus:ring-0 placeholder:text-gray-200 outline-none"
                        placeholder="0">
                    <span class="text-[24px] font-bold text-gray-400 mt-2">₾</span>
                </div>
            </div>

            <!-- Source Account/Card -->
            <div class="flex flex-col gap-3 mt-2">
                <label class="text-[12px] font-bold uppercase tracking-wider text-gray-400 ml-1 mb-1">Transfer
                    From</label>

                <!-- Balance (Selected) -->
                <label class="cursor-pointer">
                    <input type="radio" name="source" class="peer sr-only" checked>
                    <div
                        class="bg-white p-4 rounded-[24px] shadow-sm border-[1.5px] border-transparent peer-checked:border-[#14d0a1] peer-checked:bg-[#e4fff6] flex items-center justify-between transition-all">
                        <div class="flex items-center gap-4">
                            <div
                                class="w-12 h-12 bg-[#14d0a1]/10 rounded-[14px] flex items-center justify-center text-[#14d0a1]">
                                <span class="material-symbols-rounded">account_balance_wallet</span>
                            </div>
                            <div class="flex flex-col">
                                <p class="font-bold text-[#001736] text-[15px]">My Balance</p>
                                <p class="text-[13px] text-gray-400 font-bold">24.50 ₾</p>
                            </div>
                        </div>
                        <div
                            class="w-6 h-6 rounded-full border-[2px] border-gray-200 peer-checked:border-[#14d0a1] peer-checked:bg-[#14d0a1] flex items-center justify-center transition-colors">
                            <span
                                class="material-symbols-rounded text-white text-[16px] opacity-0 peer-checked:opacity-100">check</span>
                        </div>
                    </div>
                </label>

                <!-- Visa Card -->
                <label class="cursor-pointer">
                    <input type="radio" name="source" class="peer sr-only">
                    <div
                        class="bg-white p-4 rounded-[24px] shadow-sm border-[1.5px] border-white hover:border-gray-200 peer-checked:border-[#14d0a1] peer-checked:bg-[#e4fff6] flex items-center justify-between transition-all">
                        <div class="flex items-center gap-4">
                            <div
                                class="w-12 h-8 bg-[#f4f5f8] rounded-lg flex items-center justify-center p-1 border border-gray-200 mt-1">
                                <img src="https://upload.wikimedia.org/wikipedia/commons/5/5e/Visa_Inc._logo.svg"
                                    class="h-full object-contain">
                            </div>
                            <div class="flex flex-col">
                                <p class="font-bold text-[#001736] text-[15px]">Visa</p>
                                <p class="text-[12px] text-gray-400 font-mono font-bold tracking-widest">•••• 4242</p>
                            </div>
                        </div>
                        <div
                            class="w-6 h-6 rounded-full border-[2px] border-gray-200 bg-gray-50 peer-checked:border-[#14d0a1] peer-checked:bg-[#14d0a1] flex items-center justify-center transition-colors">
                            <span
                                class="material-symbols-rounded text-white text-[16px] opacity-0 peer-checked:opacity-100">check</span>
                        </div>
                    </div>
                </label>
            </div>

            <!-- Submit Button -->
            <button type="submit"
                class="w-full bg-gradient-to-r from-[#17e3ae] to-[#8affda] text-[#003822] font-bold py-4 rounded-2xl shadow-[0_8px_16px_rgba(20,208,161,0.25)] active:scale-[0.98] transition-all flex items-center justify-center gap-2 text-[16px] mt-4 hover:opacity-90">
                <span class="material-symbols-rounded text-[20px]">send</span>
                <span>Send Money</span>
            </button>

        </form>

    </main>

</body>

</html>
