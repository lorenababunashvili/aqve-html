<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Time Extended Successfully</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: "#14d0a1", background: "#f8f9fb" },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        @keyframes check-scale {
            0% {
                transform: scale(0);
                opacity: 0;
            }

            50% {
                transform: scale(1.2);
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .animate-check {
            animation: check-scale 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* Rating Stars */
        .rating-star {
            color: #d1d5db;
            /* gray-300 */
            transition: color 0.2s ease, transform 0.2s ease;
            cursor: pointer;
        }

        .rating-star.active {
            color: #14d0a1;
            /* matching primary color */
            transform: scale(1.1);
        }
    </style>
</head>

<body
    class="bg-background text-gray-900 font-sans min-h-[100dvh] flex flex-col items-center justify-center p-6 relative overflow-hidden">

    <!-- Decorative Background Elements -->
    <div class="absolute inset-0 z-0 pointer-events-none">
        <div class="absolute top-[10%] right-[-10%] w-64 h-64 bg-[#14d0a1]/20 rounded-full blur-[60px]"></div>
        <div class="absolute bottom-[10%] left-[-10%] w-64 h-64 bg-[#14d0a1]/10 rounded-full blur-[60px]"></div>
    </div>

    <!-- Success Card -->
    <div
        class="bg-white rounded-[32px] p-8 shadow-sm border border-gray-100 text-center w-full max-w-sm relative z-10 flex flex-col items-center">

        <!-- Success Icon -->
        <div
            class="w-24 h-24 bg-[#e4fff6] rounded-full flex items-center justify-center mb-6 animate-check shadow-[0_8px_24px_rgba(20,208,161,0.25)] border-[4px] border-white">
            <span class="material-symbols-rounded text-[#14d0a1] text-[48px] font-bold">check</span>
        </div>

        <h1 class="text-[26px] font-extrabold text-[#001736] mb-3 tracking-tight leading-tight">Time<br>Extended!</h1>

        <p class="text-gray-500 text-[14px] font-medium leading-relaxed mb-6">
            You have successfully added<br>more time to your session.
        </p>

        <!-- Rating Section -->
        <div class="w-full mt-2 mb-6 flex flex-col items-center border border-gray-100 rounded-2xl p-4 bg-gray-50/50">
            <h3 class="text-gray-700 font-bold mb-2 text-[14px]">დაგვიტოვეთ თქვენი შეფასება</h3>
            <div class="flex gap-1.5" id="star-rating">
                <span class="material-symbols-rounded text-[28px] rating-star" data-value="1">star</span>
                <span class="material-symbols-rounded text-[28px] rating-star" data-value="2">star</span>
                <span class="material-symbols-rounded text-[28px] rating-star" data-value="3">star</span>
                <span class="material-symbols-rounded text-[28px] rating-star" data-value="4">star</span>
                <span class="material-symbols-rounded text-[28px] rating-star" data-value="5">star</span>
            </div>
            <p id="rating-text" class="text-[12px] text-gray-400 mt-1 font-medium min-h-[18px]"></p>
        </div>

        <!-- Actions -->
        <div class="flex flex-col gap-3 w-full">
            <a href="active-session.html"
                class="w-full bg-gradient-to-r from-[#14d0a1] to-[#2de0b6] text-white hover:opacity-90 font-bold py-4 rounded-2xl shadow-[0_8px_16px_rgba(20,208,161,0.25)] transition-all flex items-center justify-center gap-2 group active:scale-[0.98] text-[16px]">
                <span class="material-symbols-rounded">timer</span>
                <span>View Active Session</span>
            </a>

            <a href="home.html"
                class="w-full text-gray-400 font-bold py-2 rounded-2xl hover:text-gray-600 transition-colors flex items-center justify-center text-[14px] mt-2">
                Back to Home
            </a>
        </div>

    </div>

    <!-- Script for interactive rating -->
    <script>
        const stars = document.querySelectorAll('.rating-star');
        const ratingText = document.getElementById('rating-text');

        const ratingLabels = {
            1: "ძალიან ცუდი",
            2: "ცუდი",
            3: "საშუალო",
            4: "კარგი",
            5: "ძალიან კარგი"
        };

        let currentRating = 0;

        stars.forEach(star => {
            // Hover effects
            star.addEventListener('mouseenter', function () {
                const value = parseInt(this.getAttribute('data-value'));
                highlightStars(value);
            });

            star.addEventListener('mouseleave', function () {
                highlightStars(currentRating);
            });

            // Click effect
            star.addEventListener('click', function () {
                currentRating = parseInt(this.getAttribute('data-value'));
                highlightStars(currentRating);
                ratingText.textContent = ratingLabels[currentRating];
                ratingText.classList.add('text-[#14d0a1]');
                ratingText.classList.remove('text-gray-400');
            });
        });

        function highlightStars(value) {
            stars.forEach(s => {
                const starValue = parseInt(s.getAttribute('data-value'));
                if (starValue <= value) {
                    s.classList.add('active');
                    // Change to filled star icon
                    s.style.fontVariationSettings = "'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24";
                } else {
                    s.classList.remove('active');
                    // Change to outlined star icon
                    s.style.fontVariationSettings = "'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24";
                }
            });
        }
    </script>
</body>

</html>
