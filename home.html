<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Find Parking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#14d0a1",
                        surface: "#ffffff",
                        background: "#ffffff",
                        brand: {
                            teal: "#14d0a1",
                            dark: "#111827"
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        body {
            background-color: #ffffff;
        }

        /* Custom map grid pattern */
        .map-bg {
            background-color: #d1faef;
            background-image: linear-gradient(rgba(20, 208, 161, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(20, 208, 161, 0.1) 1px, transparent 1px);
            background-size: 80px 80px;
        }
    </style>
</head>

<body class="text-gray-900 font-sans min-h-[100dvh] flex flex-col relative pb-20">

    <!-- Top Section (White Background) -->
    <div class="bg-white px-5 pt-10 pb-5 z-20 relative shadow-sm">

        <!-- Header -->
        <div class="flex items-center justify-between mb-6">
            <h1 class="text-[24px] font-extrabold text-[#001736] tracking-tight">Find Parking</h1>
        </div>

        <!-- Vehicle Filters -->
        <div class="flex justify-between gap-3 mb-6">

            <!-- Car (Active) -->
            <button
                class="flex-1 aspect-[4/5] bg-gradient-to-b from-[#25e2b4] to-[#12c496] rounded-[20px] shadow-[0_8px_16px_rgba(20,208,161,0.3)] flex flex-col items-center justify-center gap-2 transform transition-transform active:scale-95">
                <span class="text-[32px] drop-shadow-md">🚗</span>
                <span class="text-white text-[13px] font-bold">Car</span>
            </button>

            <!-- Motorcycle -->
            <button
                class="flex-1 aspect-[4/5] bg-[#f5f6f8] rounded-[20px] flex flex-col items-center justify-center gap-2 hover:bg-gray-100 transition-colors">
                <span class="text-[32px]">🏍️</span>
                <span class="text-gray-500 text-[12px] font-semibold">Motorcycle</span>
            </button>

            <!-- Truck -->
            <button
                class="flex-1 aspect-[4/5] bg-[#f5f6f8] rounded-[20px] flex flex-col items-center justify-center gap-2 hover:bg-gray-100 transition-colors">
                <span class="text-[32px]">🚚</span>
                <span class="text-gray-500 text-[12px] font-semibold">Truck</span>
            </button>

            <!-- Bus -->
            <button
                class="flex-1 aspect-[4/5] bg-[#f5f6f8] rounded-[20px] flex flex-col items-center justify-center gap-2 hover:bg-gray-100 transition-colors">
                <span class="text-[32px]">🚌</span>
                <span class="text-gray-500 text-[12px] font-semibold">Bus</span>
            </button>

        </div>

        <!-- Search Bar -->
        <div class="w-full bg-white border-[1.5px] border-gray-200 rounded-[16px] px-4 py-3.5 flex items-center gap-3">
            <span class="material-symbols-rounded text-gray-400 text-[22px]">search</span>
            <input type="text" placeholder="Where do you want to park?"
                class="flex-1 bg-transparent border-none focus:outline-none text-[15px] text-gray-800 placeholder-gray-400 font-medium" />
            <div class="w-px h-5 bg-gray-200"></div>
            <button class="text-gray-400 hover:text-gray-600 transition-colors">
                <span class="material-symbols-rounded text-[22px]">mic</span>
            </button>
        </div>
    </div>

    <!-- Map Section -->
    <div class="flex-1 map-bg relative overflow-hidden flex flex-col items-center justify-center">

        <!-- Map Controls (Top Left) -->
        <div class="absolute top-4 left-5 flex gap-2 z-10">
            <button
                class="bg-white px-4 py-2 rounded-[12px] shadow-sm flex items-center gap-1.5 border border-gray-100">
                <span class="material-symbols-rounded text-[18px] text-gray-600">near_me</span>
                <span class="text-[#001736] text-[13px] font-bold">Nearby</span>
            </button>
            <button class="bg-[#14d0a1] text-white px-4 py-2 rounded-[12px] shadow-sm font-bold text-[13px]">
                View List
            </button>
        </div>

        <!-- Abstract User Location Marker -->
        <!-- Placed somewhat centrally just above the bottom sheet -->
        <div class="absolute bottom-[35%] left-1/2 -translate-x-1/2 flex items-center justify-center">

            <!-- Radiating rings (simulating pulse) -->
            <div class="absolute w-32 h-32 rounded-full border border-[#14d0a1] opacity-20"></div>
            <div class="absolute w-24 h-24 rounded-full border-2 border-[#14d0a1] opacity-40"></div>

            <!-- Inner marker circles based on photo -->
            <div class="relative w-16 h-16">
                <!-- Outer Teal Arc -->
                <svg viewBox="0 0 100 100" class="absolute inset-0 w-full h-full -rotate-45">
                    <circle cx="50" cy="50" r="40" fill="none" stroke="#14d0a1" stroke-width="15"
                        stroke-dasharray="180 250" stroke-linecap="round" />
                </svg>
                <!-- Inner Dark Arc -->
                <svg viewBox="0 0 100 100" class="absolute inset-0 w-full h-full rotate-135">
                    <circle cx="50" cy="50" r="40" fill="none" stroke="#003541" stroke-width="15"
                        stroke-dasharray="100 250" stroke-linecap="round" />
                </svg>

                <!-- Center White dot -->
                <div
                    class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-6 h-6 bg-white rounded-full shadow-sm">
                </div>

                <!-- Notification Badge -->
                <div
                    class="absolute top-0 right-0 w-6 h-6 bg-red-500 rounded-full border-2 border-white flex items-center justify-center text-white text-[10px] font-bold shadow-sm -mt-2 -mr-2">
                    5
                </div>
            </div>

        </div>

        <!-- Faint Green Circle Decoration -->
        <div class="absolute top-[20%] left-[20%] w-16 h-16 bg-[#14d0a1] opacity-10 rounded-full blur-sm"></div>

    </div>

    <!-- Bottom Sheet (Nearby Parking) -->
    <div class="absolute bottom-20 left-4 right-4 z-30">
        <div
            class="bg-white rounded-[24px] shadow-[0_10px_40px_rgba(0,0,0,0.08)] p-5 border border-gray-100 flex flex-col gap-4">

            <div class="flex justify-between items-center mb-1">
                <h2 class="text-[17px] font-bold text-[#001736]">Nearby Parking</h2>
                <button class="text-[#14d0a1] text-[13px] font-bold">See All</button>
            </div>

            <div class="flex flex-col gap-3">
                <!-- Location 1 -->
                <div class="bg-[#fcfdff] border border-gray-100 rounded-[20px] p-4 flex items-center gap-4 hover:bg-gray-50 transition-colors cursor-pointer"
                    onclick="window.location.href='select-slot.html'">
                    <div
                        class="w-12 h-12 bg-[#c9f5e8] rounded-[14px] flex items-center justify-center text-[#0b8e6d] shrink-0">
                        <span class="material-symbols-rounded">location_on</span>
                    </div>
                    <div class="flex-1 min-w-0">
                        <h3 class="font-bold text-[15px] text-[#001736] tracking-tight">Freedom Square Parking</h3>
                        <p class="text-[12px] text-gray-500 font-medium mt-0.5">0.3 km away</p>
                    </div>
                    <div class="flex flex-col items-end shrink-0">
                        <span class="text-[#14d0a1] font-bold tracking-wide">₾8.00<span
                                class="text-[12px] font-bold">/hr</span></span>
                        <span class="text-[11px] text-gray-500 font-medium mt-0.5 tracking-tight">5 spots</span>
                    </div>
                </div>

                <!-- Location 2 -->
                <div class="bg-[#fcfdff] border border-gray-100 rounded-[20px] p-4 flex items-center gap-4 hover:bg-gray-50 transition-colors cursor-pointer"
                    onclick="window.location.href='select-slot.html'">
                    <div
                        class="w-12 h-12 bg-[#c9f5e8] rounded-[14px] flex items-center justify-center text-[#0b8e6d] shrink-0">
                        <span class="material-symbols-rounded">location_on</span>
                    </div>
                    <div class="flex-1 min-w-0">
                        <h3 class="font-bold text-[15px] text-[#001736] tracking-tight">Rustaveli Avenue Garage</h3>
                        <p class="text-[12px] text-gray-500 font-medium mt-0.5">0.5 km away</p>
                    </div>
                    <div class="flex flex-col items-end shrink-0">
                        <span class="text-[#14d0a1] font-bold tracking-wide">₾6.00<span
                                class="text-[12px] font-bold">/hr</span></span>
                        <span class="text-[11px] text-gray-500 font-medium mt-0.5 tracking-tight">12 spots</span>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav
        class="fixed bottom-0 left-0 w-full bg-white border-t border-gray-100 flex justify-between items-center z-40 pb-safe pt-2 px-1">
        <a href="home.html"
            class="flex flex-col items-center flex-1 py-1 text-[#21d0a1] border-[2.5px] border-[#21d0a1] rounded-xl mx-2 shadow-sm bg-gray-50">
            <span class="material-symbols-rounded text-[28px]">home</span>
            <span class="text-[10px] mt-0.5 font-bold text-[#21d0a1]">Home</span>
        </a>
        <a href="select-slot.html" class="flex flex-col items-center flex-1 py-2 text-gray-400">
            <span class="material-symbols-rounded text-[28px]">local_activity</span>
            <span class="text-[10px] mt-1 font-medium">Parking</span>
        </a>
        <a href="history.html" class="flex flex-col items-center flex-1 py-2 text-gray-400">
            <span class="material-symbols-rounded text-[28px]">schedule</span>
            <span class="text-[10px] mt-1 font-medium">Bookings</span>
        </a>
        <a href="vehicles.html" class="flex flex-col items-center flex-1 py-2 text-gray-400">
            <span class="material-symbols-rounded text-[28px]">directions_car</span>
            <span class="text-[10px] mt-1 font-medium">Vehicles</span>
        </a>
        <a href="profile.html" class="flex flex-col items-center flex-1 py-2 text-gray-400">
            <span class="material-symbols-rounded text-[28px]">person</span>
            <span class="text-[10px] mt-1 font-medium">Profile</span>
        </a>
    </nav>
</body>

</html>
