<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AQUE - OTP Verification</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#14d0a1",
                        background: "#f8f9fb",
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-[#f8f9fb] text-gray-900 font-sans min-h-[100dvh] flex flex-col relative overflow-hidden">

    <!-- Header Area -->
    <div class="pt-12 pb-4 px-6 flex justify-between items-center z-20 bg-transparent">
        <div class="text-gray-900 text-[15px] font-medium tracking-wide">9:41</div>
        <div class="flex items-center gap-1.5 opacity-90 text-gray-900">
            <span class="material-symbols-rounded text-[16px]">signal_cellular_alt</span>
            <span class="material-symbols-rounded text-[16px]">wifi</span>
            <span class="material-symbols-rounded text-[18px]">battery_full</span>
        </div>
    </div>

    <!-- Top Navigation -->
    <div class="px-6 flex items-center justify-between mb-8 z-20 relative">
        <button onclick="window.location.href='register.html'"
            class="w-10 h-10 bg-white rounded-full flex items-center justify-center shadow-sm hover:bg-gray-50 active:scale-95 transition-all text-gray-900">
            <span class="material-symbols-rounded text-[20px]">arrow_back</span>
        </button>

        <!-- Security Header -->
        <div class="flex items-center gap-2 absolute left-1/2 -translate-x-1/2">
            <div class="w-8 h-8 rounded-full bg-[#14d0a1]/10 flex items-center justify-center">
                <span class="material-symbols-rounded text-[#14d0a1] text-[18px]">lock</span>
            </div>
            <span class="text-[16px] font-semibold text-gray-900 tracking-tight">Verification</span>
        </div>
        <div class="w-10"></div> <!-- Spacer for centering -->
    </div>

    <!-- Main Content Area -->
    <div class="flex-1 flex flex-col px-6 z-20">

        <!-- Titles -->
        <div class="text-center mb-10">
            <h1 class="text-[26px] font-bold text-gray-900 mb-3 tracking-tight">OTP Code Verification</h1>
            <p class="text-gray-500 text-[15px] leading-relaxed mx-auto max-w-[280px]">
                We have sent an OTP code to your email fajar***@gmail.com.
            </p>
        </div>

        <!-- Form Elements (OTP Inputs) -->
        <div class="w-full flex justify-center gap-3">

            <!-- Filled Input 1 -->
            <input type="text" value="1" readonly
                class="w-12 h-12 bg-white text-center rounded-full border border-gray-200 text-gray-900 font-bold text-[18px] shadow-sm focus:outline-none">

            <!-- Filled Input 2 -->
            <input type="text" value="2" readonly
                class="w-12 h-12 bg-white text-center rounded-full border border-gray-200 text-gray-900 font-bold text-[18px] shadow-sm focus:outline-none">

            <!-- Active Input 3 -->
            <input type="text" value="3" readonly
                class="w-12 h-12 bg-white text-center rounded-full border border-gray-200 text-gray-900 font-bold text-[18px] shadow-sm ring-4 ring-[#14d0a1]/20 outline-none">

            <!-- Empty Input 4 -->
            <input type="text" placeholder="-" readonly
                class="w-12 h-12 bg-white text-center rounded-full border border-gray-200 text-gray-400 font-medium text-[18px] shadow-sm focus:outline-none placeholder:text-gray-400">

            <!-- Empty Input 5 -->
            <input type="text" placeholder="-" readonly
                class="w-12 h-12 bg-white text-center rounded-full border border-gray-200 text-gray-400 font-medium text-[18px] shadow-sm focus:outline-none placeholder:text-gray-400">

            <!-- Empty Input 6 -->
            <input type="text" placeholder="-" readonly
                class="w-12 h-12 bg-white text-center rounded-full border border-gray-200 text-gray-400 font-medium text-[18px] shadow-sm focus:outline-none placeholder:text-gray-400">

        </div>

        <!-- Confirm Button -->
        <div class="pb-10 pt-8 w-full mt-auto">
            <button onclick="window.location.href='login.html'"
                class="w-full bg-[#14d0a1] text-white font-semibold py-4 rounded-[20px] shadow-[0_8px_20px_rgba(20,208,161,0.25)] active:scale-[0.98] transition-all flex items-center justify-center text-[16px] hover:bg-[#12b88e] mt-2">
                Continue to Login
            </button>
        </div>
    </div>
</body>

</html>
