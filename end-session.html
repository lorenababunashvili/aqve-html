<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>End Session Early</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#14d0a1",
                        background: "#f4f7f8",
                        textNavy: "#001e36",
                        textGray: "#8a96a3"
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-background text-gray-900 font-sans min-h-[100dvh] flex flex-col relative overflow-hidden pb-8 px-5">

    <!-- Decorative Gradients -->
    <div class="absolute inset-0 z-0 pointer-events-none">
        <div
            class="absolute top-0 right-0 w-[400px] h-[400px] bg-[#ff4b6a]/5 rounded-full blur-[80px] -translate-y-1/2 translate-x-1/3">
        </div>
        <div
            class="absolute bottom-0 left-0 w-[300px] h-[300px] bg-[#ff4b6a]/5 rounded-full blur-[60px] translate-y-1/3 -translate-x-1/3">
        </div>
    </div>

    <!-- Header -->
    <header class="pt-12 pb-6 flex items-center justify-between z-20 relative">
        <button onclick="history.back()" class="w-8 h-8 flex items-center justify-center text-[#001e36]">
            <span class="material-symbols-rounded text-[24px]">close</span>
        </button>
    </header>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col relative z-10 justify-center pb-20">

        <!-- Card Container -->
        <div
            class="bg-white rounded-[32px] p-8 shadow-[0_8px_30px_rgba(0,0,0,0.04)] relative overflow-hidden flex flex-col items-center border border-gray-50">

            <!-- Warning Icon -->
            <div class="w-20 h-20 bg-[#fff5f5] rounded-full flex items-center justify-center mb-6 relative">
                <!-- Subtle glow -->
                <div class="absolute inset-0 bg-[#ff4b6a]/20 rounded-full blur-lg z-0"></div>
                <span class="material-symbols-rounded text-[40px] text-[#ff4b6a] relative z-10">error</span>
            </div>

            <!-- Content -->
            <h2 class="text-[24px] font-black text-textNavy tracking-tight leading-tight mb-3 text-center">
                End Session Early?
            </h2>
            <p class="text-[15px] text-textGray font-medium leading-relaxed text-center mb-8 px-2">
                Are you sure you want to end your parking session right now?
            </p>

            <!-- Action Buttons -->
            <div class="flex flex-col gap-3 w-full">
                <a href="home.html"
                    class="w-full bg-[#ff4b6a] text-white font-bold text-[16px] py-4 rounded-[16px] shadow-[0_8px_20px_rgba(255,75,106,0.25)] flex items-center justify-center hover:opacity-90 transition-opacity">
                    Yes, End Session
                </a>

                <button onclick="history.back()"
                    class="w-full bg-[#f8f9fb] text-textNavy font-bold text-[15px] py-4 rounded-[16px] hover:bg-gray-100 transition-colors border border-gray-100">
                    No, Keep Session
                </button>
            </div>
        </div>

    </main>

</body>

</html>
