<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AQUE - Password Updated Successful</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#14d0a1",
                        background: "#f8f9fb",
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-[#f8f9fb] text-gray-900 font-sans min-h-[100dvh] flex flex-col relative overflow-hidden">

    <!-- Background Content that is blurred -->
    <div class="absolute inset-0 z-0 flex flex-col pointer-events-none">

        <!-- Header Area -->
        <div class="pt-12 pb-4 px-6 flex justify-between items-center z-20 bg-transparent">
            <div class="text-gray-900 text-[15px] font-medium tracking-wide">9:41</div>
            <div class="flex items-center gap-1.5 opacity-90 text-gray-900">
                <span class="material-symbols-rounded text-[16px]">signal_cellular_alt</span>
                <span class="material-symbols-rounded text-[16px]">wifi</span>
                <span class="material-symbols-rounded text-[18px]">battery_full</span>
            </div>
        </div>

        <!-- Top Navigation -->
        <div class="px-6 flex items-center justify-between mb-8 z-20 relative">
            <div class="w-10 h-10 bg-white rounded-full flex items-center justify-center shadow-sm">
                <span class="material-symbols-rounded text-[20px]">arrow_back</span>
            </div>

            <div class="flex items-center gap-2 absolute left-1/2 -translate-x-1/2">
                <svg width="24" height="24" viewBox="0 0 100 100" fill="none" class="text-gray-900 drop-shadow-sm">
                    <path d="M20 30 h 30 a 10 10 0 0 1 10 10 v 10 a 10 10 0 0 0 10 10 h 15" stroke="currentColor"
                        stroke-width="8" stroke-dasharray="8 6" stroke-linecap="round" fill="none" />
                    <path d="M70 50 l 15 0 c 5 0 10 5 10 10 v 15" stroke="currentColor" stroke-width="8" fill="none" />
                    <rect x="70" y="65" width="25" height="15" rx="4" stroke="currentColor" stroke-width="8"
                        fill="none" />
                    <circle cx="75" cy="80" r="4" fill="currentColor" />
                    <circle cx="90" cy="80" r="4" fill="currentColor" />
                </svg>
                <span class="text-[18px] font-bold text-gray-900 tracking-wide">AQVE</span>
            </div>
            <div class="w-10"></div>
        </div>

        <div class="text-center px-6">
            <h1 class="text-[26px] font-bold text-gray-900 mb-3">Create New Password</h1>
            <p class="text-gray-500 text-[15px] mb-8">Create your new password</p>
            <div class="space-y-6 opacity-80">
                <div class="h-14 w-full bg-white rounded-2xl border border-gray-200"></div>
                <div class="h-14 w-full bg-white rounded-2xl border border-gray-200"></div>
            </div>
        </div>
    </div>

    <!-- Black/Gray Overlay Backdrop -->
    <div class="absolute inset-0 bg-black/40 backdrop-blur-sm z-30 transition-opacity"></div>

    <!-- Modal Container -->
    <div class="absolute inset-0 z-40 flex items-center justify-center p-6">
        <!-- White Popup -->
        <div
            class="bg-white rounded-[32px] w-full max-w-sm p-8 flex flex-col items-center text-center shadow-2xl animate-[fadeIn_0.3s_ease-out]">

            <!-- Success Icon with Particles -->
            <div class="relative w-32 h-32 mb-6 flex items-center justify-center">
                <!-- Outer Particles (Animated) -->
                <div class="absolute inset-0 animate-pulse">
                    <div class="absolute top-2 left-6 w-2 h-2 rounded-full bg-[#14d0a1]/30"></div>
                    <div class="absolute top-4 right-8 w-4 h-4 rounded-full bg-[#14d0a1]/40"></div>
                    <div class="absolute bottom-6 left-8 w-3 h-3 rounded-full bg-[#14d0a1]/20"></div>
                    <div class="absolute bottom-8 right-6 w-2 h-2 rounded-full bg-[#14d0a1]/30"></div>
                    <div class="absolute top-1/2 left-2 w-1.5 h-1.5 rounded-full bg-[#14d0a1]/40"></div>
                    <div class="absolute bottom-2 right-12 w-2 h-2 rounded-full bg-[#14d0a1]/50"></div>
                </div>
                <!-- Main Circle -->
                <div
                    class="w-24 h-24 bg-[#14d0a1] rounded-full flex items-center justify-center z-10 shadow-[0_8px_24px_rgba(20,208,161,0.4)]">
                    <span class="material-symbols-rounded text-white text-[48px] font-bold">check_circle</span>
                </div>
            </div>

            <h2 class="text-[28px] font-bold text-gray-900 mb-3 tracking-tight">Successful</h2>
            <p class="text-gray-500 text-[15px] leading-relaxed mb-8 px-2 font-medium">
                Your password has been successfully updated to a new password
            </p>

            <button onclick="window.location.href='home.html'"
                class="w-full bg-[#14d0a1] text-white font-semibold py-4 rounded-[20px] shadow-[0_8px_20px_rgba(20,208,161,0.25)] active:scale-[0.98] transition-all text-[16px] hover:bg-[#12b88e]">
                Continue to Home
            </button>
        </div>
    </div>

</body>

</html>
