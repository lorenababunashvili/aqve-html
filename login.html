<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AQUE - Sign In</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#14d0a1",
                        background: "#0b5fd6", // A blue background placeholder if needed, though they are in a white card. The user's image shows a blue background top. Let's make the body blue and the card white.
                        card: "#ffffff"
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-[#0b5cff] text-gray-900 font-sans min-h-[100dvh] flex flex-col relative overflow-hidden">

    <!-- Header Area (Blue Background) -->
    <div class="pt-12 pb-6 px-6 flex justify-between items-center z-10">
        <div class="text-white text-[15px] font-medium tracking-wide">9:41</div>
        <div class="flex items-center gap-1.5 opacity-90">
            <span class="material-symbols-rounded text-white text-[16px]">signal_cellular_alt</span>
            <span class="material-symbols-rounded text-white text-[16px]">wifi</span>
            <span class="material-symbols-rounded text-white text-[18px]">battery_full</span>
        </div>
    </div>

    <!-- White Card Container -->
    <div
        class="flex-1 bg-white rounded-t-[32px] mt-4 px-6 pt-8 pb-10 flex flex-col shadow-[0_-10px_40px_rgba(0,0,0,0.1)] z-20 overflow-y-auto">

        <!-- Logo -->
        <div class="flex items-center gap-2 mb-6">
            <svg width="24" height="24" viewBox="0 0 100 100" fill="none" class="text-gray-900 drop-shadow-sm">
                <path d="M20 30 h 30 a 10 10 0 0 1 10 10 v 10 a 10 10 0 0 0 10 10 h 15" stroke="currentColor"
                    stroke-width="8" stroke-dasharray="8 6" stroke-linecap="round" fill="none" />
                <path d="M70 50 l 15 0 c 5 0 10 5 10 10 v 15" stroke="currentColor" stroke-width="8" fill="none" />
                <rect x="70" y="65" width="25" height="15" rx="4" stroke="currentColor" stroke-width="8" fill="none" />
                <circle cx="75" cy="80" r="4" fill="currentColor" />
                <circle cx="90" cy="80" r="4" fill="currentColor" />
            </svg>
            <span class="text-[18px] font-bold text-gray-900 tracking-wide">AQVE</span>
        </div>

        <!-- Greeting -->
        <h1 class="text-[28px] font-bold text-gray-900 mb-6 tracking-tight">Hi, Welcome Back</h1>

        <!-- Toggle Tabs -->
        <div class="bg-gray-50 p-1 rounded-full flex mb-8 border border-gray-100 shadow-inner">
            <button class="flex-1 py-3 text-[#14d0a1] font-semibold text-[15px] bg-white rounded-full shadow-sm">
                Sign In
            </button>
            <button onclick="window.location.href='register.html'"
                class="flex-1 py-3 text-gray-500 font-medium text-[15px] hover:text-gray-700 transition-colors rounded-full">
                Register
            </button>
        </div>

        <!-- Form Elements -->
        <div class="w-full flex flex-col gap-5">
            <!-- Email -->
            <div class="flex flex-col gap-2">
                <label class="text-[14px] font-medium text-gray-700 ml-1">Email</label>
                <div class="relative group">
                    <div
                        class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400 group-focus-within:text-[#14d0a1] transition-colors">
                        <span class="material-symbols-rounded text-[22px]">mail</span>
                    </div>
                    <input type="email"
                        class="w-full bg-white pl-[3rem] pr-4 py-3.5 rounded-2xl border border-gray-200 focus:border-[#14d0a1] focus:ring-4 focus:ring-[#14d0a1]/10 text-gray-900 text-[15px] outline-none transition-all placeholder:text-gray-400"
                        placeholder="Input your email">
                </div>
            </div>

            <!-- Password -->
            <div class="flex flex-col gap-2">
                <label class="text-[14px] font-medium text-gray-700 ml-1">Password</label>
                <div class="relative group">
                    <div
                        class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400 group-focus-within:text-[#14d0a1] transition-colors">
                        <span class="material-symbols-rounded text-[22px]">lock</span>
                    </div>
                    <input type="password"
                        class="w-full bg-white pl-[3rem] pr-12 py-3.5 rounded-2xl border border-gray-200 focus:border-[#14d0a1] focus:ring-4 focus:ring-[#14d0a1]/10 text-gray-900 text-[15px] outline-none transition-all placeholder:text-gray-400"
                        placeholder="Input your password">
                    <div
                        class="absolute inset-y-0 right-0 pr-4 flex items-center cursor-pointer text-gray-400 hover:text-gray-600 transition-colors">
                        <span class="material-symbols-rounded text-[22px]">visibility_off</span>
                    </div>
                </div>
            </div>

            <!-- Remember me & Forgot Password -->
            <div class="flex items-center justify-between mt-1 mb-2 px-1">
                <label class="flex items-center gap-2 cursor-pointer group">
                    <div
                        class="w-5 h-5 rounded border border-gray-300 flex items-center justify-center group-hover:border-[#14d0a1] transition-colors bg-white">
                        <span
                            class="material-symbols-rounded text-[16px] text-white opacity-0 transition-opacity">check</span>
                    </div>
                    <span class="text-[14px] text-gray-500 font-medium">Remember me</span>
                </label>
                <a href="#" class="text-[14px] text-[#14d0a1] font-semibold hover:underline">Forgot Password?</a>
            </div>

            <!-- Login Button -->
            <button onclick="window.location.href='home.html'"
                class="w-full bg-[#14d0a1] text-white font-semibold py-4 rounded-[20px] shadow-[0_8px_20px_rgba(20,208,161,0.25)] active:scale-[0.98] transition-all flex items-center justify-center text-[16px] hover:bg-[#12b88e]">
                Login
            </button>

            <!-- Divider -->
            <div class="relative py-4 mt-2">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-gray-200"></div>
                </div>
                <div class="relative flex justify-center mt-[-0.6rem]">
                    <span class="px-4 bg-white text-gray-400 text-[13px] font-medium">Or Sign in with</span>
                </div>
            </div>

            <!-- Social Logins -->
            <div class="grid grid-cols-2 gap-4">
                <button
                    class="flex items-center justify-center py-3.5 rounded-[20px] border border-gray-200 shadow-sm hover:bg-gray-50 transition-colors active:scale-[0.98] bg-white">
                    <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-6 h-6" alt="Google">
                </button>
                <button
                    class="flex items-center justify-center py-3.5 rounded-[20px] border border-gray-200 shadow-sm hover:bg-gray-50 transition-colors active:scale-[0.98] bg-white text-[#000000]">
                    <svg class="w-6 h-6" viewBox="0 0 24 24" fill="currentColor">
                        <path
                            d="M16.365 21.43c-1.3-.87-2.61-1.39-3.95-1.39-1.42 0-2.85.58-4.14 1.4-1.93 1.25-3.3 1.28-4.32.22-4.08-4.22-4.73-10.74-1.32-15.02 1.63-2.03 3.84-3.23 6.16-3.26 1.34-.02 2.76.6 4.04 1.45 1.15.76 2.2 1.14 3.16 1.14 1.11 0 2.23-.42 3.32-1.25 1.76-1.34 3.63-1.63 5.4-.73-3.14 2-4.47 5.1-3.23 8.35 1.05 2.75 3.35 4.3 6.07 4.54-1.12 3.48-3.32 6.55-6.57 8.52-1.35.8-2.67 1.24-3.9 1.24-.24 0-.48-.02-.72-.05zM15.42 5.03c.12-2.14-1.05-4.13-2.84-5.03-.6-.3-1.32-.47-2.06-.47-1.14 0-2.28.53-3.08 1.48-.96 1.12-1.32 2.62-1.07 4.05.08.45.28.89.57 1.28.85 1.18 2.28 1.83 3.76 1.83.65 0 1.32-.15 1.95-.45 1.36-.65 2.18-2 2.37-3.48-.01.1 0 .22 0 .32z" />
                    </svg>
                </button>
            </div>
            <div class="pb-6"></div>
        </div>
    </div>
</body>

</html>
