<!DOCTYPE html>
<html class="light" lang="ka">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>აქვე - წარმატებული გადახდა</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link href="https://cdn.web-fonts.ge/fonts/bpg-phone-sans/css/bpg-phone-sans.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#009485",
                        "primary-bright": "#00C2AF",
                        "background-light": "#f8fafc",
                        "background-dark": "#0f2321",
                        "surface": "#ffffff",
                    },
                    fontFamily: {
                        "display": ["BPG Phone Sans", "sans-serif"],
                        "sans": ["BPG Phone Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "2xl": "1rem",
                        "3xl": "1.5rem",
                    },
                    boxShadow: {
                        "soft": "0 10px 40px -10px rgba(0,0,0,0.05)",
                    }
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'BPG Phone Sans', sans-serif;
        }

        @keyframes scaleIn {
            0% {
                transform: scale(0);
                opacity: 0;
            }

            60% {
                transform: scale(1.1);
                opacity: 1;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .animate-scale-in {
            animation: scaleIn 0.5s ease-out forwards;
        }

        @keyframes checkmark {
            0% {
                stroke-dashoffset: 50;
            }

            100% {
                stroke-dashoffset: 0;
            }
        }

        .checkmark-path {
            stroke-dasharray: 50;
            stroke-dashoffset: 50;
            animation: checkmark 0.5s ease-out 0.4s forwards;
        }
    </style>
</head>

<body
    class="bg-gray-50 dark:bg-background-dark text-gray-900 dark:text-white min-h-screen flex flex-col items-center justify-center px-6 relative overflow-hidden">

    <!-- Background Decoration -->
    <div class="absolute inset-0 z-0 opacity-10">
        <div class="absolute top-1/4 left-1/4 w-64 h-64 bg-primary rounded-full blur-3xl"></div>
        <div class="absolute bottom-1/4 right-1/4 w-64 h-64 bg-blue-500 rounded-full blur-3xl"></div>
    </div>

    <div class="relative z-10 flex flex-col items-center text-center w-full max-w-md">

        <!-- Success Icon -->
        <div
            class="w-24 h-24 bg-green-100 dark:bg-green-900/30 rounded-full flex items-center justify-center mb-8 animate-scale-in shadow-lg shadow-green-500/20">
            <svg class="w-12 h-12 text-green-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                stroke-width="4">
                <path class="checkmark-path" stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
            </svg>
        </div>

        <h1 class="text-2xl font-extrabold text-gray-900 dark:text-white mb-2">გადახდა წარმატებულია!</h1>
        <p class="text-gray-500 dark:text-gray-400 mb-8 max-w-xs">
            თქვენი ბალანსი წარმატებით შეივსო 10.00 ₾-ით.
        </p>

        <!-- Receipt Card Preview -->
        <div
            class="w-full bg-white dark:bg-white/5 rounded-[2rem] p-6 shadow-soft border border-gray-100 dark:border-white/5 mb-8">
            <div class="flex justify-between items-center mb-4 border-b border-gray-100 dark:border-white/5 pb-4">
                <span class="text-gray-500 dark:text-gray-400 text-sm">ტრანზაქცია</span>
                <span class="font-bold text-gray-800 dark:text-white font-mono">#TRX-8829</span>
            </div>
            <div class="flex justify-between items-center mb-2">
                <span class="text-gray-500 dark:text-gray-400 text-sm">თარიღი</span>
                <span class="font-bold text-gray-800 dark:text-white text-sm">14 თებ, 18:30</span>
            </div>
            <div class="flex justify-between items-center mb-2">
                <span class="text-gray-500 dark:text-gray-400 text-sm">ბარათი</span>
                <span class="font-bold text-gray-800 dark:text-white text-sm">Visa •••• 4242</span>
            </div>
            <div class="flex justify-between items-center pt-2">
                <span class="text-gray-500 dark:text-gray-400 text-sm">ჯამი</span>
                <span class="font-extrabold text-green-600 text-lg">+10.00 ₾</span>
            </div>
        </div>

        <!-- Buttons -->
        <div class="flex flex-col gap-3 w-full">
            <a href="wallet.html"
                class="w-full bg-primary text-white font-bold py-4 rounded-[1.5rem] shadow-lg shadow-primary/30 hover:bg-primary-dark transition-all flex items-center justify-center gap-2">
                საფულეში დაბრუნება
            </a>
            <a href="home.html"
                class="w-full bg-transparent text-gray-500 dark:text-gray-400 font-bold py-4 rounded-[1.5rem] hover:bg-gray-100 dark:hover:bg-white/5 transition-all flex items-center justify-center gap-2">
                მთავარი
            </a>
        </div>

    </div>

</body>

</html>
