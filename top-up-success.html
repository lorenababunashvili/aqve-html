<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AQUE - Top Up Successful</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: "#14d0a1", background: "#f8f9fb" },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        @keyframes scaleIn {
            0% {
                transform: scale(0);
                opacity: 0;
            }

            60% {
                transform: scale(1.1);
                opacity: 1;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .animate-scale-in {
            animation: scaleIn 0.5s ease-out forwards;
        }

        @keyframes checkmark {
            0% {
                stroke-dashoffset: 50;
            }

            100% {
                stroke-dashoffset: 0;
            }
        }

        .checkmark-path {
            stroke-dasharray: 50;
            stroke-dashoffset: 50;
            animation: checkmark 0.5s ease-out 0.4s forwards;
        }
    </style>
</head>

<body
    class="bg-background text-gray-900 font-sans min-h-[100dvh] flex flex-col items-center justify-center px-6 relative overflow-hidden">

    <!-- Background Decorations -->
    <div class="absolute inset-0 z-0 pointer-events-none">
        <div class="absolute top-[10%] right-[-10%] w-64 h-64 bg-[#14d0a1]/20 rounded-full blur-[60px]"></div>
        <div class="absolute bottom-[10%] left-[-10%] w-64 h-64 bg-[#14d0a1]/10 rounded-full blur-[60px]"></div>
    </div>

    <div class="relative z-10 flex flex-col items-center text-center w-full max-w-md">

        <!-- Success Icon -->
        <div
            class="w-24 h-24 bg-[#e4fff6] rounded-full flex items-center justify-center mb-6 animate-scale-in shadow-[0_8px_24px_rgba(20,208,161,0.25)] border-[4px] border-white">
            <svg class="w-12 h-12 text-[#14d0a1]" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                stroke-width="4">
                <path class="checkmark-path" stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
            </svg>
        </div>

        <h1 class="text-[26px] font-extrabold text-[#001736] mb-2 tracking-tight">Top Up Successful!</h1>
        <p class="text-gray-500 font-medium mb-8 max-w-xs text-[15px]">
            Your balance has been successfully topped up with 10.00 ₾.
        </p>

        <!-- Receipt Card Preview -->
        <div class="w-full bg-white rounded-[24px] p-6 shadow-sm border border-gray-100 mb-8 relative">

            <!-- Perforated edges effect (CSS styling) -->
            <div class="absolute -left-3 top-1/2 -translate-y-1/2 w-6 h-6 bg-background rounded-full"></div>
            <div class="absolute -right-3 top-1/2 -translate-y-1/2 w-6 h-6 bg-background rounded-full"></div>

            <div class="flex justify-between items-center mb-4 border-b border-dashed border-gray-200 pb-4">
                <span class="text-gray-400 font-bold uppercase tracking-widest text-[12px]">Transaction ID</span>
                <span class="font-bold text-[#001736] font-mono tracking-widest text-[14px]">#TRX-8829</span>
            </div>
            <div class="flex justify-between items-center mb-2.5">
                <span class="text-gray-500 font-medium text-[14px]">Date</span>
                <span class="font-bold text-[#001736] text-[14px]">Feb 14, 18:30</span>
            </div>
            <div class="flex justify-between items-center mb-4">
                <span class="text-gray-500 font-medium text-[14px]">Payment Source</span>
                <span class="font-bold text-[#001736] text-[14px]">Visa •••• 4242</span>
            </div>
            <div class="flex justify-between items-center pt-3 border-t border-gray-100">
                <span class="text-gray-400 font-bold uppercase tracking-widest text-[12px]">Total Amount</span>
                <span class="font-extrabold text-[#14d0a1] text-[20px]">+₾10.00</span>
            </div>
        </div>

        <!-- Buttons -->
        <div class="flex flex-col gap-3 w-full">
            <a href="wallet.html"
                class="w-full bg-gradient-to-r from-[#17e3ae] to-[#8affda] text-[#003822] font-bold py-4 rounded-2xl shadow-[0_8px_16px_rgba(20,208,161,0.25)] active:scale-[0.98] transition-all flex items-center justify-center gap-2 text-[16px] hover:opacity-90">
                Back to Wallet
            </a>
            <a href="home.html"
                class="w-full bg-white text-gray-700 font-bold py-4 rounded-2xl shadow-sm border border-gray-200 active:scale-[0.98] transition-all flex items-center justify-center gap-2 text-[16px] hover:bg-gray-50">
                Go to Home
            </a>
        </div>

    </div>

</body>

</html>
