<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AQUE - Parking Details</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: "#14d0a1", background: "#e8f2f0" },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body class="bg-background text-gray-900 font-sans min-h-[100dvh] flex flex-col relative pb-32">

    <!-- Header -->
    <header class="px-5 pt-10 pb-4 flex items-center justify-start z-20 sticky top-0 bg-transparent">
        <button onclick="history.back()"
            class="p-2.5 bg-white text-[#001736] hover:bg-gray-50 rounded-[14px] transition-colors shadow-sm flex items-center justify-center">
            <span class="material-symbols-rounded text-[20px]">arrow_back</span>
        </button>
        <h1 class="text-[19px] font-extrabold text-[#001736] tracking-tight ml-4">Details</h1>
    </header>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto hide-scrollbar px-5 flex flex-col gap-5 mt-2">

        <!-- Image Card -->
        <div class="relative w-full h-[220px] rounded-[32px] overflow-hidden shadow-md">
            <!-- Image -->
            <img src="https://images.unsplash.com/photo-1486006920555-c77dcf18193c?auto=format&fit=crop&q=80&w=1200"
                alt="Parking Lot" class="w-full h-full object-cover" />

            <!-- Gradient Overlay for Bottom -->
            <div class="absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-transparent"></div>

            <!-- "Confirmed by sensor" Badge -->
            <div
                class="absolute top-4 left-4 bg-white/90 backdrop-blur-sm px-3 py-1.5 rounded-full flex items-center gap-1.5 shadow-sm">
                <span class="material-symbols-rounded text-[16px] text-[#14d0a1]">verified</span>
                <span class="text-[11px] font-extrabold text-[#14d0a1] uppercase tracking-wide">Confirmed by
                    sensor</span>
            </div>
        </div>

        <!-- Info Card -->
        <div class="bg-white p-6 rounded-[32px] shadow-sm border border-gray-100 flex flex-col">

            <!-- Title & Price Row -->
            <div class="flex justify-between items-start">
                <div class="flex flex-col">
                    <h1 class="text-[22px] font-extrabold text-[#001736] leading-tight">Chavchavadze Ave.<br />#34</h1>
                    <span class="text-[13px] text-gray-500 font-bold mt-1 tracking-wide">Vake, Tbilisi</span>
                </div>
                <div class="flex flex-col items-end">
                    <div class="flex items-baseline gap-1 text-[#14d0a1]">
                        <span class="text-[26px] font-extrabold tracking-tight">3</span>
                        <span class="text-[18px] font-extrabold">₾</span>
                    </div>
                    <span class="text-[11px] text-gray-400 font-bold tracking-widest uppercase">per hour</span>
                </div>
            </div>

            <!-- Divider -->
            <div class="w-full h-px bg-gray-50 my-6"></div>

            <!-- Stats Row (3 Columns) -->
            <div class="grid grid-cols-3 gap-2 text-center">

                <!-- Spots -->
                <div class="flex flex-col items-center gap-1.5">
                    <span class="material-symbols-rounded text-[26px] text-[#14d0a1]">local_parking</span>
                    <span class="text-[16px] font-extrabold text-[#001736] mt-1">12</span>
                    <span class="text-[11px] text-gray-400 font-bold uppercase tracking-widest">spots</span>
                </div>

                <!-- Hours -->
                <div class="flex flex-col items-center gap-1.5 border-x border-gray-100 pb-1">
                    <span class="material-symbols-rounded text-[26px] text-[#14d0a1]">schedule</span>
                    <span class="text-[16px] font-extrabold text-[#001736] mt-1">24/7</span>
                    <span class="text-[11px] text-gray-400 font-bold uppercase tracking-widest">hours</span>
                </div>

                <!-- Distance -->
                <div class="flex flex-col items-center gap-1.5">
                    <span class="material-symbols-rounded text-[26px] text-[#14d0a1]">location_on</span>
                    <span class="text-[16px] font-extrabold text-[#001736] mt-1">1.2</span>
                    <span class="text-[11px] text-gray-400 font-bold uppercase tracking-widest">km</span>
                </div>

            </div>

            <!-- Divider -->
            <div class="w-full h-px bg-gray-50 my-6"></div>

            <!-- Description -->
            <div class="flex flex-col gap-2">
                <h2 class="text-[14px] font-extrabold text-gray-400 tracking-wide uppercase">Description</h2>
                <p class="text-[14px] text-[#6e7b8a] leading-relaxed font-medium pr-2">
                    Secured parking lot with video monitoring. Entry and exit is automatic with a license plate
                    recognition system.
                </p>
            </div>

        </div>

    </main>

    <!-- Bottom Actions -->
    <div
        class="fixed bottom-0 left-0 right-0 p-5 bg-gradient-to-t from-background via-background to-transparent pt-12 z-30 flex gap-3">

        <!-- Navigation Button -->
        <button onclick="window.location.href='navigation.html'"
            class="flex-[0.8] bg-white border-2 border-[#14d0a1] text-[#14d0a1] hover:bg-[#f0f9f6] font-extrabold py-4 rounded-[20px] transition-all active:scale-[0.98] flex items-center justify-center gap-2">
            <span class="material-symbols-rounded text-[20px]">near_me</span>
            Navigation
        </button>

        <!-- Book Button -->
        <a href="select-slot.html"
            class="flex-1 bg-gradient-to-r from-[#17e3ae] to-[#8affda] text-[#003822] hover:opacity-90 font-extrabold py-4 rounded-[20px] shadow-[0_8px_16px_rgba(20,208,161,0.25)] transition-all active:scale-[0.98] flex items-center justify-center gap-2">
            Book <span class="material-symbols-rounded text-[22px]">arrow_forward</span>
        </a>

    </div>

</body>

</html>
