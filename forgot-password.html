<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AQUE - Forgot Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#14d0a1",
                        background: "#f0f3f5",
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-white text-gray-900 font-sans min-h-[100dvh] flex flex-col relative overflow-hidden">
    <!-- Header -->
    <div class="px-5 pt-12 pb-4 flex items-center justify-between">
        <button onclick="window.history.back()"
            class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-gray-50 active:bg-gray-100 transition-colors">
            <span class="material-symbols-rounded text-gray-800 text-[24px]">arrow_back</span>
        </button>
        <span class="text-[17px] font-bold text-gray-900 absolute left-1/2 -translate-x-1/2">Forgot Password</span>
        <div class="w-10"></div>
    </div>

    <!-- Main Content -->
    <div class="flex-1 overflow-y-auto px-6 pt-6 pb-8 flex flex-col items-center">
        <!-- Icon -->
        <div class="w-24 h-24 bg-[#14d0a1]/10 rounded-full flex flex-col items-center justify-center mb-6">
            <span class="material-symbols-rounded text-[48px] text-[#14d0a1]">lock_reset</span>
        </div>

        <!-- Title & Subtitle -->
        <h1 class="text-[26px] font-bold text-gray-900 tracking-tight text-center mb-3">Forgot Password?</h1>
        <p class="text-[15px] text-gray-500 text-center leading-relaxed max-w-[280px] mb-8">
            Don't worry! the email address associated with your account.
        </p>

        <!-- Form Elements -->
        <div class="w-full flex flex-col gap-6 mt-4">
            <!-- Email -->
            <div class="flex flex-col gap-2">
                <label class="text-[14px] font-medium text-gray-700 ml-1">Email</label>
                <div class="relative group">
                    <div
                        class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400 group-focus-within:text-[#14d0a1] transition-colors">
                        <span class="material-symbols-rounded text-[22px]">mail</span>
                    </div>
                    <input type="email"
                        class="w-full bg-white pl-[3rem] pr-4 py-3.5 rounded-2xl border border-gray-200 focus:border-[#14d0a1] focus:ring-4 focus:ring-[#14d0a1]/10 text-gray-900 text-[15px] outline-none transition-all placeholder:text-gray-400"
                        placeholder="Enter your email address">
                </div>
            </div>

            <!-- Send OTP Button -->
            <button onclick="window.location.href='otp-verification.html'"
                class="w-full bg-[#14d0a1] hover:bg-[#12b88e] text-white font-semibold py-4 rounded-[24px] shadow-[0_8px_20px_rgba(20,208,161,0.25)] active:scale-[0.98] transition-all flex items-center justify-center text-[16px] mt-6 gap-2">
                Send OTP
            </button>
        </div>
    </div>
</body>

</html>
