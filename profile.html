<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#14c896",
                        surface: "#ffffff",
                        background: "#f0f3f5",
                        brand: {
                            teal: "#24d19e",
                            dark: "#111827"
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body class="bg-background text-gray-900 font-sans min-h-screen flex flex-col relative pb-28">

    <!-- Header -->
    <header class="px-5 pt-10 pb-4 flex items-center justify-between z-20 sticky top-0 bg-background">
        <div class="flex items-center gap-4">
            <button onclick="history.back()" class="p-1 text-gray-800">
                <span class="material-symbols-rounded text-2xl">arrow_back</span>
            </button>
            <h1 class="text-[22px] font-bold text-gray-900">Edit Profile</h1>
        </div>
        <button
            class="bg-[#21d0a1] hover:bg-[#1bb88d] text-white px-3.5 py-2 rounded-lg text-[13px] font-bold flex items-center gap-1.5 shadow-sm transition-colors">
            <span class="material-symbols-rounded text-[18px]">save</span>
            Save
        </button>
    </header>

    <!-- Main Content -->
    <main class="flex-1 px-5 flex flex-col items-center mt-2">

        <!-- Avatar Section -->
        <div class="flex flex-col items-center mb-6 mt-4">
            <div class="relative">
                <!-- Avatar Circle -->
                <div
                    class="w-28 h-28 rounded-full bg-gradient-to-br from-[#12a98f] to-[#046e5a] flex items-center justify-center text-white text-[32px] font-semibold shadow-lg ring-4 ring-[#e5fcf4]">
                    GA
                </div>
                <!-- Camera Button -->
                <button
                    class="absolute bottom-0 right-0 w-9 h-9 bg-[#21d0a1] rounded-full flex items-center justify-center text-white shadow-md border-2 border-white hover:bg-[#1bb88d] transition-colors">
                    <span class="material-symbols-rounded text-[18px]">photo_camera</span>
                </button>
            </div>
            <p class="text-gray-500 text-[13px] mt-4 font-medium">Tap to change profile photo</p>
        </div>

        <!-- Form Fields Container -->
        <div class="w-full bg-white rounded-[24px] p-5 shadow-sm border border-gray-100 flex flex-col gap-4">

            <div class="grid grid-cols-2 gap-4">
                <div class="flex flex-col gap-1.5">
                    <label class="text-[13px] font-bold text-gray-900 ml-1">First Name</label>
                    <input type="text" value="Giorgi"
                        class="w-full bg-[#f4f5f7] border border-transparent rounded-[14px] px-4 py-3.5 text-[15px] focus:outline-none focus:bg-white focus:border-gray-300 text-gray-800 font-medium" />
                </div>
                <div class="flex flex-col gap-1.5">
                    <label class="text-[13px] font-bold text-gray-900 ml-1">Last Name</label>
                    <input type="text" value="Abuladze"
                        class="w-full bg-[#f4f5f7] border border-transparent rounded-[14px] px-4 py-3.5 text-[15px] focus:outline-none focus:bg-white focus:border-gray-300 text-gray-800 font-medium" />
                </div>
            </div>

            <div class="flex flex-col gap-1.5">
                <label class="text-[13px] font-bold text-gray-900 ml-1">Username</label>
                <input type="text" value="giorgi225"
                    class="w-full bg-[#f4f5f7] border border-transparent rounded-[14px] px-4 py-3.5 text-[15px] focus:outline-none focus:bg-white focus:border-gray-300 text-gray-800 font-medium" />
            </div>

            <div class="flex flex-col gap-1.5">
                <label class="text-[13px] font-bold text-gray-900 ml-1">Email Address</label>
                <input type="email" value="giorgi.a@example.com"
                    class="w-full bg-[#f4f5f7] border border-transparent rounded-[14px] px-4 py-3.5 text-[15px] focus:outline-none focus:bg-white focus:border-gray-300 text-gray-800 font-medium" />
            </div>

            <div class="flex flex-col gap-1.5 mb-2">
                <label class="text-[13px] font-bold text-gray-900 ml-1">Phone Number</label>
                <input type="tel" value="+995 599 123 456"
                    class="w-full bg-[#f4f5f7] border border-transparent rounded-[14px] px-4 py-3.5 text-[15px] focus:outline-none focus:bg-white focus:border-gray-300 text-gray-800 font-medium tracking-wide" />
            </div>

            <div class="h-px bg-gray-100 my-1 w-full hidden"></div> <!-- Optional Divider -->

            <div class="flex flex-col gap-3 mt-1">
                <button type="button"
                    class="w-full bg-white border-[1.5px] border-[#0e4f45] text-[#0e4f45] font-bold text-[15px] py-3.5 rounded-xl hover:bg-gray-50 transition-colors">
                    Change Password
                </button>
                <button type="button"
                    class="w-full bg-white border-[1.5px] border-[#e11d48] text-[#e11d48] font-bold text-[15px] py-3.5 rounded-xl hover:bg-red-50 transition-colors">
                    Delete Account
                </button>
            </div>

        </div>

    </main>

    <!-- Bottom Navigation -->
    <nav
        class="fixed bottom-0 left-0 w-full bg-white border-t border-gray-100 flex justify-between items-center z-40 pb-safe pt-2 px-1">
        <a href="home.html" class="flex flex-col items-center flex-1 py-2 text-gray-400">
            <span class="material-symbols-rounded text-[28px]">home</span>
            <span class="text-[10px] mt-1 font-medium">Home</span>
        </a>
        <a href="select-slot.html" class="flex flex-col items-center flex-1 py-2 text-gray-400">
            <span class="material-symbols-rounded text-[28px]">local_activity</span>
            <span class="text-[10px] mt-1 font-medium">Parking</span>
        </a>
        <a href="history.html" class="flex flex-col items-center flex-1 py-2 text-gray-400">
            <span class="material-symbols-rounded text-[28px]">schedule</span>
            <span class="text-[10px] mt-1 font-medium">Bookings</span>
        </a>
        <a href="vehicles.html" class="flex flex-col items-center flex-1 py-2 text-gray-400">
            <span class="material-symbols-rounded text-[28px]">directions_car</span>
            <span class="text-[10px] mt-1 font-medium">Vehicles</span>
        </a>
        <a href="profile.html"
            class="flex flex-col items-center flex-1 py-2 text-[#21d0a1] border-[2.5px] border-black rounded-xl mx-2 shadow-sm bg-gray-50">
            <span class="material-symbols-rounded text-[28px]">person</span>
            <span class="text-[10px] mt-0.5 font-bold text-[#21d0a1]">Profile</span>
        </a>
    </nav>
</body>

</html>
