<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AQUE - Feedback</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: "#14d0a1", background: "#f8f9fb" },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Star Rating Hover Effect */
        .star-rating button:hover~button .material-symbols-rounded {
            color: #f3f4f6;
            /* Gray out stars after hovered one */
            font-variation-settings: 'FILL' 0;
        }

        .star-rating:hover button .material-symbols-rounded {
            color: #fbbf24;
            /* Make all stars yellow on hover container... */
            font-variation-settings: 'FILL' 1;
        }

        .star-rating button:hover .material-symbols-rounded {
            color: #fbbf24;
            font-variation-settings: 'FILL' 1;
        }
    </style>
</head>

<body class="bg-background text-gray-900 font-sans min-h-[100dvh] flex flex-col relative">

    <!-- Header -->
    <header
        class="px-5 pt-10 pb-4 flex items-center justify-between z-20 sticky top-0 bg-background/90 backdrop-blur-md">
        <div class="flex items-center gap-3">
            <button onclick="history.back()"
                class="p-1 text-[#001736] hover:bg-gray-100 rounded-full transition-colors">
                <span class="material-symbols-rounded text-2xl">arrow_back</span>
            </button>
            <h1 class="text-[22px] font-extrabold text-[#001736] tracking-tight">Feedback</h1>
        </div>
        <div class="w-10"></div>
    </header>

    <!-- Scrollable Content -->
    <main class="flex-1 overflow-y-auto hide-scrollbar pb-10 px-5 pt-2 flex flex-col gap-6">

        <div
            class="bg-white p-8 rounded-[32px] shadow-sm border border-gray-100 flex flex-col items-center text-center">
            <div
                class="w-24 h-24 rounded-full bg-[#e4fff6] text-[#14d0a1] flex items-center justify-center mb-6 shadow-[0_4px_16px_rgba(20,208,161,0.2)]">
                <span class="material-symbols-rounded text-[40px]"
                    style="font-variation-settings: 'FILL' 1;">thumb_up</span>
            </div>

            <h2 class="text-[24px] font-extrabold text-[#001736] mb-2 tracking-tight">Enjoying the app?</h2>
            <p class="text-[14px] text-gray-500 font-medium">
                Your opinion is very important to us. Please rate your experience.
            </p>

            <!-- Simplified Star Rating Visual -->
            <div class="flex gap-2 mt-8">
                <button class="p-1 text-amber-400 hover:scale-110 active:scale-95 transition-transform"><span
                        class="material-symbols-rounded text-[40px]"
                        style="font-variation-settings: 'FILL' 1;">star</span></button>
                <button class="p-1 text-amber-400 hover:scale-110 active:scale-95 transition-transform"><span
                        class="material-symbols-rounded text-[40px]"
                        style="font-variation-settings: 'FILL' 1;">star</span></button>
                <button class="p-1 text-amber-400 hover:scale-110 active:scale-95 transition-transform"><span
                        class="material-symbols-rounded text-[40px]"
                        style="font-variation-settings: 'FILL' 1;">star</span></button>
                <button class="p-1 text-amber-400 hover:scale-110 active:scale-95 transition-transform"><span
                        class="material-symbols-rounded text-[40px]"
                        style="font-variation-settings: 'FILL' 1;">star</span></button>
                <button
                    class="p-1 text-gray-200 hover:text-amber-400 hover:scale-110 active:scale-95 transition-all"><span
                        class="material-symbols-rounded text-[40px]"
                        style="font-variation-settings: 'FILL' 0;">star</span></button>
            </div>
        </div>

        <div class="flex flex-col gap-3">
            <h2 class="text-[12px] font-bold text-gray-400 uppercase tracking-widest ml-1">Leave a Comment</h2>

            <div class="bg-white p-5 rounded-[28px] shadow-sm border border-gray-100">
                <textarea
                    class="w-full bg-gray-50 border border-gray-100 rounded-[20px] p-5 text-[#001736] placeholder:text-gray-400 focus:ring-2 focus:ring-[#14d0a1]/30 focus:border-[#14d0a1]/50 min-h-[160px] resize-none outline-none font-medium text-[15px] transition-all setup"
                    placeholder="What would you improve?"></textarea>

                <button
                    class="w-full bg-gradient-to-r from-[#17e3ae] to-[#8affda] text-[#003822] font-bold py-4 rounded-2xl mt-4 shadow-[0_8px_16px_rgba(20,208,161,0.25)] hover:opacity-90 transition-all flex items-center justify-center gap-2 active:scale-[0.98] text-[16px]">
                    <span class="material-symbols-rounded text-[20px]">send</span>
                    <span>Submit</span>
                </button>
            </div>
        </div>

    </main>

</body>

</html>
