<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AQUE - Feedback</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: "#14d0a1", background: "#f8f9fb" },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body class="bg-background text-gray-900 font-sans min-h-[100dvh] flex flex-col relative pb-32">

    <!-- Header -->
    <header
        class="px-5 pt-10 pb-4 flex items-center justify-between z-20 sticky top-0 bg-background/90 backdrop-blur-md">
        <div class="flex items-center gap-3">
            <a href="profile.html"
                class="p-1 text-[#001736] hover:bg-gray-100 rounded-full transition-colors flex items-center justify-center">
                <span class="material-symbols-rounded text-[20px]">arrow_back</span>
            </a>
            <h1 class="text-[19px] font-extrabold text-[#001736] tracking-tight">Feedback</h1>
        </div>
        <div class="w-8"></div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto hide-scrollbar px-5 pt-2 flex flex-col gap-6">

        <!-- Rating Card -->
        <div
            class="bg-white p-8 rounded-[32px] shadow-sm border border-gray-100 flex flex-col items-center justify-center text-center gap-4 relative overflow-hidden">

            <div class="w-16 h-16 bg-[#e6f9f4] text-[#14d0a1] rounded-full flex items-center justify-center mb-2">
                <span class="material-symbols-rounded text-[32px]">thumb_up</span>
            </div>

            <h2 class="font-extrabold text-[18px] text-[#001736] leading-tight max-w-[200px]">Do you like the
                application?</h2>
            <p class="text-[13px] text-gray-500 font-medium leading-relaxed px-4">
                Your opinion is very important to us. Please evaluate us.
            </p>

            <!-- Star Rating -->
            <div class="flex items-center gap-2 mt-2">
                <span
                    class="material-symbols-rounded text-[28px] text-[#fbbf24] drop-shadow-[0_2px_4px_rgba(251,191,36,0.3)]">star</span>
                <span
                    class="material-symbols-rounded text-[28px] text-[#fbbf24] drop-shadow-[0_2px_4px_rgba(251,191,36,0.3)]">star</span>
                <span
                    class="material-symbols-rounded text-[28px] text-[#fbbf24] drop-shadow-[0_2px_4px_rgba(251,191,36,0.3)]">star</span>
                <span
                    class="material-symbols-rounded text-[28px] text-[#fbbf24] drop-shadow-[0_2px_4px_rgba(251,191,36,0.3)]">star</span>
                <span class="material-symbols-rounded text-[28px] text-gray-300">star_outline</span>
            </div>

        </div>

        <!-- Comment Form Section -->
        <div class="flex flex-col gap-3 mt-2">
            <h2 class="text-[12px] font-bold text-gray-500 mb-1 ml-1 tracking-wide uppercase">Leave a comment</h2>

            <div class="bg-white p-5 rounded-[28px] shadow-sm border border-gray-100 flex flex-col gap-4">

                <textarea rows="5" placeholder="What would you improve?"
                    class="w-full bg-[#f8f9fb] border border-transparent rounded-[16px] p-4 text-[#001736] font-medium text-[14px] outline-none placeholder-gray-400 focus:bg-white focus:border-[#14d0a1] focus:ring-4 focus:ring-[#14d0a1]/10 resize-none transition-all"></textarea>

                <button
                    class="w-full bg-[#14d0a1] text-white hover:opacity-90 font-extrabold py-4 rounded-[16px] shadow-[0_8px_16px_rgba(20,208,161,0.25)] flex items-center justify-center gap-2 transition-all active:scale-[0.98]">
                    <span class="material-symbols-rounded text-[20px]">send</span>
                    Send
                </button>

            </div>
        </div>

    </main>

</body>

</html>
