<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AQUE - Fines</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: "#14d0a1", background: "#f8f9fb", danger: "#EF4444" },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body class="bg-background text-gray-900 font-sans min-h-[100dvh] flex flex-col relative overflow-hidden">

    <!-- Header -->
    <header
        class="px-5 pt-10 pb-4 flex items-center justify-between z-20 sticky top-0 bg-background/90 backdrop-blur-md">
        <div class="flex items-center gap-3">
            <a href="menu.html" class="p-1 text-[#001736]">
                <span class="material-symbols-rounded text-2xl">arrow_back</span>
            </a>
            <h1 class="text-[22px] font-extrabold text-[#001736] tracking-tight">Fines</h1>
        </div>
        <div class="w-10"></div>
    </header>

    <div class="flex-1 px-5 pt-2 pb-10 z-10 flex flex-col gap-6 overflow-y-auto hide-scrollbar">

        <!-- Active Fines Section -->
        <div class="flex flex-col gap-3">
            <h2 class="text-[12px] font-bold text-gray-400 uppercase tracking-widest ml-1">Active Fines</h2>

            <div
                class="bg-white p-5 rounded-[28px] shadow-sm border border-gray-100 flex flex-col gap-5 border-l-[6px] border-l-danger">

                <div class="flex flex-col gap-1.5">
                    <div class="flex items-center gap-2">
                        <div class="w-8 h-8 rounded-[10px] bg-red-50 flex items-center justify-center text-danger">
                            <span class="material-symbols-rounded text-[20px]">error</span>
                        </div>
                        <h3 class="font-bold text-[#001736] text-[16px]">Illegal Parking</h3>
                    </div>
                    <p class="text-[12px] text-gray-400 font-bold tracking-wide mt-1 pl-10">YESTERDAY, 14:30 •
                        CHAVCHAVADZE 34</p>
                </div>

                <div class="bg-gray-50 p-4 rounded-[20px] flex items-center justify-between border border-gray-100">
                    <span class="text-[13px] font-bold text-gray-500 uppercase tracking-widest">Amount Due</span>
                    <span class="text-[20px] font-extrabold text-danger">50.00 ₾</span>
                </div>

                <a href="success.html"
                    class="w-full bg-danger hover:bg-red-600 text-white font-bold py-4 rounded-[20px] shadow-[0_8px_16px_rgba(239,68,68,0.25)] transition-all flex items-center justify-center gap-2 active:scale-[0.98]">
                    <span class="text-[15px]">Pay Fine</span>
                    <span class="material-symbols-rounded text-[20px]">payments</span>
                </a>
            </div>
        </div>

        <!-- History Section -->
        <div class="flex flex-col gap-3 mt-4">
            <h2 class="text-[12px] font-bold text-gray-400 uppercase tracking-widest ml-1">History</h2>

            <div class="flex flex-col gap-3">

                <!-- Paid Fine Item 1 -->
                <div
                    class="bg-white p-4 rounded-[24px] shadow-sm border border-gray-100 flex items-center justify-between opacity-80">
                    <div class="flex items-center gap-4">
                        <div
                            class="w-12 h-12 rounded-[14px] bg-gray-50 flex items-center justify-center text-[#14d0a1]">
                            <span class="material-symbols-rounded text-[24px]"
                                style="font-variation-settings: 'FILL' 1;">check_circle</span>
                        </div>
                        <div class="flex flex-col">
                            <h3 class="font-bold text-[#001736] text-[15px]">Overdue</h3>
                            <p class="text-[11px] text-gray-400 font-bold uppercase tracking-widest mt-0.5">JAN 12, 2024
                            </p>
                        </div>
                    </div>
                    <div class="text-right">
                        <span class="block font-bold text-gray-400 line-through text-[14px]">10.00 ₾</span>
                        <span
                            class="text-[10px] text-[#14d0a1] font-extrabold uppercase tracking-widest mt-1">Paid</span>
                    </div>
                </div>

                <!-- Paid Fine Item 2 -->
                <div
                    class="bg-white p-4 rounded-[24px] shadow-sm border border-gray-100 flex items-center justify-between opacity-80">
                    <div class="flex items-center gap-4">
                        <div
                            class="w-12 h-12 rounded-[14px] bg-gray-50 flex items-center justify-center text-[#14d0a1]">
                            <span class="material-symbols-rounded text-[24px]"
                                style="font-variation-settings: 'FILL' 1;">check_circle</span>
                        </div>
                        <div class="flex flex-col">
                            <h3 class="font-bold text-[#001736] text-[15px]">Wrong Maneuver</h3>
                            <p class="text-[11px] text-gray-400 font-bold uppercase tracking-widest mt-0.5">DEC 28, 2023
                            </p>
                        </div>
                    </div>
                    <div class="text-right">
                        <span class="block font-bold text-gray-400 line-through text-[14px]">20.00 ₾</span>
                        <span
                            class="text-[10px] text-[#14d0a1] font-extrabold uppercase tracking-widest mt-1">Paid</span>
                    </div>
                </div>

            </div>
        </div>

    </div>

</body>

</html>
