<!DOCTYPE html>
<html class="light" lang="ka">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>აქვე - ჯარიმები</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link href="https://cdn.web-fonts.ge/fonts/bpg-phone-sans/css/bpg-phone-sans.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#009485",
                        "primary-bright": "#00C2AF",
                        "background-light": "#f5f8f8",
                        "background-dark": "#0f2321",
                        "success": "#22C55E",
                        "warning": "#F59E0B",
                        "danger": "#EF4444",
                        "surface": "#ffffff",
                        "surface-dark": "#18181b"
                    },
                    fontFamily: {
                        "display": ["BPG Phone Sans", "sans-serif"],
                        "sans": ["BPG Phone Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "2xl": "1rem",
                        "3xl": "1.5rem",
                    },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'BPG Phone Sans', sans-serif;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .dark .glass-panel {
            background: rgba(15, 35, 33, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark text-gray-900 dark:text-white min-h-screen flex flex-col relative overflow-hidden">

    <!-- Background Decoration -->
    <div
        class="fixed top-[-10%] right-[-10%] w-[80vw] h-[80vw] bg-primary/20 rounded-full blur-3xl pointer-events-none">
    </div>
    <div
        class="fixed bottom-[-10%] left-[-10%] w-[60vw] h-[60vw] bg-primary-bright/10 rounded-full blur-3xl pointer-events-none">
    </div>

    <!-- Header -->
    <div class="px-6 pt-8 pb-4 z-10 flex items-center gap-4">
        <a href="menu.html"
            class="p-2.5 bg-white dark:bg-surface-dark rounded-xl shadow-sm border border-gray-100 dark:border-gray-800 text-gray-600 dark:text-gray-300">
            <span class="material-symbols-outlined">arrow_back</span>
        </a>
        <h1 class="text-xl font-bold">ჯარიმები</h1>
    </div>

    <div class="flex-1 px-6 pb-8 z-10 flex flex-col gap-6 overflow-y-auto">

        <!-- Active Fines Section -->
        <div>
            <h2 class="text-sm font-bold text-gray-400 uppercase tracking-wider mb-3 ml-1">აქტიური ჯარიმები</h2>

            <div class="glass-panel p-5 rounded-3xl shadow-sm flex flex-col gap-4 border-l-4 border-l-danger">
                <div class="flex justify-between items-start">
                    <div>
                        <div class="flex items-center gap-2 mb-1">
                            <span class="material-symbols-outlined text-danger text-[20px]">error</span>
                            <h3 class="font-bold text-lg">აკრძალული პარკირება</h3>
                        </div>
                        <p class="text-xs text-gray-500 font-bold uppercase">გუშინ, 14:30 • ჭავჭავაძის 34</p>
                    </div>
                </div>

                <div class="bg-red-50 dark:bg-red-900/10 p-4 rounded-2xl flex items-center justify-between">
                    <span class="text-sm font-bold text-danger">გადასახდელი თანხა</span>
                    <span class="text-xl font-extrabold text-danger">50.00 ₾</span>
                </div>

                <a href="success.html"
                    class="w-full bg-danger hover:bg-red-600 text-white font-bold py-3.5 rounded-2xl shadow-lg shadow-red-500/30 transition-all flex items-center justify-center gap-2 active:scale-[0.98]">
                    <span>გადახდა</span>
                    <span class="material-symbols-outlined">payments</span>
                </a>
            </div>
        </div>

        <!-- History Section -->
        <div>
            <h2 class="text-sm font-bold text-gray-400 uppercase tracking-wider mb-3 ml-1">ისტორია</h2>

            <div class="flex flex-col gap-3">
                <!-- Paid Fine Item 1 -->
                <div class="glass-panel p-4 rounded-2xl flex items-center justify-between opacity-70">
                    <div class="flex items-center gap-4">
                        <div
                            class="w-10 h-10 rounded-full bg-gray-100 dark:bg-white/5 flex items-center justify-center text-gray-400">
                            <span class="material-symbols-outlined">check_circle</span>
                        </div>
                        <div>
                            <h3 class="font-bold text-sm">ვადაგადაცილება</h3>
                            <p class="text-[10px] text-gray-500 uppercase font-bold">12 იან. 2024</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <span class="block font-bold text-gray-400 line-through">10.00 ₾</span>
                        <span class="text-[10px] text-success font-bold uppercase">გადახდილია</span>
                    </div>
                </div>

                <!-- Paid Fine Item 2 -->
                <div class="glass-panel p-4 rounded-2xl flex items-center justify-between opacity-70">
                    <div class="flex items-center gap-4">
                        <div
                            class="w-10 h-10 rounded-full bg-gray-100 dark:bg-white/5 flex items-center justify-center text-gray-400">
                            <span class="material-symbols-outlined">check_circle</span>
                        </div>
                        <div>
                            <h3 class="font-bold text-sm">არასწორი მანევრი</h3>
                            <p class="text-[10px] text-gray-500 uppercase font-bold">28 დეკ. 2023</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <span class="block font-bold text-gray-400 line-through">20.00 ₾</span>
                        <span class="text-[10px] text-success font-bold uppercase">გადახდილია</span>
                    </div>
                </div>
            </div>
        </div>

    </div>

</body>

</html>
