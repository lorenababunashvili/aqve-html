<!DOCTYPE html>
<html class="light" lang="ka">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>აქვე - ბალანსის შევსება</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link href="https://cdn.web-fonts.ge/fonts/bpg-phone-sans/css/bpg-phone-sans.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#009485",
                        "primary-bright": "#00C2AF",
                        "background-light": "#f8fafc",
                        "background-dark": "#0f2321",
                        "surface": "#ffffff",
                    },
                    fontFamily: {
                        "display": ["BPG Phone Sans", "sans-serif"],
                        "sans": ["BPG Phone Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "2xl": "1rem",
                        "3xl": "1.5rem",
                    },
                    boxShadow: {
                        "soft": "0 10px 40px -10px rgba(0,0,0,0.05)",
                    }
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'BPG Phone Sans', sans-serif;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body class="bg-gray-50 dark:bg-background-dark text-gray-900 dark:text-white min-h-screen flex flex-col">

    <!-- Header -->
    <div
        class="px-6 pt-12 pb-6 flex items-center justify-between z-10 sticky top-0 bg-gray-50/80 dark:bg-background-dark/80 backdrop-blur-md">
        <div class="flex items-center gap-4">
            <button onclick="history.back()"
                class="p-3 bg-white dark:bg-white/10 rounded-full shadow-sm hover:bg-gray-50 transition-colors">
                <span class="material-symbols-rounded text-gray-600 dark:text-gray-200">arrow_back</span>
            </button>
            <h1 class="text-xl font-bold text-gray-800 dark:text-white">ბალანსის შევსება</h1>
        </div>
        <div class="w-10"></div>
    </div>

    <!-- Scrollable Content -->
    <div class="flex-1 overflow-y-auto no-scrollbar pb-32 px-6">

        <!-- Input Amount -->
        <div
            class="bg-white dark:bg-white/5 p-8 rounded-[2rem] shadow-sm mb-6 flex flex-col items-center justify-center text-center">
            <label class="text-sm font-medium text-gray-400 mb-2">თანხა</label>
            <div class="flex items-baseline gap-1 relative">
                <input type="number" value="10"
                    class="bg-transparent border-none text-6xl font-bold text-gray-800 dark:text-white text-center w-40 p-0 focus:ring-0 placeholder:text-gray-200"
                    placeholder="0">
                <span class="text-2xl font-bold text-gray-400 absolute -right-6 top-4">₾</span>
            </div>
        </div>

        <!-- Quick Amounts -->
        <div class="grid grid-cols-3 gap-3 mb-8">
            <button
                class="bg-white dark:bg-white/5 hover:bg-primary hover:text-white dark:hover:bg-primary dark:hover:text-white transition-all p-4 rounded-2xl font-bold text-gray-600 dark:text-gray-300 shadow-sm border border-transparent hover:border-primary/20">
                5 ₾
            </button>
            <button
                class="bg-primary text-white p-4 rounded-2xl font-bold shadow-lg shadow-primary/30 transform scale-105 border border-primary">
                10 ₾
            </button>
            <button
                class="bg-white dark:bg-white/5 hover:bg-primary hover:text-white dark:hover:bg-primary dark:hover:text-white transition-all p-4 rounded-2xl font-bold text-gray-600 dark:text-gray-300 shadow-sm border border-transparent hover:border-primary/20">
                20 ₾
            </button>
            <button
                class="bg-white dark:bg-white/5 hover:bg-primary hover:text-white dark:hover:bg-primary dark:hover:text-white transition-all p-4 rounded-2xl font-bold text-gray-600 dark:text-gray-300 shadow-sm border border-transparent hover:border-primary/20">
                50 ₾
            </button>
            <button
                class="bg-white dark:bg-white/5 hover:bg-primary hover:text-white dark:hover:bg-primary dark:hover:text-white transition-all p-4 rounded-2xl font-bold text-gray-600 dark:text-gray-300 shadow-sm border border-transparent hover:border-primary/20">
                100 ₾
            </button>
            <button
                class="bg-white dark:bg-white/5 hover:bg-primary hover:text-white dark:hover:bg-primary dark:hover:text-white transition-all p-4 rounded-2xl font-bold text-gray-600 dark:text-gray-300 shadow-sm border border-transparent hover:border-primary/20">
                სხვა
            </button>
        </div>

        <h2 class="text-sm font-bold text-gray-400 uppercase tracking-wider ml-2 mb-4">გადახდის მეთოდი</h2>

        <!-- Cards List -->
        <div class="flex flex-col gap-3">

            <!-- Visa (Selected) -->
            <label class="cursor-pointer">
                <input type="radio" name="payment_card" class="peer sr-only" checked>
                <div
                    class="bg-white dark:bg-white/5 p-4 rounded-[1.5rem] shadow-sm border-2 border-transparent peer-checked:border-primary peer-checked:bg-primary/5 flex items-center justify-between transition-all">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-8 bg-gray-100 rounded flex items-center justify-center p-1">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/5/5e/Visa_Inc._logo.svg"
                                class="h-full object-contain">
                        </div>
                        <div>
                            <p class="font-bold text-gray-800 dark:text-white">Visa</p>
                            <p class="text-xs text-gray-400 font-mono">•••• 4242</p>
                        </div>
                    </div>
                    <div
                        class="w-6 h-6 rounded-full border-2 border-gray-300 peer-checked:border-primary peer-checked:bg-primary flex items-center justify-center">
                        <span
                            class="material-symbols-rounded text-white text-[14px] opacity-0 peer-checked:opacity-100">check</span>
                    </div>
                </div>
            </label>

            <!-- Mastercard -->
            <label class="cursor-pointer">
                <input type="radio" name="payment_card" class="peer sr-only">
                <div
                    class="bg-white dark:bg-white/5 p-4 rounded-[1.5rem] shadow-sm border-2 border-transparent peer-checked:border-primary peer-checked:bg-primary/5 flex items-center justify-between transition-all">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-8 bg-gray-100 rounded flex items-center justify-center p-1">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/2/2a/Mastercard-logo.svg"
                                class="h-full object-contain">
                        </div>
                        <div>
                            <p class="font-bold text-gray-800 dark:text-white">Mastercard</p>
                            <p class="text-xs text-gray-400 font-mono">•••• 9889</p>
                        </div>
                    </div>
                    <div
                        class="w-6 h-6 rounded-full border-2 border-gray-300 peer-checked:border-primary peer-checked:bg-primary flex items-center justify-center">
                        <span
                            class="material-symbols-rounded text-white text-[14px] opacity-0 peer-checked:opacity-100">check</span>
                    </div>
                </div>
            </label>

            <!-- Apple Pay -->
            <label class="cursor-pointer">
                <input type="radio" name="payment_card" class="peer sr-only">
                <div
                    class="bg-white dark:bg-white/5 p-4 rounded-[1.5rem] shadow-sm border-2 border-transparent peer-checked:border-primary peer-checked:bg-primary/5 flex items-center justify-between transition-all">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-8 bg-black rounded flex items-center justify-center p-1">
                            <span class="material-symbols-rounded text-white">apple</span>
                        </div>
                        <div>
                            <p class="font-bold text-gray-800 dark:text-white">Apple Pay</p>
                        </div>
                    </div>
                    <div
                        class="w-6 h-6 rounded-full border-2 border-gray-300 peer-checked:border-primary peer-checked:bg-primary flex items-center justify-center">
                        <span
                            class="material-symbols-rounded text-white text-[14px] opacity-0 peer-checked:opacity-100">check</span>
                    </div>
                </div>
            </label>

            <!-- Add New Card -->
            <a href="add-card.html"
                class="bg-white dark:bg-white/5 p-4 rounded-[1.5rem] shadow-sm border-2 border-dashed border-primary/30 flex items-center gap-4 hover:bg-primary/5 transition-all text-primary group">
                <div
                    class="w-12 h-8 rounded bg-primary/10 flex items-center justify-center group-hover:scale-110 transition-transform">
                    <span class="material-symbols-rounded">add</span>
                </div>
                <span class="font-bold">ახალი ბარათის დამატება</span>
            </a>

        </div>

        <a href="top-up-success.html"
            class="w-full bg-primary text-white font-bold py-4 rounded-[1.5rem] mt-8 shadow-lg shadow-primary/30 hover:bg-primary-dark transition-all flex items-center justify-center gap-2 group">
            <span>შევსება</span>
            <span class="material-symbols-rounded group-hover:translate-x-1 transition-transform">arrow_forward</span>
        </a>

    </div>

</body>

</html>
