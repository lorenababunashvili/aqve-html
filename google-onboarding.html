<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AQUE - Complete Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#14d0a1",
                        background: "#f8f9fb",
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-background text-gray-900 font-sans min-h-[100dvh] flex flex-col relative overflow-hidden">

    <!-- Header area -->
    <header
        class="px-5 pt-12 pb-6 flex items-center justify-between z-20 sticky top-0 bg-background/90 backdrop-blur-md">
        <button onclick="history.back()"
            class="w-10 h-10 bg-white rounded-full flex items-center justify-center shadow-sm border border-gray-100 text-[#001e36]">
            <span class="material-symbols-rounded text-[24px]">arrow_back</span>
        </button>
        <h1 class="text-[18px] font-extrabold text-[#001736]">Complete Profile</h1>
        <div class="w-10 h-10"></div> <!-- Spacer for centering -->
    </header>

    <main class="flex-1 px-6 pb-10 flex flex-col z-10 overflow-y-auto">

        <!-- Welcome Info -->
        <div class="mb-8 mt-2 text-center flex flex-col items-center">
            <div
                class="w-16 h-16 bg-white rounded-[20px] shadow-sm border border-gray-100 flex items-center justify-center mb-4 relative">
                <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-8 h-8" alt="Google">
                <div
                    class="absolute -bottom-1 -right-1 w-6 h-6 bg-[#14d0a1] rounded-full border-2 border-background flex items-center justify-center">
                    <span class="material-symbols-rounded text-white text-[14px]">check</span>
                </div>
            </div>
            <h2 class="text-[24px] font-bold text-[#001736] mb-2 tracking-tight">Almost There!</h2>
            <p class="text-[14px] text-gray-500 font-medium px-4">
                You've successfully connected your Google account. Just fill in a few details to finalize your profile.
            </p>
        </div>

        <!-- Form Elements -->
        <div class="flex flex-col gap-5">

            <!-- First Name -->
            <div class="flex flex-col gap-2">
                <label class="text-[14px] font-bold text-[#001736] ml-1">First Name</label>
                <div class="relative group">
                    <div
                        class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400 group-focus-within:text-[#14d0a1] transition-colors">
                        <span class="material-symbols-rounded text-[22px]">person</span>
                    </div>
                    <input type="text"
                        class="w-full bg-white pl-[3rem] pr-4 py-3.5 rounded-2xl border border-gray-100 shadow-sm focus:border-[#14d0a1] focus:ring-4 focus:ring-[#14d0a1]/10 text-[#001736] text-[15px] font-medium outline-none transition-all placeholder:text-gray-400"
                        placeholder="e.g. John">
                </div>
            </div>

            <!-- Last Name -->
            <div class="flex flex-col gap-2">
                <label class="text-[14px] font-bold text-[#001736] ml-1">Last Name</label>
                <div class="relative group">
                    <div
                        class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400 group-focus-within:text-[#14d0a1] transition-colors">
                        <span class="material-symbols-rounded text-[22px]">badge</span>
                    </div>
                    <input type="text"
                        class="w-full bg-white pl-[3rem] pr-4 py-3.5 rounded-2xl border border-gray-100 shadow-sm focus:border-[#14d0a1] focus:ring-4 focus:ring-[#14d0a1]/10 text-[#001736] text-[15px] font-medium outline-none transition-all placeholder:text-gray-400"
                        placeholder="e.g. Doe">
                </div>
            </div>

            <!-- Username -->
            <div class="flex flex-col gap-2">
                <label class="text-[14px] font-bold text-[#001736] ml-1">Username</label>
                <div class="relative group">
                    <div
                        class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400 group-focus-within:text-[#14d0a1] transition-colors">
                        <span class="material-symbols-rounded text-[22px]">account_circle</span>
                    </div>
                    <input type="text"
                        class="w-full bg-white pl-[3rem] pr-4 py-3.5 rounded-2xl border border-gray-100 shadow-sm focus:border-[#14d0a1] focus:ring-4 focus:ring-[#14d0a1]/10 text-[#001736] text-[15px] font-medium outline-none transition-all placeholder:text-gray-400"
                        placeholder="e.g. johndoe99">
                </div>
                <p class="text-[12px] text-gray-400 font-medium ml-1 mt-1">This will be your unique identifier on AQUE.
                </p>
            </div>

        </div>

        <div class="flex-1"></div>

        <!-- Action Button -->
        <div class="mt-8 pt-4">
            <button onclick="window.location.href='home.html'"
                class="w-full bg-[#14d0a1] text-white font-bold py-4 rounded-[20px] shadow-[0_8px_20px_rgba(20,208,161,0.25)] active:scale-[0.98] transition-all flex items-center justify-center text-[16px] gap-2 hover:bg-[#12b88e]">
                <span>Complete Registration</span>
                <span class="material-symbols-rounded text-[20px]">arrow_forward</span>
            </button>
        </div>

    </main>

</body>

</html>
