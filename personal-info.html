<!DOCTYPE html>
<html class="light" lang="ka">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>აქვე - ჩემი დეტალები</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link href="https://cdn.web-fonts.ge/fonts/bpg-phone-sans/css/bpg-phone-sans.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#009485",
                        "primary-bright": "#00C2AF",
                        "background-light": "#f8fafc",
                        "background-dark": "#0f2321",
                        "surface": "#ffffff",
                    },
                    fontFamily: {
                        "display": ["BPG Phone Sans", "sans-serif"],
                        "sans": ["BPG Phone Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "2xl": "1rem",
                        "3xl": "1.5rem",
                    },
                    boxShadow: {
                        "soft": "0 10px 40px -10px rgba(0,0,0,0.05)",
                    }
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'BPG Phone Sans', sans-serif;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body class="bg-gray-50 dark:bg-background-dark text-gray-900 dark:text-white min-h-screen flex flex-col">

    <!-- Header -->
    <div class="px-6 pt-12 pb-6 flex items-center justify-between z-10">
        <a href="profile.html"
            class="p-3 bg-white dark:bg-white/10 rounded-full shadow-sm hover:bg-gray-50 transition-colors">
            <span class="material-symbols-rounded text-gray-600 dark:text-gray-200">arrow_back</span>
        </a>
        <h1 class="text-xl font-bold text-gray-800 dark:text-white">ჩემი დეტალები</h1>
        <div class="w-10"></div> <!-- Spacer for centering -->
    </div>

    <!-- Scrollable Content -->
    <div class="flex-1 overflow-y-auto no-scrollbar pb-32 px-6">

        <!-- Avatar Section -->
        <div class="flex justify-center mb-8 relative">
            <div class="relative group cursor-pointer">
                <div
                    class="w-32 h-32 rounded-full bg-blue-100 dark:bg-blue-900/30 overflow-hidden border-4 border-white dark:border-white/5 shadow-lg">
                    <img src="https://img.icons8.com/color/96/circled-user-male-skin-type-7--v1.png" alt="Profile"
                        class="w-full h-full object-cover">
                </div>
                <button
                    class="absolute bottom-0 right-0 bg-white dark:bg-zinc-800 p-2.5 rounded-full shadow-md border-2 border-gray-50 dark:border-zinc-700 hover:scale-110 transition-transform">
                    <span class="material-symbols-rounded text-primary text-[20px]">edit</span>
                </button>
            </div>
        </div>

        <!-- Form -->
        <form class="flex flex-col gap-5">
            <!-- Name -->
            <div class="flex flex-col gap-2">
                <label class="text-sm font-bold text-gray-700 dark:text-gray-300 ml-1">სახელი, გვარი</label>
                <input type="text" value="გიორგი გ."
                    class="w-full bg-white dark:bg-white/5 border-none rounded-2xl p-4 text-gray-900 dark:text-white focus:ring-2 focus:ring-primary shadow-sm placeholder:text-gray-400"
                    placeholder="სახელი, გვარი">
            </div>

            <!-- Phone -->
            <div class="flex flex-col gap-2">
                <label class="text-sm font-bold text-gray-700 dark:text-gray-300 ml-1">მობილურის ნომერი</label>
                <div class="relative">
                    <input type="tel" value="555 12 34 56"
                        class="w-full bg-white dark:bg-white/5 border-none rounded-2xl p-4 text-gray-900 dark:text-white focus:ring-2 focus:ring-primary shadow-sm placeholder:text-gray-400"
                        placeholder="5xx xx xx xx">
                    <button type="button"
                        class="absolute right-4 top-1/2 -translate-y-1/2 text-sm font-bold text-primary hover:text-primary-bright transition-colors">
                        შეცვლა
                    </button>
                </div>
            </div>

            <!-- Email -->
            <div class="flex flex-col gap-2">
                <label class="text-sm font-bold text-gray-700 dark:text-gray-300 ml-1">ელ-ფოსტა</label>
                <input type="email" value="giorgi.g@example.com"
                    class="w-full bg-white dark:bg-white/5 border-none rounded-2xl p-4 text-gray-900 dark:text-white focus:ring-2 focus:ring-primary shadow-sm placeholder:text-gray-400"
                    placeholder="ელ-ფოსტა">
            </div>

            <!-- Date of Birth -->
            <div class="flex flex-col gap-2">
                <label class="text-sm font-bold text-gray-700 dark:text-gray-300 ml-1">დაბადების თარიღი</label>
                <input type="date" value="1995-05-20"
                    class="w-full bg-white dark:bg-white/5 border-none rounded-2xl p-4 text-gray-900 dark:text-white focus:ring-2 focus:ring-primary shadow-sm accent-primary cursor-pointer text-left">
            </div>

            <!-- Gender -->
            <div class="flex flex-col gap-2">
                <label class="text-sm font-bold text-gray-700 dark:text-gray-300 ml-1">სქესი</label>
                <div class="relative">
                    <select
                        class="w-full bg-white dark:bg-white/5 border-none rounded-2xl p-4 text-gray-900 dark:text-white focus:ring-2 focus:ring-primary shadow-sm appearance-none cursor-pointer">
                        <option value="male" selected>მამრობითი</option>
                        <option value="female">მდედრობითი</option>
                        <option value="other">სხვა</option>
                    </select>
                    <span
                        class="material-symbols-rounded absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none">expand_more</span>
                </div>
            </div>
        </form>
    </div>

    <!-- Bottom Action -->
    <div
        class="p-6 bg-white/60 dark:bg-black/60 backdrop-blur-xl border-t border-gray-100 dark:border-white/5 fixed bottom-0 left-0 right-0 z-20">
        <button
            class="w-full bg-primary hover:bg-primary-bright text-white font-bold py-4 rounded-2xl shadow-lg shadow-primary/25 transition-all active:scale-[0.98]">
            პროფილის განახლება
        </button>
    </div>

</body>

</html>
