<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AQUE - Personal Info</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: "#14d0a1", background: "#f8f9fb" },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body class="bg-background text-gray-900 font-sans min-h-[100dvh] flex flex-col relative pb-32">

    <!-- Header -->
    <header
        class="px-5 pt-10 pb-4 flex items-center justify-between z-20 sticky top-0 bg-background/90 backdrop-blur-md">
        <div class="flex items-center gap-3">
            <a href="profile.html" class="p-1 text-[#001736] hover:bg-gray-100 rounded-full transition-colors">
                <span class="material-symbols-rounded text-2xl">arrow_back</span>
            </a>
            <h1 class="text-[22px] font-extrabold text-[#001736] tracking-tight">Personal Details</h1>
        </div>
        <div class="w-10"></div>
    </header>

    <!-- Scrollable Content -->
    <main class="flex-1 overflow-y-auto hide-scrollbar px-5 pt-4">

        <!-- Avatar Section -->
        <div class="flex justify-center mb-10 relative">
            <div class="relative group cursor-pointer inline-block">
                <div
                    class="w-32 h-32 rounded-full bg-gray-100 overflow-hidden border-[6px] border-white shadow-sm flex items-center justify-center">
                    <span class="material-symbols-rounded text-[64px] text-gray-300">person</span>
                </div>
                <button
                    class="absolute bottom-0 right-0 bg-[#001736] p-3 rounded-full shadow-md border-[3px] border-white hover:scale-105 active:scale-95 transition-transform text-white">
                    <span class="material-symbols-rounded text-[18px]">edit</span>
                </button>
            </div>
        </div>

        <!-- Form -->
        <form class="flex flex-col gap-5">

            <div class="bg-white p-5 rounded-[28px] shadow-sm border border-gray-100 flex flex-col gap-6">

                <!-- Name -->
                <div class="flex flex-col gap-2">
                    <label class="text-[12px] font-bold text-gray-400 uppercase tracking-widest ml-1">Name</label>
                    <input type="text" value="Giorgi G."
                        class="w-full bg-gray-50 border border-gray-100 rounded-[16px] px-4 py-3.5 text-[#001736] bg-transparent focus:ring-2 focus:ring-[#14d0a1]/30 focus:bg-white shadow-sm font-bold text-[15px] outline-none"
                        placeholder="Full Name">
                </div>

                <!-- Phone -->
                <div class="flex flex-col gap-2 relative">
                    <label class="text-[12px] font-bold text-gray-400 uppercase tracking-widest ml-1">Phone
                        Number</label>
                    <div class="relative group focus-within:ring-2 focus-within:ring-[#14d0a1]/30 rounded-[16px]">
                        <input type="tel" value="555 12 34 56"
                            class="w-full bg-gray-50 border border-gray-100 rounded-[16px] px-4 py-3.5 text-[#001736] group-focus-within:bg-white shadow-sm font-bold text-[15px] outline-none"
                            placeholder="5xx xx xx xx">
                        <button type="button"
                            class="absolute right-4 top-1/2 -translate-y-1/2 text-[13px] font-extrabold text-[#14d0a1] hover:opacity-80 transition-opacity uppercase tracking-widest">
                            Change
                        </button>
                    </div>
                </div>

                <!-- Email -->
                <div class="flex flex-col gap-2">
                    <label class="text-[12px] font-bold text-gray-400 uppercase tracking-widest ml-1">Email</label>
                    <input type="email" value="giorgi.g@example.com"
                        class="w-full bg-gray-50 border border-gray-100 rounded-[16px] px-4 py-3.5 text-[#001736] bg-transparent focus:ring-2 focus:ring-[#14d0a1]/30 focus:bg-white shadow-sm font-bold text-[15px] outline-none"
                        placeholder="Email Address">
                </div>

                <!-- Date of Birth -->
                <div class="flex flex-col gap-2">
                    <label class="text-[12px] font-bold text-gray-400 uppercase tracking-widest ml-1">Date of
                        Birth</label>
                    <input type="date" value="1995-05-20"
                        class="w-full bg-gray-50 border border-gray-100 rounded-[16px] px-4 py-3.5 text-[#001736] bg-transparent focus:ring-2 focus:ring-[#14d0a1]/30 focus:bg-white shadow-sm font-bold text-[15px] outline-none accent-[#14d0a1] cursor-pointer text-left">
                </div>

                <!-- Gender -->
                <div class="flex flex-col gap-2">
                    <label class="text-[12px] font-bold text-gray-400 uppercase tracking-widest ml-1">Gender</label>
                    <div class="relative focus-within:ring-2 focus-within:ring-[#14d0a1]/30 rounded-[16px]">
                        <select
                            class="w-full bg-gray-50 border border-gray-100 rounded-[16px] px-4 py-3.5 text-[#001736] bg-transparent outline-none focus:bg-white shadow-sm font-bold text-[15px] appearance-none cursor-pointer">
                            <option value="male" selected>Male</option>
                            <option value="female">Female</option>
                            <option value="other">Other</option>
                        </select>
                        <span
                            class="material-symbols-rounded absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 pointer-events-none">unfold_more</span>
                    </div>
                </div>

            </div>
        </form>

    </main>

    <!-- Bottom Action -->
    <div
        class="fixed bottom-0 left-0 right-0 p-5 z-20 bg-gradient-to-t from-background via-background to-transparent pt-12">
        <button
            class="w-full bg-gradient-to-r from-[#17e3ae] to-[#8affda] text-[#003822] hover:opacity-90 font-bold py-4 rounded-[20px] shadow-[0_8px_16px_rgba(20,208,161,0.25)] transition-all active:scale-[0.98] text-[16px]">
            Save Changes
        </button>
    </div>

</body>

</html>
