<!DOCTYPE html>
<html class="light" lang="ka">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>აქვე - ქვითარი</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link href="https://cdn.web-fonts.ge/fonts/bpg-phone-sans/css/bpg-phone-sans.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#009485",
                        "primary-bright": "#00C2AF",
                        "background-light": "#f5f8f8",
                        "background-dark": "#0f2321",
                        "success": "#22C55E",
                        "warning": "#F59E0B",
                        "surface": "#ffffff",
                        "surface-dark": "#18181b"
                    },
                    fontFamily: {
                        "display": ["BPG Phone Sans", "sans-serif"],
                        "sans": ["BPG Phone Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "2xl": "1rem",
                        "3xl": "1.5rem",
                    },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'BPG Phone Sans', sans-serif;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .dark .glass-panel {
            background: rgba(15, 35, 33, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .star-filled {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            color: #F59E0B;
            /* Amber-500 */
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark text-gray-900 dark:text-white min-h-screen flex flex-col relative overflow-hidden">

    <!-- Background Decoration -->
    <div
        class="fixed top-[-10%] right-[-10%] w-[80vw] h-[80vw] bg-primary/20 rounded-full blur-3xl pointer-events-none">
    </div>
    <div
        class="fixed bottom-[-10%] left-[-10%] w-[60vw] h-[60vw] bg-primary-bright/10 rounded-full blur-3xl pointer-events-none">
    </div>

    <!-- Header -->
    <div class="px-6 pt-8 pb-4 z-10 flex items-center gap-4">
        <h1 class="text-xl font-bold">ქვითარი</h1>
    </div>

    <div class="flex-1 px-6 pb-8 z-10 flex flex-col gap-6 overflow-y-auto">

        <!-- Receipt Card -->
        <div class="glass-panel p-6 rounded-[2rem] shadow-sm flex flex-col gap-6 relative">

            <div class="flex flex-col items-center gap-1 mb-2">
                <div class="w-16 h-16 bg-success/10 rounded-full flex items-center justify-center mb-2">
                    <span class="material-symbols-outlined text-[32px] text-success">check_circle</span>
                </div>
                <h2 class="text-xl font-bold">გადახდა წარმატებულია</h2>
                <p class="text-sm text-gray-500">24 ოქტ. 2023, 14:30</p>
            </div>

            <div class="h-px w-full bg-gray-200 dark:bg-gray-700/50"></div>

            <!-- Details -->
            <div class="flex flex-col gap-4">
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <span class="material-symbols-outlined text-gray-400">location_on</span>
                        <span class="text-sm font-bold text-gray-600 dark:text-gray-300">ლოკაცია</span>
                    </div>
                    <span class="text-sm font-bold text-right">ჭავჭავაძის გამზ. #34</span>
                </div>
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <span class="material-symbols-outlined text-gray-400">timer</span>
                        <span class="text-sm font-bold text-gray-600 dark:text-gray-300">ხანგრძლივობა</span>
                    </div>
                    <span class="text-sm font-bold text-right">00:45:12</span>
                </div>
                <div class="flex items-center justify-between">
                    <div class="flex items-center gap-3">
                        <span class="material-symbols-outlined text-gray-400">payments</span>
                        <span class="text-sm font-bold text-gray-600 dark:text-gray-300">საკომისიო</span>
                    </div>
                    <span class="text-sm font-bold text-right">0.00 ₾</span>
                </div>
            </div>

            <div class="h-px w-full bg-dashed bg-gray-200 dark:bg-gray-700/50"></div>

            <!-- Total -->
            <div class="flex items-center justify-between">
                <span class="text-lg font-bold">სულ გადახდილი</span>
                <span class="text-2xl font-extrabold text-primary">2.25 ₾</span>
            </div>
        </div>

        <!-- Rating -->
        <div class="glass-panel p-6 rounded-3xl shadow-sm flex flex-col items-center gap-4">
            <h3 class="text-sm font-bold text-gray-500 uppercase tracking-wide">შეაფასეთ სერვისი</h3>
            <div class="flex gap-2" id="star-container">
                <button class="text-gray-300 hover:text-amber-400 transition-colors" data-rating="1">
                    <span class="material-symbols-outlined text-[36px]">star</span>
                </button>
                <button class="text-gray-300 hover:text-amber-400 transition-colors" data-rating="2">
                    <span class="material-symbols-outlined text-[36px]">star</span>
                </button>
                <button class="text-gray-300 hover:text-amber-400 transition-colors" data-rating="3">
                    <span class="material-symbols-outlined text-[36px]">star</span>
                </button>
                <button class="text-gray-300 hover:text-amber-400 transition-colors" data-rating="4">
                    <span class="material-symbols-outlined text-[36px]">star</span>
                </button>
                <button class="text-gray-300 hover:text-amber-400 transition-colors" data-rating="5">
                    <span class="material-symbols-outlined text-[36px]">star</span>
                </button>
            </div>
        </div>

        <!-- Home Button -->
        <a href="home.html"
            class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-2xl shadow-lg shadow-primary/30 transition-all flex items-center justify-center gap-2 active:scale-[0.98]">
            <span>მთავარზე დაბრუნება</span>
            <span class="material-symbols-outlined">home</span>
        </a>

    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const stars = document.querySelectorAll('#star-container button');

            stars.forEach(star => {
                star.addEventListener('click', () => {
                    const rating = parseInt(star.dataset.rating);
                    updateStars(rating);
                });
            });

            function updateStars(rating) {
                stars.forEach(star => {
                    const starRating = parseInt(star.dataset.rating);
                    const icon = star.querySelector('span');

                    if (starRating <= rating) {
                        star.classList.remove('text-gray-300');
                        star.classList.add('text-amber-500');
                        icon.classList.add('font-variation-fill'); // Uses font variation for filled state
                        icon.style.fontVariationSettings = "'FILL' 1";
                    } else {
                        star.classList.add('text-gray-300');
                        star.classList.remove('text-amber-500');
                        icon.classList.remove('font-variation-fill');
                        icon.style.fontVariationSettings = "'FILL' 0";
                    }
                });
            }
        });
    </script>
</body>

</html>
