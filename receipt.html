<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AQUE - Receipt</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: "#14d0a1", background: "#f8f9fb" },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .receipt-cutout-left {
            position: absolute;
            left: -12px;
            top: 50%;
            transform: translateY(-50%);
            width: 24px;
            height: 24px;
            background-color: #f8f9fb;
            border-radius: 50%;
        }

        .receipt-cutout-right {
            position: absolute;
            right: -12px;
            top: 50%;
            transform: translateY(-50%);
            width: 24px;
            height: 24px;
            background-color: #f8f9fb;
            border-radius: 50%;
        }
    </style>
</head>

<body class="bg-background text-gray-900 font-sans min-h-[100dvh] flex flex-col relative overflow-hidden">

    <!-- Header -->
    <header
        class="px-5 pt-10 pb-4 flex items-center justify-between z-20 sticky top-0 bg-background/90 backdrop-blur-md">
        <h1 class="text-[22px] font-extrabold text-[#001736]">Receipt</h1>
        <div class="w-10"></div>
    </header>

    <div class="flex-1 px-5 pb-8 z-10 flex flex-col gap-6 overflow-y-auto">

        <!-- Receipt Card -->
        <div class="bg-white rounded-[28px] shadow-sm border border-gray-100 flex flex-col relative overflow-hidden">

            <div class="p-6 flex flex-col items-center text-center pb-8 border-b border-dashed border-gray-200">
                <div class="w-16 h-16 bg-[#e4fff6] rounded-full flex items-center justify-center mb-4">
                    <span class="material-symbols-rounded text-[32px] text-[#14d0a1]">check_circle</span>
                </div>
                <h2 class="text-[20px] font-extrabold text-[#001736]">Payment Successful</h2>
                <p class="text-[13px] text-gray-400 font-bold mt-1">Oct 24, 2023, 14:30</p>
            </div>

            <!-- Cutouts for visual effect -->
            <div class="receipt-cutout-left"></div>
            <div class="receipt-cutout-right"></div>

            <div class="p-6 pt-5 flex flex-col gap-4">
                <div class="flex items-center justify-between">
                    <span class="text-[13px] font-bold text-gray-400 flex items-center gap-2">
                        <span class="material-symbols-rounded text-[18px]">location_on</span> Location
                    </span>
                    <span class="text-[14px] font-bold text-[#001736] text-right">Chavchavadze Ave. 34</span>
                </div>
                <div class="flex items-center justify-between">
                    <span class="text-[13px] font-bold text-gray-400 flex items-center gap-2">
                        <span class="material-symbols-rounded text-[18px]">timer</span> Duration
                    </span>
                    <span
                        class="text-[14px] font-bold text-[#001736] text-right text-mono tracking-wide w-fit font-mono">00:45:12</span>
                </div>
                <div class="flex items-center justify-between">
                    <span class="text-[13px] font-bold text-gray-400 flex items-center gap-2">
                        <span class="material-symbols-rounded text-[18px]">payments</span> Fee
                    </span>
                    <span class="text-[14px] font-bold text-[#001736] text-right">0.00 ₾</span>
                </div>
            </div>

            <div class="px-6 py-5 bg-gray-50 flex items-center justify-between mt-auto">
                <span class="text-[14px] font-bold text-gray-500 uppercase tracking-widest text-[12px]">Total
                    Paid</span>
                <span class="text-[24px] font-extrabold text-[#14d0a1] tracking-tight">2.25 ₾</span>
            </div>

        </div>

        <!-- Rating -->
        <div class="bg-white p-6 rounded-[28px] shadow-sm border border-gray-100 flex flex-col items-center gap-4">
            <h3 class="text-[13px] font-bold text-[#001736] tracking-wide">Rate your experience</h3>
            <div class="flex gap-2" id="star-container">
                <button class="text-gray-200 hover:text-amber-400 transition-colors" data-rating="1">
                    <span class="material-symbols-rounded text-[36px]">star</span>
                </button>
                <button class="text-gray-200 hover:text-amber-400 transition-colors" data-rating="2">
                    <span class="material-symbols-rounded text-[36px]">star</span>
                </button>
                <button class="text-gray-200 hover:text-amber-400 transition-colors" data-rating="3">
                    <span class="material-symbols-rounded text-[36px]">star</span>
                </button>
                <button class="text-gray-200 hover:text-amber-400 transition-colors" data-rating="4">
                    <span class="material-symbols-rounded text-[36px]">star</span>
                </button>
                <button class="text-gray-200 hover:text-amber-400 transition-colors" data-rating="5">
                    <span class="material-symbols-rounded text-[36px]">star</span>
                </button>
            </div>
        </div>

        <!-- Home Button -->
        <a href="home.html"
            class="w-full bg-gradient-to-r from-[#17e3ae] to-[#8affda] text-[#003822] hover:opacity-90 font-bold py-4 rounded-2xl shadow-[0_8px_16px_rgba(20,208,161,0.25)] transition-all flex items-center justify-center gap-2 active:scale-[0.98] text-[16px]">
            <span>Back to Home</span>
            <span class="material-symbols-rounded text-[20px]">home</span>
        </a>

    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const stars = document.querySelectorAll('#star-container button');

            stars.forEach(star => {
                star.addEventListener('click', () => {
                    const rating = parseInt(star.dataset.rating);
                    updateStars(rating);
                });
            });

            function updateStars(rating) {
                stars.forEach(star => {
                    const starRating = parseInt(star.dataset.rating);
                    const icon = star.querySelector('span');

                    if (starRating <= rating) {
                        star.classList.remove('text-gray-200');
                        star.classList.add('text-amber-400');
                        icon.style.fontVariationSettings = "'FILL' 1";
                    } else {
                        star.classList.add('text-gray-200');
                        star.classList.remove('text-amber-400');
                        icon.style.fontVariationSettings = "'FILL' 0";
                    }
                });
            }
        });
    </script>
</body>

</html>
