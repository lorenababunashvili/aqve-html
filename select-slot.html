            font-family: 'Inter', sans-serif;
            background-color: #fcfdfd;

        /* Hide scrollbar */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Only layout utility needed for cars */
        .car-container {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 80px;
            height: 46px;
        }

        .car-container-v {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 60px;
        }

        .svg-car {
