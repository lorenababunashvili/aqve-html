<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Select Parking Slot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#14c896",
                        surface: "#ffffff",
                        background: "#ffffff", /* The image shows white background mostly, with subtle gray elements */
                        brand: {
                            blue: "#2b7df6",  /* Selected blue from tabs */
                            cyan: "#0dd1e3",  /* Available cyan slot */
                            gray: "#939eb2",  /* Booked gray */
                            slotBorder: "#0ab2c4"
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body class="bg-surface text-gray-900 font-sans min-h-screen flex flex-col relative pb-24">

    <!-- Header -->
    <header class="px-5 pt-10 pb-4 flex items-center justify-between z-20 sticky top-0 bg-white">
        <button onclick="history.back()" class="p-1 text-gray-800">
            <span class="material-symbols-rounded text-2xl">arrow_back</span>
        </button>
        <h1 class="text-[20px] font-extrabold text-gray-900 tracking-tight flex-1 text-center translate-x-1">Select
            Parking Slot</h1>
        <button class="p-1 text-gray-800">
            <span class="material-symbols-rounded text-[22px]">info</span>
        </button>
    </header>

    <!-- Content -->
    <main class="flex-1 flex flex-col">

        <!-- Tabs -->
        <div class="px-5 mt-2 flex gap-3">
            <button class="flex-[1.2] py-2.5 bg-[#2b7df6] text-white rounded-[20px] shadow-sm font-bold text-[14px]">
                1st Floor
            </button>
            <button class="flex-1 py-2.5 bg-[#f5f6f8] text-gray-600 rounded-[20px] font-bold text-[14px]">
                2nd Floor
            </button>
            <button class="flex-1 py-2.5 bg-[#f5f6f8] text-gray-600 rounded-[20px] font-bold text-[14px]">
                3rd Floor
            </button>
        </div>

        <!-- Slider below tabs -->
        <div class="px-5 mt-4 flex items-center gap-2 justify-center max-w-[300px] mx-auto w-full">
            <span class="material-symbols-rounded text-gray-400 text-[18px]">arrow_left</span>
            <div class="flex-1 h-2.5 bg-gray-400 rounded-full"></div>
            <span class="material-symbols-rounded text-gray-400 text-[18px]">arrow_right</span>
        </div>

        <!-- Divider -->
        <div class="w-full h-px bg-gray-100 my-4"></div>

        <!-- Legend -->
        <div class="px-5 flex justify-center gap-6 mb-4">
            <div class="flex items-center gap-1.5">
                <div class="w-[20px] h-[20px] bg-[#0cebf1] rounded-md box-border"></div>
                <span class="text-[12px] text-gray-600 font-medium">Available</span>
            </div>
            <div class="flex items-center gap-1.5">
                <div class="w-[20px] h-[20px] bg-[#9ca6ba] border border-[#7a8499] rounded-md box-border"></div>
                <span class="text-[12px] text-gray-600 font-medium">Booked</span>
            </div>
            <div class="flex items-center gap-1.5">
                <div class="w-[20px] h-[20px] bg-[#2b7df6] rounded-md box-border"></div>
                <span class="text-[12px] text-gray-600 font-medium">Selected</span>
            </div>
        </div>

        <!-- Horizontal line -->
        <div class="w-full h-px bg-gray-100 mb-6"></div>

        <!-- Map Container -->
        <div class="mx-5 bg-[#fafbfc] rounded-[32px] border border-gray-100 shadow-sm p-4 relative pb-8 min-h-[500px]">

            <!-- Entry Point -->
            <div class="flex flex-col items-center absolute top-5 left-0 right-0 z-10">
                <div class="flex items-center w-full px-12 gap-3 justify-center mb-6">
                    <div class="flex-1 h-px bg-[#8ab4f8]"></div>
                    <span class="text-[#2b7df6] bg-[#eff3fe] px-3 py-1 rounded-full text-[12px] font-bold">Entry</span>
                    <div class="flex-1 h-px bg-[#8ab4f8]"></div>
                </div>
            </div>

            <div class="mt-16 grid grid-cols-2 gap-x-4 gap-y-4 px-2">

                <!-- Slot A (Available) -->
                <div
                    class="h-[95px] bg-[#0cebf1] rounded-[16px] border-[1.5px] border-[#02c3cc] relative flex items-center justify-center shadow-sm relative overflow-hidden">
                    <div
                        class="absolute inset-1.5 border border-[#4beff6] rounded-[10px] opacity-70 pointer-events-none">
                    </div>
                    <span class="text-white text-[24px] font-black z-10">A</span>
                    <div
                        class="absolute top-2.5 right-2.5 bg-white text-[#0adce3] w-6 h-6 rounded-full flex items-center justify-center text-[10px] font-bold z-10 shadow-sm">
                        A</div>
                </div>

                <!-- Slot B (Available) -->
                <div
                    class="h-[95px] bg-[#0cebf1] rounded-[16px] border-[1.5px] border-[#02c3cc] relative flex items-center justify-center shadow-sm relative overflow-hidden">
                    <div
                        class="absolute inset-1.5 border border-[#4beff6] rounded-[10px] opacity-70 pointer-events-none">
                    </div>
                    <span class="text-white text-[24px] font-black z-10">B</span>
                    <div
                        class="absolute top-2.5 right-2.5 bg-white text-[#0adce3] w-6 h-6 rounded-full flex items-center justify-center text-[10px] font-bold z-10 shadow-sm">
                        B</div>
                </div>

                <!-- Slot C (Booked) -->
                <div
                    class="h-[95px] bg-[#9ba4b5] rounded-[16px] border-[1.5px] border-[#7d879c] relative flex items-center justify-center shadow-sm relative overflow-hidden">
                    <div
                        class="absolute inset-1.5 border border-[#b2bbc7] rounded-[10px] opacity-70 pointer-events-none">
                    </div>
                    <span class="text-white text-[24px] font-black z-10">C</span>
                    <div
                        class="absolute top-2.5 right-2 px-2 h-6 bg-white text-gray-800 rounded-full flex items-center justify-center text-[10px] font-bold z-10 shadow-sm">
                        Booked</div>
                </div>

                <!-- Slot D (Available) -->
                <div
                    class="h-[95px] bg-[#0cebf1] rounded-[16px] border-[1.5px] border-[#02c3cc] relative flex items-center justify-center shadow-sm relative overflow-hidden">
                    <div
                        class="absolute inset-1.5 border border-[#4beff6] rounded-[10px] opacity-70 pointer-events-none">
                    </div>
                    <span class="text-white text-[24px] font-black z-10">D</span>
                    <div
                        class="absolute top-2.5 right-2.5 bg-white text-[#0adce3] w-6 h-6 rounded-full flex items-center justify-center text-[10px] font-bold z-10 shadow-sm">
                        D</div>
                </div>

                <!-- Driving Lane Section -->
                <div class="col-span-2 my-1.5">
                    <div
                        class="w-[90%] mx-auto py-2.5 bg-[#f4f5f8] rounded-xl border-[1.5px] border-dashed border-gray-300 flex items-center justify-center">
                        <span class="text-[12px] font-bold text-gray-400 tracking-wide">Driving Lane</span>
                    </div>
                </div>

                <!-- Slot E (Booked) -->
                <div
                    class="h-[95px] bg-[#9ba4b5] rounded-[16px] border-[1.5px] border-[#7d879c] relative flex items-center justify-center shadow-sm relative overflow-hidden">
                    <div
                        class="absolute inset-1.5 border border-[#b2bbc7] rounded-[10px] opacity-70 pointer-events-none">
                    </div>
                    <span class="text-white text-[24px] font-black z-10">E</span>
                    <div
                        class="absolute top-2.5 right-2 px-2 h-6 bg-white text-gray-800 rounded-full flex items-center justify-center text-[10px] font-bold z-10 shadow-sm">
                        Booked</div>
                </div>

                <!-- Slot F (Available) -->
                <div
                    class="h-[95px] bg-[#0cebf1] rounded-[16px] border-[1.5px] border-[#02c3cc] relative flex items-center justify-center shadow-sm relative overflow-hidden">
                    <div
                        class="absolute inset-1.5 border border-[#4beff6] rounded-[10px] opacity-70 pointer-events-none">
                    </div>
                    <span class="text-white text-[24px] font-black z-10">F</span>
                    <div
                        class="absolute top-2.5 right-2.5 bg-white text-[#0adce3] w-6 h-6 rounded-full flex items-center justify-center text-[10px] font-bold z-10 shadow-sm">
                        F</div>
                </div>

                <!-- Slot G (Available) -->
                <div
                    class="h-[95px] bg-[#0cebf1] rounded-[16px] border-[1.5px] border-[#02c3cc] relative flex items-center justify-center shadow-sm relative overflow-hidden">
                    <div
                        class="absolute inset-1.5 border border-[#4beff6] rounded-[10px] opacity-70 pointer-events-none">
                    </div>
                    <span class="text-white text-[24px] font-black z-10">G</span>
                    <div
                        class="absolute top-2.5 right-2.5 bg-white text-[#0adce3] w-6 h-6 rounded-full flex items-center justify-center text-[10px] font-bold z-10 shadow-sm">
                        G</div>
                </div>

                <!-- Slot H (Available) -->
                <div
                    class="h-[95px] bg-[#0cebf1] rounded-[16px] border-[1.5px] border-[#02c3cc] relative flex items-center justify-center shadow-sm relative overflow-hidden">
                    <div
                        class="absolute inset-1.5 border border-[#4beff6] rounded-[10px] opacity-70 pointer-events-none">
                    </div>
                    <span class="text-white text-[24px] font-black z-10">H</span>
                    <div
                        class="absolute top-2.5 right-2.5 bg-white text-[#0adce3] w-6 h-6 rounded-full flex items-center justify-center text-[10px] font-bold z-10 shadow-sm">
                        H</div>
                </div>

            </div>
        </div>

    </main>

    <!-- Bottom Navigation -->
    <nav
        class="fixed bottom-0 left-0 w-full bg-white border-t border-gray-100 flex justify-between items-center z-40 pb-safe pt-2 px-1">
        <a href="home.html" class="flex flex-col items-center flex-1 py-2 text-gray-400">
            <span class="material-symbols-rounded text-[28px]">home</span>
            <span class="text-[10px] mt-1 font-medium">Home</span>
        </a>
        <a href="select-slot.html" class="flex flex-col items-center flex-1 py-1 text-gray-400">
            <span class="material-symbols-rounded text-[28px]">local_activity</span>
            <span class="text-[10px] mt-1 font-medium">Parking</span>
        </a>
        <a href="history.html" class="flex flex-col items-center flex-1 py-2 text-gray-400">
            <span class="material-symbols-rounded text-[28px]">schedule</span>
            <span class="text-[10px] mt-1 font-medium">Bookings</span>
        </a>
        <a href="vehicles.html" class="flex flex-col items-center flex-1 py-2 text-gray-400">
            <span class="material-symbols-rounded text-[28px]">directions_car</span>
            <span class="text-[10px] mt-1 font-medium">Vehicles</span>
        </a>
        <a href="profile.html" class="flex flex-col items-center flex-1 py-2 text-gray-400">
            <span class="material-symbols-rounded text-[28px]">person</span>
            <span class="text-[10px] mt-1 font-medium">Profile</span>
        </a>
    </nav>
</body>

</html>
