<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AQUE - Success</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#14d0a1",
                        background: "#14d0a1",
                        card: "#ffffff"
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-[#14d0a1] text-gray-900 font-sans min-h-[100dvh] flex flex-col relative overflow-hidden">

    <!-- Background Content that is blurred -->
    <div class="absolute inset-0 z-0 flex flex-col pointer-events-none">
        <!-- Header Area -->
        <div class="pt-12 pb-6 px-6 flex justify-between items-center bg-[#14d0a1]">
            <div class="text-white text-[15px] font-medium tracking-wide">9:41</div>
            <div class="flex items-center gap-1.5 opacity-90">
                <span class="material-symbols-rounded text-white text-[16px]">signal_cellular_alt</span>
                <span class="material-symbols-rounded text-white text-[16px]">wifi</span>
                <span class="material-symbols-rounded text-white text-[18px]">battery_full</span>
            </div>
        </div>
        <!-- White card behind modal -->
        <div class="flex-1 bg-white rounded-t-[32px] mt-4 shadow-[0_-10px_40px_rgba(0,0,0,0.1)]">
            <!-- Placeholder content to simulate the background page -->
            <div class="px-6 pt-8">
                <div class="flex items-center gap-2 mb-6 opacity-30">
                    <svg width="24" height="24" viewBox="0 0 100 100" fill="currentColor">
                        <path d="..." />
                    </svg>
                    <span class="text-[18px] font-bold">AQVE</span>
                </div>
                <div class="h-8 w-48 bg-gray-200 rounded-md mb-8 opacity-30"></div>
                <div class="h-12 w-full bg-gray-100 rounded-full mb-8 opacity-30"></div>
                <div class="space-y-6 opacity-30">
                    <div class="h-14 w-full bg-gray-50 rounded-2xl border border-gray-200"></div>
                    <div class="h-14 w-full bg-gray-50 rounded-2xl border border-gray-200"></div>
                    <div class="h-14 w-full bg-gray-50 rounded-2xl border border-gray-200"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Black/Gray Overlay Backdrop -->
    <div class="absolute inset-0 bg-black/40 backdrop-blur-sm z-30 transition-opacity"></div>

    <!-- Modal Container -->
    <div class="absolute inset-0 z-40 flex items-center justify-center p-6">
        <!-- White Popup -->
        <div
            class="bg-white rounded-[32px] w-full max-w-sm p-8 flex flex-col items-center text-center shadow-2xl animate-[fadeIn_0.3s_ease-out]">

            <!-- Success Icon with Particles -->
            <div class="relative w-32 h-32 mb-6 flex items-center justify-center">
                <!-- Outer Particles (Animated) -->
                <div class="absolute inset-0 animate-pulse">
                    <div class="absolute top-2 left-6 w-2 h-2 rounded-full bg-[#14d0a1]/30"></div>
                    <div class="absolute top-4 right-8 w-4 h-4 rounded-full bg-[#14d0a1]/40"></div>
                    <div class="absolute bottom-6 left-8 w-3 h-3 rounded-full bg-[#14d0a1]/20"></div>
                    <div class="absolute bottom-8 right-6 w-2 h-2 rounded-full bg-[#14d0a1]/30"></div>
                    <div class="absolute top-1/2 left-2 w-1.5 h-1.5 rounded-full bg-[#14d0a1]/40"></div>
                    <div class="absolute bottom-2 right-12 w-2 h-2 rounded-full bg-[#14d0a1]/50"></div>
                </div>
                <!-- Main Circle -->
                <div
                    class="w-24 h-24 bg-[#14d0a1] rounded-full flex items-center justify-center z-10 shadow-[0_8px_24px_rgba(20,208,161,0.4)]">
                    <span class="material-symbols-rounded text-white text-[48px] font-bold">check_circle</span>
                </div>
            </div>

            <h2 class="text-[28px] font-bold text-gray-900 mb-3 tracking-tight">Verify Your Email</h2>
            <p class="text-gray-500 text-[15px] leading-relaxed mb-8 px-2 font-medium">
                We've sent a verification code to your email. Please check your inbox to continue.
            </p>

            <button onclick="window.location.href='otp-register.html'"
                class="w-full bg-[#14d0a1] text-white font-semibold py-4 rounded-[20px] shadow-[0_8px_20px_rgba(20,208,161,0.25)] active:scale-[0.98] transition-all text-[16px] hover:bg-[#12b88e]">
                Continue to OTP
            </button>
        </div>
    </div>

</body>

</html>
