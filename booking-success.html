<!DOCTYPE html>
<html class="light" lang="ka">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>აქვე - დაჯავშნა წარმატებულია</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link href="https://cdn.web-fonts.ge/fonts/bpg-phone-sans/css/bpg-phone-sans.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#009485",
                        "primary-bright": "#00C2AF",
                        "background-light": "#f8fafc",
                        "background-dark": "#0f2321",
                        "surface": "#ffffff",
                    },
                    fontFamily: {
                        "display": ["BPG Phone Sans", "sans-serif"],
                        "sans": ["BPG Phone Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "2xl": "1rem",
                        "3xl": "1.5rem",
                    },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'BPG Phone Sans', sans-serif;
        }

        @keyframes check-scale {
            0% {
                transform: scale(0);
                opacity: 0;
            }

            50% {
                transform: scale(1.2);
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .animate-check {
            animation: check-scale 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
    </style>
</head>

<body
    class="bg-gradient-to-br from-[#E0F2F1] to-[#E0F7FA] dark:from-background-dark dark:to-black text-gray-900 dark:text-white min-h-screen flex flex-col items-center justify-center p-6 relative overflow-hidden">

    <!-- Decorative Background Elements -->
    <div class="absolute top-0 right-0 w-64 h-64 bg-primary/10 rounded-full -mr-20 -mt-20 blur-3xl pointer-events-none">
    </div>
    <div
        class="absolute bottom-0 left-0 w-80 h-80 bg-blue-500/10 rounded-full -ml-20 -mb-20 blur-3xl pointer-events-none">
    </div>

    <!-- Success Card -->
    <div
        class="bg-white dark:bg-white/5 rounded-[2.5rem] p-8 shadow-2xl border border-white/50 dark:border-white/5 text-center w-full max-w-sm relative z-10">

        <!-- Success Icon -->
        <div class="w-24 h-24 bg-green-50 rounded-full flex items-center justify-center mx-auto mb-6 animate-check">
            <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center">
                <span class="material-symbols-rounded text-green-500 text-5xl font-bold">check</span>
            </div>
        </div>

        <h1 class="text-2xl font-extrabold text-[#101818] dark:text-white mb-3">ადგილი<br>დაჯავშნილია!</h1>

        <p class="text-gray-500 dark:text-gray-400 text-sm font-medium leading-relaxed mb-8">
            თქვენ წარმატებით დაჯავშნეთ<br>საპარკინგე ადგილი.
        </p>

        <!-- Actions -->
        <div class="flex flex-col gap-3">
            <a href="active-session.html"
                class="w-full bg-primary text-white font-bold py-4 rounded-[1.5rem] shadow-lg shadow-primary/30 hover:bg-primary-dark transition-all flex items-center justify-center gap-2 group">
                <span>მიმდინარე სესია</span>
                <span
                    class="material-symbols-rounded group-hover:translate-x-1 transition-transform">arrow_forward</span>
            </a>

            <a href="home.html"
                class="w-full bg-transparent text-gray-500 dark:text-gray-400 font-bold py-4 rounded-[1.5rem] hover:bg-gray-50 dark:hover:bg-white/5 transition-all flex items-center justify-center gap-2">
                <span>მთავარზე დაბრუნება</span>
            </a>
        </div>

    </div>

</body>

</html>
