<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loading States</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: "#14d0a1", background: "#f6f8fb" },
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    animation: { 'shimmer': 'shimmer 2s infinite linear' },
                    keyframes: {
                        shimmer: {
                            '0%': { backgroundPosition: '-1000px 0' },
                            '100%': { backgroundPosition: '1000px 0' }
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .skeleton-box {
            background: #e2e8f0;
            background-image: linear-gradient(90deg, #e2e8f0 0px, #f1f5f9 40px, #e2e8f0 80px);
            background-size: 1000px 100%;
            border-radius: 8px;
            animation: shimmer 2s infinite linear;
        }
    </style>
</head>

<body class="bg-background text-gray-900 font-sans min-h-[100dvh] flex flex-col p-5">

    <header class="flex items-center justify-between mb-8 pt-5">
        <div class="skeleton-box w-10 h-10 rounded-full"></div>
        <div class="skeleton-box w-32 h-6 rounded-md"></div>
        <div class="skeleton-box w-10 h-10 rounded-full"></div>
    </header>

    <!-- Map Area Loading -->
    <div class="w-full h-48 skeleton-box rounded-[24px] mb-8 relative">
        <div class="absolute bottom-4 left-4 flex gap-2">
            <div class="skeleton-box w-20 h-8 rounded-full bg-white/50 border border-white"></div>
            <div class="skeleton-box w-20 h-8 rounded-full bg-white/50 border border-white"></div>
        </div>
    </div>

    <!-- Section Title Loading -->
    <div class="skeleton-box w-40 h-5 mb-4 rounded-md"></div>

    <!-- Parking Cards Loading Skeletons -->
    <div class="flex flex-col gap-4">

        <!-- Card 1 -->
        <div class="bg-white p-4 rounded-[20px] border border-gray-100 flex items-center gap-4">
            <div class="skeleton-box w-14 h-14 rounded-[14px] shrink-0"></div>
            <div class="flex-1 flex flex-col gap-2">
                <div class="skeleton-box w-full h-4 rounded-md"></div>
                <div class="skeleton-box w-2/3 h-3 rounded-md"></div>
            </div>
            <div class="flex flex-col items-end gap-2 shrink-0">
                <div class="skeleton-box w-12 h-4 rounded-md"></div>
                <div class="skeleton-box w-8 h-3 rounded-md"></div>
            </div>
        </div>

        <!-- Card 2 -->
        <div class="bg-white p-4 rounded-[20px] border border-gray-100 flex items-center gap-4">
            <div class="skeleton-box w-14 h-14 rounded-[14px] shrink-0"></div>
            <div class="flex-1 flex flex-col gap-2">
                <div class="skeleton-box w-5/6 h-4 rounded-md"></div>
                <div class="skeleton-box w-1/2 h-3 rounded-md"></div>
            </div>
            <div class="flex flex-col items-end gap-2 shrink-0">
                <div class="skeleton-box w-14 h-4 rounded-md"></div>
                <div class="skeleton-box w-10 h-3 rounded-md"></div>
            </div>
        </div>

        <!-- Card 3 -->
        <div class="bg-white p-4 rounded-[20px] border border-gray-100 flex items-center gap-4">
            <div class="skeleton-box w-14 h-14 rounded-[14px] shrink-0"></div>
            <div class="flex-1 flex flex-col gap-2">
                <div class="skeleton-box w-3/4 h-4 rounded-md"></div>
                <div class="skeleton-box w-5/12 h-3 rounded-md"></div>
            </div>
            <div class="flex flex-col items-end gap-2 shrink-0">
                <div class="skeleton-box w-12 h-4 rounded-md"></div>
                <div class="skeleton-box w-8 h-3 rounded-md"></div>
            </div>
        </div>
    </div>

    <div class="mt-auto pt-10">
        <div class="skeleton-box w-full h-14 rounded-2xl"></div>
    </div>
</body>

</html>
