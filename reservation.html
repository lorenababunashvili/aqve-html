<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AQUE - Reservation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: "#14d0a1", background: "#f0f3f5" },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Custom Date Input Styling */
        input[type="datetime-local"]::-webkit-calendar-picker-indicator {
            background: transparent;
            bottom: 0;
            color: transparent;
            cursor: pointer;
            height: auto;
            left: 0;
            position: absolute;
            right: 0;
            top: 0;
            width: auto;
        }
    </style>
</head>

<body class="bg-background text-gray-900 font-sans min-h-[100dvh] flex flex-col relative overflow-hidden pb-32">

    <!-- Header -->
    <header
        class="px-5 pt-10 pb-4 flex items-center justify-between z-20 sticky top-0 bg-background/90 backdrop-blur-md">
        <div class="flex items-center gap-3">
            <button onclick="history.back()" class="p-1 text-[#001736]">
                <span class="material-symbols-rounded text-2xl">arrow_back</span>
            </button>
            <h1 class="text-[22px] font-extrabold text-[#001736]">Reservation</h1>
        </div>
        <div class="w-10"></div>
    </header>

    <div class="flex-1 px-5 pt-4 flex flex-col gap-6 overflow-y-auto hide-scrollbar z-10">

        <!-- Time Selection -->
        <div class="flex flex-col gap-3">
            <h2 class="text-[14px] font-bold text-[#001736]">Select Time</h2>
            <div class="bg-white p-4 rounded-[24px] shadow-sm border border-gray-100 flex flex-col gap-4">

                <div class="flex flex-col gap-1.5">
                    <label class="text-[12px] font-bold uppercase tracking-wider text-gray-400 ml-1">Start Time</label>
                    <div
                        class="relative bg-gray-50 rounded-[20px] px-4 py-3.5 flex items-center gap-3 border border-gray-100 focus-within:border-[#14d0a1] transition-colors group">
                        <span
                            class="material-symbols-rounded text-[20px] text-gray-400 group-focus-within:text-[#14d0a1] transition-colors">calendar_today</span>
                        <input type="datetime-local" id="start-time"
                            class="bg-transparent border-none p-0 text-[15px] font-bold w-full focus:ring-0 text-[#001736] outline-none">
                    </div>
                </div>

                <div class="w-full flex items-center gap-2">
                    <div class="h-px bg-gray-200 flex-1"></div>
                    <span class="material-symbols-rounded text-gray-300 text-[18px]">keyboard_double_arrow_down</span>
                    <div class="h-px bg-gray-200 flex-1"></div>
                </div>

                <div class="flex flex-col gap-1.5">
                    <label class="text-[12px] font-bold uppercase tracking-wider text-gray-400 ml-1">End Time</label>
                    <div
                        class="relative bg-gray-50 rounded-[20px] px-4 py-3.5 flex items-center gap-3 border border-gray-100 focus-within:border-[#14d0a1] transition-colors group">
                        <span
                            class="material-symbols-rounded text-[20px] text-gray-400 group-focus-within:text-[#14d0a1] transition-colors">event_busy</span>
                        <input type="datetime-local" id="end-time"
                            class="bg-transparent border-none p-0 text-[15px] font-bold w-full focus:ring-0 text-[#001736] outline-none">
                    </div>
                </div>
            </div>
        </div>

        <!-- Spot Type Selection -->
        <div class="flex flex-col gap-3">
            <h2 class="text-[14px] font-bold text-[#001736]">Spot Type</h2>

            <div class="grid grid-cols-1 gap-3">

                <!-- Standard -->
                <label class="relative cursor-pointer group">
                    <input type="radio" name="spot-type" value="standard" class="peer sr-only" checked>
                    <div
                        class="bg-white p-4 rounded-[24px] shadow-sm border-[1.5px] border-transparent peer-checked:border-[#14d0a1] peer-checked:bg-[#e4fff6] flex items-center gap-4 transition-all">
                        <div
                            class="w-12 h-12 rounded-[14px] bg-gray-100 flex items-center justify-center text-gray-500 peer-checked:bg-white peer-checked:text-[#14d0a1] transition-colors">
                            <span class="material-symbols-rounded">local_parking</span>
                        </div>
                        <div class="flex-1 flex flex-col">
                            <h3 class="font-bold text-[#001736] text-[15px]">Standard</h3>
                            <p class="text-[12px] text-gray-400 font-medium">Regular parking spot</p>
                        </div>
                        <div class="text-right">
                            <span class="block font-bold text-[#001736] text-[16px]">3.00₾</span>
                            <span class="text-[11px] text-gray-400 font-bold uppercase">/ hr</span>
                        </div>
                    </div>
                </label>

                <!-- VIP -->
                <label class="relative cursor-pointer group">
                    <input type="radio" name="spot-type" value="vip" class="peer sr-only">
                    <div
                        class="bg-white p-4 rounded-[24px] shadow-sm border-[1.5px] border-transparent peer-checked:border-[#14d0a1] peer-checked:bg-[#e4fff6] flex items-center gap-4 transition-all">
                        <div
                            class="w-12 h-12 rounded-[14px] bg-[#fffbed] flex items-center justify-center text-amber-500 peer-checked:bg-white transition-colors">
                            <span class="material-symbols-rounded"
                                style="font-variation-settings: 'FILL' 1;">star</span>
                        </div>
                        <div class="flex-1 flex flex-col">
                            <h3 class="font-bold text-[#001736] text-[15px]">VIP Spot</h3>
                            <p class="text-[12px] text-gray-400 font-medium">Close to entrance</p>
                        </div>
                        <div class="text-right">
                            <span class="block font-bold text-[#001736] text-[16px]">4.50₾</span>
                            <span class="text-[11px] text-gray-400 font-bold uppercase">/ hr</span>
                        </div>
                    </div>
                </label>

                <!-- EV -->
                <label class="relative cursor-pointer group">
                    <input type="radio" name="spot-type" value="ev" class="peer sr-only">
                    <div
                        class="bg-white p-4 rounded-[24px] shadow-sm border-[1.5px] border-transparent peer-checked:border-[#14d0a1] peer-checked:bg-[#e4fff6] flex items-center gap-4 transition-all">
                        <div
                            class="w-12 h-12 rounded-[14px] bg-[#f0fdf4] flex items-center justify-center text-green-500 peer-checked:bg-white transition-colors">
                            <span class="material-symbols-rounded">ev_station</span>
                        </div>
                        <div class="flex-1 flex flex-col">
                            <h3 class="font-bold text-[#001736] text-[15px]">EV Charger</h3>
                            <p class="text-[12px] text-gray-400 font-medium">Equipped w/ charger</p>
                        </div>
                        <div class="text-right">
                            <span class="block font-bold text-[#001736] text-[16px]">6.00₾</span>
                            <span class="text-[11px] text-gray-400 font-bold uppercase">/ hr</span>
                        </div>
                    </div>
                </label>

            </div>
        </div>

    </div>

    <!-- Bottom Action Bar -->
    <div
        class="fixed bottom-0 left-0 right-0 p-5 z-20 bg-gradient-to-t from-background via-background to-transparent pt-12 pb-safe">
        <div
            class="bg-white p-5 rounded-[28px] shadow-[0_-4px_24px_rgba(0,0,0,0.05)] border border-gray-100 flex items-center justify-between gap-4 w-full relative z-30">
            <div class="flex flex-col gap-0.5">
                <p class="text-[11px] text-gray-400 font-bold uppercase tracking-widest pl-1">Total Due</p>
                <div class="flex items-baseline gap-1 relative z-30">
                    <span id="total-price"
                        class="text-[28px] font-extrabold text-[#001736] tracking-tight ml-0.5">0.00</span>
                    <span class="text-[16px] font-bold text-gray-400">₾</span>
                </div>
            </div>
            <a href="booking-success.html"
                class="bg-gradient-to-r from-[#17e3ae] to-[#8affda] text-[#003822] hover:opacity-90 font-bold py-4 px-6 rounded-[20px] shadow-[0_8px_16px_rgba(20,208,161,0.25)] transition-all active:scale-[0.98] flex items-center gap-2">
                <span class="text-[16px]">Confirm</span>
                <span class="material-symbols-rounded text-[20px]">payments</span>
            </a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const startInput = document.getElementById('start-time');
            const endInput = document.getElementById('end-time');
            const spotInputs = document.querySelectorAll('input[name="spot-type"]');
            const totalPriceEl = document.getElementById('total-price');

            const BASE_RATE = 3;
            const MULTIPLIERS = {
                'standard': 1,
                'vip': 1.5,
                'ev': 2
            };

            // Set default times (Now -> Now + 2h)
            const now = new Date();
            now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
            startInput.value = now.toISOString().slice(0, 16);

            const twoHoursLater = new Date(now);
            twoHoursLater.setHours(twoHoursLater.getHours() + 2);
            endInput.value = twoHoursLater.toISOString().slice(0, 16);

            function calculatePrice() {
                const start = new Date(startInput.value);
                const end = new Date(endInput.value);

                if (end <= start) {
                    totalPriceEl.textContent = "0.00";
                    return;
                }

                const diffMs = end - start;
                const diffHours = diffMs / (1000 * 60 * 60);

                const selectedType = document.querySelector('input[name="spot-type"]:checked').value;
                const multiplier = MULTIPLIERS[selectedType];

                const total = diffHours * BASE_RATE * multiplier;
                totalPriceEl.textContent = total.toFixed(2);
            }

            startInput.addEventListener('change', calculatePrice);
            endInput.addEventListener('change', calculatePrice);
            spotInputs.forEach(input => input.addEventListener('change', calculatePrice));

            // Initial calculation
            calculatePrice();
        });
    </script>
</body>

</html>
