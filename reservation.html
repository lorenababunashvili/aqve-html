<!DOCTYPE html>
<html class="light" lang="ka">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>აქვე - დაჯავშნა</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link href="https://cdn.web-fonts.ge/fonts/bpg-phone-sans/css/bpg-phone-sans.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#009485",
                        "primary-bright": "#00C2AF",
                        "background-light": "#f5f8f8",
                        "background-dark": "#0f2321",
                        "success": "#22C55E",
                        "surface": "#ffffff",
                        "surface-dark": "#18181b"
                    },
                    fontFamily: {
                        "display": ["BPG Phone Sans", "sans-serif"],
                        "sans": ["BPG Phone Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "2xl": "1rem",
                        "3xl": "1.5rem",
                    },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'BPG Phone Sans', sans-serif;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .dark .glass-panel {
            background: rgba(15, 35, 33, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Custom Date Input Styling */
        input[type="datetime-local"]::-webkit-calendar-picker-indicator {
            background: transparent;
            bottom: 0;
            color: transparent;
            cursor: pointer;
            height: auto;
            left: 0;
            position: absolute;
            right: 0;
            top: 0;
            width: auto;
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark text-gray-900 dark:text-white min-h-screen flex flex-col relative overflow-hidden">

    <!-- Background Decoration -->
    <div
        class="fixed top-[-10%] right-[-10%] w-[80vw] h-[80vw] bg-primary/20 rounded-full blur-3xl pointer-events-none">
    </div>
    <div
        class="fixed bottom-[-10%] left-[-10%] w-[60vw] h-[60vw] bg-primary-bright/10 rounded-full blur-3xl pointer-events-none">
    </div>

    <!-- Header -->
    <div class="px-6 pt-8 pb-4 z-10 flex items-center gap-4">
        <a href="lot-details.html"
            class="p-2.5 bg-white dark:bg-surface-dark rounded-xl shadow-sm border border-gray-100 dark:border-gray-800 text-gray-600 dark:text-gray-300">
            <span class="material-symbols-outlined">arrow_back</span>
        </a>
        <h1 class="text-xl font-bold">დაჯავშნა</h1>
    </div>

    <div class="flex-1 px-6 pb-28 z-10 flex flex-col gap-6 overflow-y-auto">

        <!-- Time Selection -->
        <div class="flex flex-col gap-3">
            <h2 class="text-sm font-bold text-gray-400 uppercase tracking-wider ml-1">დროის არჩევა</h2>
            <div class="glass-panel p-4 rounded-3xl shadow-sm flex flex-col gap-4">
                <div class="flex flex-col gap-2">
                    <label class="text-xs font-bold text-gray-500">დასაწყისი</label>
                    <div class="relative bg-white/50 dark:bg-black/20 rounded-xl px-4 py-3 flex items-center gap-3">
                        <span class="material-symbols-outlined text-primary">calendar_today</span>
                        <input type="datetime-local" id="start-time"
                            class="bg-transparent border-none p-0 text-sm font-bold w-full focus:ring-0 text-gray-800 dark:text-white">
                    </div>
                </div>
                <div class="w-full h-px bg-gray-200 dark:bg-gray-700/50"></div>
                <div class="flex flex-col gap-2">
                    <label class="text-xs font-bold text-gray-500">დასასრული</label>
                    <div class="relative bg-white/50 dark:bg-black/20 rounded-xl px-4 py-3 flex items-center gap-3">
                        <span class="material-symbols-outlined text-primary">event_busy</span>
                        <input type="datetime-local" id="end-time"
                            class="bg-transparent border-none p-0 text-sm font-bold w-full focus:ring-0 text-gray-800 dark:text-white">
                    </div>
                </div>
            </div>
        </div>

        <!-- Spot Type Selection -->
        <div class="flex flex-col gap-3">
            <h2 class="text-sm font-bold text-gray-400 uppercase tracking-wider ml-1">ადგილის ტიპი</h2>
            <div class="grid grid-cols-1 gap-3">

                <!-- Standard -->
                <label class="relative cursor-pointer group">
                    <input type="radio" name="spot-type" value="standard" class="peer sr-only" checked>
                    <div
                        class="glass-panel p-4 rounded-2xl flex items-center gap-4 peer-checked:ring-2 peer-checked:ring-primary transition-all">
                        <div
                            class="w-12 h-12 rounded-xl bg-gray-100 dark:bg-white/5 flex items-center justify-center text-gray-500">
                            <span class="material-symbols-outlined">local_parking</span>
                        </div>
                        <div class="flex-1">
                            <h3 class="font-bold text-sm">სტანდარტული</h3>
                            <p class="text-xs text-gray-500">ჩვეულებრივი ადგილი</p>
                        </div>
                        <div class="text-right">
                            <span class="block font-bold text-primary">3₾</span>
                            <span class="text-[10px] text-gray-400 uppercase">სთ</span>
                        </div>
                    </div>
                </label>

                <!-- VIP -->
                <label class="relative cursor-pointer group">
                    <input type="radio" name="spot-type" value="vip" class="peer sr-only">
                    <div
                        class="glass-panel p-4 rounded-2xl flex items-center gap-4 peer-checked:ring-2 peer-checked:ring-primary transition-all">
                        <div
                            class="w-12 h-12 rounded-xl bg-amber-100 dark:bg-amber-900/20 flex items-center justify-center text-amber-600">
                            <span class="material-symbols-outlined">star</span>
                        </div>
                        <div class="flex-1">
                            <h3 class="font-bold text-sm">VIP ადგილი</h3>
                            <p class="text-xs text-gray-500">შესასვლელთან ახლოს</p>
                        </div>
                        <div class="text-right">
                            <span class="block font-bold text-amber-600">4.5₾</span>
                            <span class="text-[10px] text-gray-400 uppercase">სთ</span>
                        </div>
                    </div>
                </label>

                <!-- EV -->
                <label class="relative cursor-pointer group">
                    <input type="radio" name="spot-type" value="ev" class="peer sr-only">
                    <div
                        class="glass-panel p-4 rounded-2xl flex items-center gap-4 peer-checked:ring-2 peer-checked:ring-primary transition-all">
                        <div
                            class="w-12 h-12 rounded-xl bg-green-100 dark:bg-green-900/20 flex items-center justify-center text-green-600">
                            <span class="material-symbols-outlined">ev_station</span>
                        </div>
                        <div class="flex-1">
                            <h3 class="font-bold text-sm">ელ-დამტენი</h3>
                            <p class="text-xs text-gray-500">დამტენით აღჭურვილი</p>
                        </div>
                        <div class="text-right">
                            <span class="block font-bold text-green-600">6₾</span>
                            <span class="text-[10px] text-gray-400 uppercase">სთ</span>
                        </div>
                    </div>
                </label>

            </div>
        </div>

    </div>

    <!-- Bottom Action Bar -->
    <div
        class="fixed bottom-0 left-0 right-0 p-6 z-20 bg-gradient-to-t from-white via-white to-transparent dark:from-[#0f2321] dark:via-[#0f2321] pt-10">
        <div
            class="glass-panel p-4 rounded-3xl shadow-lg border-t border-white/50 dark:border-white/10 flex items-center justify-between gap-4 mb-2">
            <div>
                <p class="text-xs text-gray-500 dark:text-gray-400 font-bold uppercase mb-0.5">სულ გადასახდელი</p>
                <div class="flex items-baseline gap-1">
                    <span id="total-price" class="text-2xl font-extrabold text-primary">0</span>
                    <span class="text-sm font-bold text-primary">₾</span>
                </div>
            </div>
            <a href="booking-success.html"
                class="bg-primary hover:bg-primary/90 text-white font-bold py-4 px-8 rounded-2xl shadow-lg shadow-primary/30 transition-all active:scale-[0.98] flex items-center gap-2">
                <span>გადახდა და დაჯავშნა</span>
                <span class="material-symbols-outlined text-[20px]">payments</span>
            </a>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const startInput = document.getElementById('start-time');
            const endInput = document.getElementById('end-time');
            const spotInputs = document.querySelectorAll('input[name="spot-type"]');
            const totalPriceEl = document.getElementById('total-price');

            const BASE_RATE = 3;
            const MULTIPLIERS = {
                'standard': 1,
                'vip': 1.5,
                'ev': 2
            };

            // Set default times (Now -> Now + 2h)
            const now = new Date();
            now.setMinutes(now.getMinutes() - now.getTimezoneOffset()); // Adjust to local styling
            startInput.value = now.toISOString().slice(0, 16);

            const twoHoursLater = new Date(now);
            twoHoursLater.setHours(twoHoursLater.getHours() + 2);
            endInput.value = twoHoursLater.toISOString().slice(0, 16);

            function calculatePrice() {
                const start = new Date(startInput.value);
                const end = new Date(endInput.value);

                if (end <= start) {
                    totalPriceEl.textContent = "0";
                    return;
                }

                const diffMs = end - start;
                const diffHours = diffMs / (1000 * 60 * 60);

                const selectedType = document.querySelector('input[name="spot-type"]:checked').value;
                const multiplier = MULTIPLIERS[selectedType];

                const total = diffHours * BASE_RATE * multiplier;
                totalPriceEl.textContent = total.toFixed(2);
            }

            startInput.addEventListener('change', calculatePrice);
            endInput.addEventListener('change', calculatePrice);
            spotInputs.forEach(input => input.addEventListener('change', calculatePrice));

            // Initial calculation
            calculatePrice();
        });
    </script>
</body>

</html>
