<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AQUE - Promo Codes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: "#14d0a1", background: "#f8f9fb" },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body class="bg-background text-gray-900 font-sans min-h-[100dvh] flex flex-col relative pb-32">

    <!-- Header -->
    <header
        class="px-5 pt-10 pb-4 flex items-center justify-between z-20 sticky top-0 bg-background/90 backdrop-blur-md">
        <div class="flex items-center gap-3">
            <a href="profile.html"
                class="p-1 text-[#001736] hover:bg-gray-100 rounded-full transition-colors flex items-center justify-center">
                <span class="material-symbols-rounded text-[20px]">arrow_back</span>
            </a>
            <h1 class="text-[19px] font-extrabold text-[#001736] tracking-tight">Promo Codes</h1>
        </div>
        <div class="w-8"></div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto hide-scrollbar px-5 pt-2 flex flex-col gap-6">

        <!-- Input Box -->
        <div class="relative w-full">
            <input type="text" placeholder="Enter promo code"
                class="w-full bg-white border border-gray-100 rounded-[24px] px-6 py-4 pr-16 text-[#001736] shadow-sm font-extrabold text-[15px] outline-none placeholder-gray-400 focus:ring-2 focus:ring-[#14d0a1]/20">
            <button
                class="absolute top-1/2 -translate-y-1/2 right-2 w-11 h-11 bg-[#14d0a1] text-white rounded-[18px] flex items-center justify-center shadow-md hover:bg-[#11b88e] transition-colors">
                <span class="material-symbols-rounded text-[22px]">check</span>
            </button>
        </div>

        <!-- Active Codes Section -->
        <div class="flex flex-col gap-3">
            <h2 class="text-[13px] font-bold text-gray-400 mb-1 ml-1 tracking-wide">Active</h2>

            <!-- Active Code Card -->
            <div
                class="bg-white p-5 rounded-[24px] shadow-sm border border-gray-100 flex flex-col gap-3 relative overflow-hidden">
                <!-- Top Decoration -->
                <div
                    class="absolute top-0 right-0 w-32 h-32 bg-[#14d0a1]/5 rounded-full blur-xl -mr-10 -mt-10 pointer-events-none">
                </div>

                <div class="flex justify-between items-start relative z-10 w-full">
                    <div class="flex items-center gap-4">
                        <div
                            class="w-12 h-12 bg-[#e6f9f4] rounded-full flex items-center justify-center text-[#14d0a1] shrink-0 font-extrabold text-[20px]">
                            %
                        </div>
                        <div class="flex flex-col gap-0.5">
                            <h3 class="font-extrabold text-[16px] text-[#14d0a1] tracking-tight uppercase">WELCOME50
                            </h3>
                            <span class="text-[12px] text-gray-500 font-bold">50% discount</span>
                        </div>
                    </div>
                    <!-- Expire Badge -->
                    <div
                        class="bg-[#fff7e6] text-[#fa8c16] px-2.5 py-1 rounded-[8px] text-[11px] font-extrabold flex items-center gap-1">
                        1 day
                    </div>
                </div>

                <p class="text-[13px] text-gray-500 font-medium leading-relaxed relative z-10 pr-2 mt-2">
                    Valid for your first 3 parking sessions in any zone.
                </p>
            </div>
        </div>

        <!-- Expired Codes Section -->
        <div class="flex flex-col gap-3 mt-2">
            <h2 class="text-[13px] font-bold text-gray-400 mb-1 ml-1 tracking-wide">Expired</h2>

            <!-- Expired Code Card -->
            <div class="bg-white/60 p-5 rounded-[24px] shadow-sm border border-gray-100 flex flex-col gap-3 opacity-70">

                <div class="flex justify-between items-start w-full">
                    <div class="flex items-center gap-4">
                        <div
                            class="w-12 h-12 bg-gray-100 rounded-full flex items-center justify-center text-gray-400 shrink-0">
                            <span class="material-symbols-rounded text-[22px]">card_giftcard</span>
                        </div>
                        <div class="flex flex-col gap-0.5">
                            <h3 class="font-extrabold text-[15px] text-gray-500 tracking-tight uppercase">FREE_RIDE</h3>
                            <span class="text-[12px] text-gray-400 font-bold">Free</span>
                        </div>
                    </div>
                </div>

                <p class="text-[13px] text-gray-400 font-medium leading-relaxed pr-2 mt-2">
                    Free parking for 1 hour.
                </p>
            </div>

        </div>

    </main>

</body>

</html>
