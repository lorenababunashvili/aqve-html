<!DOCTYPE html>
<html class="light" lang="ka">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>აქვე - ნავიგაცია</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link href="https://cdn.web-fonts.ge/fonts/bpg-phone-sans/css/bpg-phone-sans.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#009485",
                        "primary-bright": "#00C2AF",
                        "background-light": "#f8fafc",
                        "background-dark": "#0f2321",
                        "surface": "#ffffff",
                    },
                    fontFamily: {
                        "display": ["BPG Phone Sans", "sans-serif"],
                        "sans": ["BPG Phone Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "2xl": "1rem",
                        "3xl": "1.5rem",
                    },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'BPG Phone Sans', sans-serif;
        }

        .map-container {
            position: absolute;
            inset: 0;
            z-index: 0;
            background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBhUpmqkWwK4oj2zkFSL9OnTDov1_PBmdIfG_4qyXusxZloJhLbwIdR_8_zMDQ10Uc_9VznLg5TZUHod2IrWivVCr8aHkF7a3jw7_Vpwy0no8AKR7Yug37EtkNe9lU6pzULnlIMxndvr8DHeTROdN2vpQUCZaHk6tkGwD64ZCJGn1wAEz2m9g1RLHRfLrSA6Bq5X1-7OFoKw7qdvuDw4inFvJSdz5PRQpWwEmkexxWVdMWG_7gikihntgEuV9YX41PCNNuil9Kv5ME');
            background-size: cover;
            background-position: center;
        }

        /* Pulsing circle for current location */
        @keyframes pulse-dot {
            0% {
                transform: scale(0.8);
                opacity: 0.8;
            }

            50% {
                transform: scale(1.2);
                opacity: 0.4;
            }

            100% {
                transform: scale(0.8);
                opacity: 0.8;
            }
        }

        .nav-pulse {
            animation: pulse-dot 2s infinite ease-in-out;
        }

        /* Rotating navigation arrow */
        @keyframes nav-arrow-move {
            0% {
                transform: rotate(-5deg);
            }

            50% {
                transform: rotate(5deg);
            }

            100% {
                transform: rotate(-5deg);
            }
        }

        .nav-arrow {
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.2));
            animation: nav-arrow-move 3s infinite ease-in-out;
        }
    </style>
</head>

<body class="bg-gray-100 dark:bg-black text-gray-900 dark:text-white h-screen overflow-hidden flex flex-col relative">

    <!-- Map Background -->
    <div class="map-container filter brightness-[1.1] contrast-[0.9]">
        <!-- Simulate Route Line -->
        <svg class="absolute inset-0 w-full h-full pointer-events-none" style="z-index: 1;">
            <path d="M 180,600 C 180,500 220,450 350,300" fill="none" stroke="#3b82f6" stroke-width="8"
                stroke-linecap="round" stroke-linejoin="round"
                style="filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));" />
            <path d="M 180,600 C 180,500 220,450 350,300" fill="none" stroke="#60a5fa" stroke-width="4"
                stroke-linecap="round" stroke-linejoin="round" />
        </svg>

        <!-- Current Location Arrow (Simulated Position) -->
        <div class="absolute bottom-1/3 left-1/2 -translate-x-1/2 translate-y-12 z-10 flex items-center justify-center">
            <div class="w-16 h-16 bg-blue-500/20 rounded-full absolute nav-pulse"></div>
            <img src="https://img.icons8.com/color/48/navigation.png" class="w-10 h-10 nav-arrow transform -rotate-45"
                alt="Navigation Arrow">
        </div>

        <!-- Destination Pin -->
        <div class="absolute top-[35%] right-[10%] -translate-x-1/2 -translate-y-full z-10">
            <div class="relative flex flex-col items-center">
                <div
                    class="bg-primary text-white text-xs font-bold px-2 py-1 rounded-lg shadow-md mb-1 whitespace-nowrap">
                    1.2 კმ
                </div>
                <span class="material-symbols-rounded text-primary text-5xl filter drop-shadow-md">location_on</span>
            </div>
        </div>
    </div>

    <!-- Top Instructions Panel -->
    <div class="absolute top-0 left-0 right-0 p-4 z-20 pt-10 bg-gradient-to-b from-black/60 to-transparent">
        <div class="bg-[#2e2e2e] text-white rounded-[1.5rem] p-4 shadow-lg flex items-center gap-4">
            <div class="w-14 h-14 bg-[#454545] rounded-xl flex items-center justify-center">
                <span class="material-symbols-rounded text-4xl text-white">turn_right</span>
            </div>
            <div class="flex-1">
                <h2 class="text-xl font-bold">200 მ</h2>
                <p class="text-gray-300 text-sm font-medium">შეუხვიეთ მარჯვნივ</p>
                <p class="text-gray-400 text-xs">ჭავჭავაძის გამზირზე</p>
            </div>
        </div>
    </div>

    <!-- Bottom Status Panel -->
    <div
        class="absolute bottom-0 left-0 right-0 p-6 z-20 bg-white dark:bg-[#1a1a1a] rounded-t-[2.5rem] shadow-[0_-10px_40px_rgba(0,0,0,0.1)]">

        <!-- Drag Handle -->
        <div class="w-12 h-1.5 bg-gray-300 dark:bg-gray-600 rounded-full mx-auto mb-6"></div>

        <div class="flex justify-between items-center mb-6">
            <div>
                <h3 class="text-lg font-bold text-gray-900 dark:text-white">8 წთ</h3>
                <div class="flex items-center gap-2 text-sm">
                    <span class="text-success font-bold">1.2 კმ</span>
                    <span class="text-gray-400">•</span>
                    <span class="text-gray-500 dark:text-gray-400">14:52</span>
                </div>
            </div>

            <a href="lot-details.html"
                class="w-12 h-12 bg-gray-100 dark:bg-white/10 rounded-full flex items-center justify-center text-gray-600 dark:text-gray-300">
                <span class="material-symbols-rounded text-xl">list</span>
            </a>
        </div>

        <div class="flex gap-4">
            <a href="home.html"
                class="flex-1 bg-gray-100 dark:bg-white/10 hover:bg-gray-200 dark:hover:bg-white/20 text-gray-700 dark:text-white font-bold py-4 rounded-2xl transition-all flex items-center justify-center gap-2">
                <span class="material-symbols-rounded text-xl">close</span>
                <span>გასვლა</span>
            </a>

            <!-- Hidden/Optional: Just for demo flow, assuming this simulates arrival or just viewing -->
        </div>

    </div>

</body>

</html>
