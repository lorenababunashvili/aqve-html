<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AQUE - Navigation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: "#14d0a1", background: "#f8f9fb" },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        .map-container {
            position: absolute;
            inset: 0;
            z-index: 0;
            background-color: #e6f9f4;
            /* Abstract green map pattern */
            background-image:
                linear-gradient(rgba(20, 208, 161, 0.15) 1.5px, transparent 1.5px),
                linear-gradient(90deg, rgba(20, 208, 161, 0.15) 1.5px, transparent 1.5px);
            background-size: 60px 60px;
        }

        @keyframes pulse-dot {
            0% {
                transform: scale(0.8);
                opacity: 0.8;
            }

            50% {
                transform: scale(1.4);
                opacity: 0.3;
            }

            100% {
                transform: scale(0.8);
                opacity: 0.8;
            }
        }

        .nav-pulse {
            animation: pulse-dot 2s infinite ease-in-out;
        }

        /* Modern Tear Drop inside map */
        .tear-drop {
            position: relative;
            width: 44px;
            height: 48px;
            background: #ffffff;
            border-radius: 50% 50% 50% 0;
            transform: rotate(-45deg);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 16px rgba(20, 208, 161, 0.25);
            border: 3px solid #14d0a1;
        }

        .tear-drop>span {
            transform: rotate(45deg);
        }
    </style>
</head>

<body class="bg-background text-gray-900 h-[100dvh] overflow-hidden flex flex-col relative font-sans">

    <!-- Map Background -->
    <div class="map-container overflow-hidden">
        <!-- Simulate Route Line -->
        <svg class="absolute inset-0 w-full h-full pointer-events-none" style="z-index: 1;">
            <path d="M 180,600 C 180,500 240,430 350,250" fill="none" stroke="#14d0a1" stroke-width="8"
                stroke-linecap="round" stroke-linejoin="round"
                style="filter: drop-shadow(0 4px 8px rgba(20,208,161,0.4));" />
            <path d="M 180,600 C 180,500 240,430 350,250" fill="none" stroke="#ffffff" stroke-width="3"
                stroke-linecap="round" stroke-linejoin="round" />
        </svg>

        <!-- Current Location Car Arrow -->
        <div
            class="absolute bottom-[30%] left-1/2 -translate-x-1/2 translate-y-12 z-10 flex items-center justify-center">
            <div class="w-[80px] h-[80px] bg-[#14d0a1]/20 rounded-full absolute nav-pulse"></div>
            <div
                class="w-14 h-14 bg-white rounded-full shadow-[0_8px_24px_rgba(0,0,0,0.12)] flex items-center justify-center z-10 border-[3px] border-[#14d0a1]">
                <span class="material-symbols-rounded text-[#14d0a1] transform -rotate-45 text-[32px]"
                    style="font-variation-settings: 'FILL' 1;">navigation</span>
            </div>
        </div>

        <!-- Destination Pin -->
        <div class="absolute top-[28%] right-[15%] -translate-x-1/2 -translate-y-full z-10">
            <div class="relative flex flex-col items-center">
                <div
                    class="bg-white text-[#001736] text-[13px] font-extrabold px-3 py-1.5 rounded-xl shadow-md mb-2 whitespace-nowrap border border-gray-100 flex items-center gap-1">
                    1.2 km
                </div>
                <div class="tear-drop">
                    <span class="material-symbols-rounded text-[22px] text-[#14d0a1]"
                        style="font-variation-settings: 'FILL' 1;">local_parking</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Top Directions Panel -->
    <div class="absolute top-0 left-0 right-0 p-5 z-20 pt-12 flex justify-center w-full">
        <div
            class="bg-white/95 backdrop-blur-xl rounded-[28px] p-5 shadow-[0_12px_40px_rgba(0,0,0,0.08)] border border-white flex items-center gap-4 w-full">

            <div class="w-14 h-14 bg-[#e6f9f4] rounded-2xl flex items-center justify-center text-[#14d0a1] shrink-0">
                <span class="material-symbols-rounded text-[36px]">turn_right</span>
            </div>

            <div class="flex-1 flex flex-col justify-center">
                <div class="flex items-end gap-2 leading-tight">
                    <h2 class="text-[24px] font-extrabold text-[#001736] tracking-tight">200</h2>
                    <span class="text-[16px] font-extrabold text-gray-400 mb-[2px]">m</span>
                </div>
                <div class="flex items-center gap-1.5 mt-0.5">
                    <p class="text-[15px] font-extrabold text-[#001736]">Turn right</p>
                    <p class="text-gray-500 text-[13px] font-medium truncate max-w-[120px]">on Chavchavadze Ave.</p>
                </div>
            </div>

        </div>
    </div>

    <!-- Bottom Status Panel -->
    <div
        class="absolute bottom-0 left-0 right-0 p-6 z-20 bg-white rounded-t-[32px] shadow-[0_-10px_40px_rgba(0,0,0,0.06)] border-t border-gray-100 flex flex-col">

        <!-- Drag Handle -->
        <div class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-5 shrink-0"></div>

        <div class="flex justify-between items-center mb-6">
            <div class="flex flex-col gap-0.5">
                <div class="flex items-baseline gap-1.5 text-[#14d0a1]">
                    <h3 class="text-[28px] font-extrabold tracking-tight">8</h3>
                    <span class="text-[16px] font-extrabold">min</span>
                </div>
                <div class="flex items-center gap-2 text-[14px] mt-0.5">
                    <span class="text-[#001736] font-extrabold">1.2 km</span>
                    <span class="text-gray-300">•</span>
                    <span class="text-gray-400 font-bold tracking-wide">14:52 ARRIVAL</span>
                </div>
            </div>

            <button
                class="w-14 h-14 bg-[#f8f9fb] border border-gray-100 rounded-full flex items-center justify-center text-[#001736] shadow-sm hover:bg-gray-100 transition-colors active:scale-95 shrink-0">
                <span class="material-symbols-rounded text-[24px]">volume_up</span>
            </button>
        </div>

        <div class="flex gap-4">
            <a href="lot-details.html"
                class="flex-1 bg-white border-2 border-red-100 hover:bg-red-50 text-red-500 font-extrabold py-4 rounded-[20px] transition-all flex items-center justify-center gap-2 active:scale-95">
                <span class="material-symbols-rounded text-[22px]">close</span>
                Exit Route
            </a>
        </div>

    </div>

</body>

</html>
