<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AQUE - Navigation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: "#14d0a1", background: "#f8f9fb" },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        .map-container {
            position: absolute;
            inset: 0;
            z-index: 0;
            background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBhUpmqkWwK4oj2zkFSL9OnTDov1_PBmdIfG_4qyXusxZloJhLbwIdR_8_zMDQ10Uc_9VznLg5TZUHod2IrWivVCr8aHkF7a3jw7_Vpwy0no8AKR7Yug37EtkNe9lU6pzULnlIMxndvr8DHeTROdN2vpQUCZaHk6tkGwD64ZCJGn1wAEz2m9g1RLHRfLrSA6Bq5X1-7OFoKw7qdvuDw4inFvJSdz5PRQpWwEmkexxWVdMWG_7gikihntgEuV9YX41PCNNuil9Kv5ME');
            background-size: cover;
            background-position: center;
        }

        @keyframes pulse-dot {
            0% {
                transform: scale(0.8);
                opacity: 0.8;
            }

            50% {
                transform: scale(1.2);
                opacity: 0.4;
            }

            100% {
                transform: scale(0.8);
                opacity: 0.8;
            }
        }

        .nav-pulse {
            animation: pulse-dot 2s infinite ease-in-out;
        }

        @keyframes nav-arrow-move {
            0% {
                transform: rotate(-5deg);
            }

            50% {
                transform: rotate(5deg);
            }

            100% {
                transform: rotate(-5deg);
            }
        }

        .nav-arrow {
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.2));
            animation: nav-arrow-move 3s infinite ease-in-out;
        }

        /* Modern Tear Drop */
        .tear-drop {
            position: relative;
            width: 44px;
            height: 48px;
            background: #001736;
            border-radius: 50% 50% 50% 0;
            transform: rotate(-45deg);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 16px rgba(0, 23, 54, 0.25);
        }

        .tear-drop>span {
            transform: rotate(45deg);
        }
    </style>
</head>

<body class="bg-gray-100 text-gray-900 h-screen overflow-hidden flex flex-col relative font-sans">

    <!-- Map Background -->
    <div class="map-container filter contrast-[0.9]">
        <!-- Simulate Route Line -->
        <svg class="absolute inset-0 w-full h-full pointer-events-none" style="z-index: 1;">
            <path d="M 180,600 C 180,500 220,450 350,300" fill="none" stroke="#14d0a1" stroke-width="8"
                stroke-linecap="round" stroke-linejoin="round"
                style="filter: drop-shadow(0 4px 12px rgba(20,208,161,0.5));" />
            <path d="M 180,600 C 180,500 220,450 350,300" fill="none" stroke="#e4fff6" stroke-width="3"
                stroke-linecap="round" stroke-linejoin="round" />
        </svg>

        <!-- Current Location Arrow -->
        <div class="absolute bottom-1/3 left-1/2 -translate-x-1/2 translate-y-12 z-10 flex items-center justify-center">
            <div class="w-[72px] h-[72px] bg-[#14d0a1]/20 rounded-full absolute nav-pulse"></div>
            <div
                class="w-12 h-12 bg-white rounded-full shadow-[0_4px_16px_rgba(0,0,0,0.15)] flex items-center justify-center z-10 border-[3px] border-[#14d0a1]">
                <span class="material-symbols-rounded text-[#14d0a1] transform -rotate-45"
                    style="font-variation-settings: 'FILL' 1;">navigation</span>
            </div>
        </div>

        <!-- Destination Pin -->
        <div class="absolute top-[35%] right-[10%] -translate-x-1/2 -translate-y-full z-10">
            <div class="relative flex flex-col items-center">
                <div
                    class="bg-white text-[#001736] text-[12px] font-extrabold px-3 py-1.5 rounded-[12px] shadow-lg mb-2 whitespace-nowrap border border-gray-100">
                    1.2 km
                </div>
                <!-- <span class="material-symbols-rounded text-[#001736] text-[48px] filter drop-shadow-md" style="font-variation-settings: 'FILL' 1;">location_on</span> -->
                <div class="tear-drop border-[3px] border-white w-[48px] h-[52px]">
                    <span class="material-symbols-rounded text-[24px] text-white"
                        style="font-variation-settings: 'FILL' 1;">local_parking</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Top Instructions Panel -->
    <div class="absolute top-0 left-0 right-0 p-5 z-20 pt-12 flex justify-center">
        <div
            class="bg-[#001736] text-white rounded-[24px] p-4 shadow-[0_8px_32px_rgba(0,23,54,0.25)] flex items-center gap-4 w-full max-w-sm border border-gray-800">
            <div class="w-14 h-14 bg-white/10 rounded-[16px] flex items-center justify-center text-white">
                <span class="material-symbols-rounded text-[36px]">turn_right</span>
            </div>
            <div class="flex-1 flex flex-col">
                <div class="flex items-baseline gap-2">
                    <h2 class="text-[22px] font-extrabold tracking-tight">200 m</h2>
                </div>
                <p class="text-[14px] font-bold text-gray-200">Turn right</p>
                <p class="text-gray-400 text-[12px] font-medium leading-tight">on Chavchavadze Ave.</p>
            </div>
        </div>
    </div>

    <!-- Bottom Status Panel -->
    <div
        class="absolute bottom-0 left-0 right-0 p-6 z-20 bg-white rounded-t-[32px] shadow-[0_-10px_40px_rgba(0,0,0,0.06)] border-t border-gray-100">

        <!-- Drag Handle -->
        <div class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-6"></div>

        <div class="flex justify-between items-center mb-6">
            <div class="flex flex-col gap-0.5">
                <h3 class="text-[24px] font-extrabold text-[#14d0a1] tracking-tight">8 min</h3>
                <div class="flex items-center gap-2 text-[14px]">
                    <span class="text-[#001736] font-bold">1.2 km</span>
                    <span class="text-gray-300">•</span>
                    <span class="text-gray-400 font-bold">14:52 ARRIVAL</span>
                </div>
            </div>

            <a href="lot-details.html"
                class="w-14 h-14 bg-gray-50 border border-gray-100 rounded-full flex items-center justify-center text-[#001736] shadow-sm hover:bg-gray-100 transition-colors">
                <span class="material-symbols-rounded text-[24px]">list</span>
            </a>
        </div>

        <div class="flex gap-4">
            <a href="home.html"
                class="flex-1 bg-white border border-red-100 hover:bg-red-50 hover:border-red-200 text-red-500 font-bold py-4 rounded-[20px] transition-all flex items-center justify-center gap-2 shadow-sm text-[16px]">
                <span class="material-symbols-rounded text-[20px]">close</span>
                <span>Exit Navigation</span>
            </a>
        </div>

    </div>

</body>

</html>
