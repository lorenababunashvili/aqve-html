<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Error - AQUE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#14d0a1",
                        background: "#f0f3f5",
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>

<body
    class="bg-background text-gray-900 font-sans min-h-[100dvh] flex flex-col justify-center items-center p-6 relative">

    <div
        class="w-full max-w-sm flex flex-col items-center bg-white p-8 rounded-[32px] shadow-[0_10px_40px_rgba(0,0,0,0.04)] text-center border border-gray-100">

        <!-- Illustration -->
        <div class="w-32 h-32 bg-[#fff1f2] rounded-full flex items-center justify-center mb-6 relative">
            <span class="material-symbols-rounded text-rose-500 text-[64px] absolute z-10">cloud_off</span>
            <div class="w-20 h-20 bg-rose-100 rounded-full animate-pulse absolute"></div>
        </div>

        <h1 class="text-[22px] font-extrabold text-[#001736] mb-3 tracking-tight">Oops! Connection Lost</h1>
        <p class="text-gray-500 text-[14px] font-medium leading-relaxed mb-8 px-2">We couldn't reach the server. Please
            check your internet connection or try refreshing the page.</p>

        <div class="w-full flex flex-col gap-3">
            <button onclick="window.location.reload();"
                class="w-full bg-gradient-to-r from-[#17e3ae] to-[#8affda] text-white py-3.5 rounded-xl font-bold text-[15px] shadow-[0_6px_14px_rgba(20,208,161,0.2)] hover:opacity-90 transition-opacity active:scale-[0.98]">
                Try Again
            </button>
            <button onclick="window.location.href='home.html'"
                class="w-full bg-transparent border-2 border-gray-200 text-gray-600 font-bold text-[15px] py-3.5 rounded-xl hover:bg-gray-50 hover:text-gray-800 transition-colors active:scale-[0.98]">
                Go to Home
            </button>
        </div>

    </div>

</body>

</html>
