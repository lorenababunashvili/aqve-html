<!DOCTYPE html>
<html class="light" lang="ka">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>აქვე - რეგისტრაცია</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link href="https://cdn.web-fonts.ge/fonts/bpg-phone-sans/css/bpg-phone-sans.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#009485",
                        "primary-bright": "#00C2AF",
                        "background-light": "#f5f8f8",
                        "background-dark": "#0f2321",
                        "success": "#22C55E",
                        "surface": "#ffffff",
                        "surface-dark": "#18181b"
                    },
                    fontFamily: {
                        "display": ["BPG Phone Sans", "sans-serif"],
                        "sans": ["BPG Phone Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "2xl": "1rem",
                        "3xl": "1.5rem",
                    },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'BPG Phone Sans', sans-serif;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .dark .glass-panel {
            background: rgba(15, 35, 33, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark text-gray-900 dark:text-white min-h-screen flex flex-col items-center justify-center relative overflow-x-hidden">

    <!-- Background Decoration -->
    <div
        class="fixed top-[-10%] right-[-10%] w-[80vw] h-[80vw] bg-primary/20 rounded-full blur-3xl pointer-events-none">
    </div>
    <div
        class="fixed bottom-[-10%] left-[-10%] w-[60vw] h-[60vw] bg-primary-bright/10 rounded-full blur-3xl pointer-events-none">
    </div>

    <div class="w-full max-w-md px-6 z-10 flex flex-col h-full justify-center py-10">

        <div class="flex flex-col items-center mb-6">
            <div class="mb-2 flex justify-center">
                <img src="Image/Final.png" alt="AQUE Logo" class="h-24 w-auto object-contain">
            </div>
            <h1 class="text-3xl font-extrabold mb-2 tracking-tight text-center text-primary">რეგისტრაცია</h1>
            <p class="text-gray-500 dark:text-gray-400 text-center text-sm font-medium">
                შეავსეთ მონაცემები რეგისტრაციისთვის
            </p>
        </div>

        <div class="w-full flex flex-col gap-5">

            <div class="grid grid-cols-2 gap-4">
                <div class="flex flex-col gap-2">
                    <label class="text-xs font-bold uppercase tracking-wider text-gray-400 ml-1">სახელი</label>
                    <div class="relative group">
                        <input type="text"
                            class="w-full bg-white dark:bg-surface-dark px-4 py-4 rounded-2xl border-2 border-transparent focus:border-primary focus:ring-0 shadow-sm font-bold text-lg outline-none transition-all placeholder:text-gray-300 placeholder:font-normal"
                            placeholder="სახელი">
                    </div>
                </div>
                <div class="flex flex-col gap-2">
                    <label class="text-xs font-bold uppercase tracking-wider text-gray-400 ml-1">გვარი</label>
                    <div class="relative group">
                        <input type="text"
                            class="w-full bg-white dark:bg-surface-dark px-4 py-4 rounded-2xl border-2 border-transparent focus:border-primary focus:ring-0 shadow-sm font-bold text-lg outline-none transition-all placeholder:text-gray-300 placeholder:font-normal"
                            placeholder="გვარი">
                    </div>
                </div>
            </div>

            <div class="flex flex-col gap-2">
                <label class="text-xs font-bold uppercase tracking-wider text-gray-400 ml-1">მობილურის ნომერი</label>
                <div class="relative group">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <span class="text-gray-400 font-bold text-lg">+995</span>
                    </div>
                    <input type="tel"
                        class="w-full bg-white dark:bg-surface-dark pl-[4.5rem] pr-4 py-4 rounded-2xl border-2 border-transparent focus:border-primary focus:ring-0 shadow-sm font-bold text-lg outline-none transition-all placeholder:font-normal"
                        placeholder="5XX XX XX XX">
                    <div
                        class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none opacity-0 group-focus-within:opacity-100 transition-opacity">
                        <span class="material-symbols-outlined text-primary">smartphone</span>
                    </div>
                </div>
            </div>

            <div class="flex flex-col gap-2">
                <label class="text-xs font-bold uppercase tracking-wider text-gray-400 ml-1">მანქანის ნომერი</label>
                <div class="relative group">
                    <input type="text"
                        class="w-full bg-white dark:bg-surface-dark px-4 py-4 rounded-2xl border-2 border-transparent focus:border-primary focus:ring-0 shadow-sm font-bold text-lg outline-none transition-all placeholder:text-gray-300 placeholder:font-normal uppercase"
                        placeholder="AA-000-AA">
                    <div
                        class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none opacity-0 group-focus-within:opacity-100 transition-opacity">
                        <span class="material-symbols-outlined text-primary">directions_car</span>
                    </div>
                </div>
            </div>

            <div class="flex flex-col gap-2">
                <label class="text-xs font-bold uppercase tracking-wider text-gray-400 ml-1">პაროლი</label>
                <div class="relative group">
                    <input type="password"
                        class="w-full bg-white dark:bg-surface-dark px-4 py-4 rounded-2xl border-2 border-transparent focus:border-primary focus:ring-0 shadow-sm font-bold text-lg outline-none transition-all placeholder:text-gray-300 placeholder:font-normal"
                        placeholder="••••••••">
                    <div
                        class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none opacity-0 group-focus-within:opacity-100 transition-opacity">
                        <span class="material-symbols-outlined text-primary">lock</span>
                    </div>
                </div>
            </div>

            <button
                class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-2xl shadow-lg shadow-primary/30 active:scale-[0.98] transition-all flex items-center justify-center gap-2 text-lg mt-2">
                <span>რეგისტრაცია</span>
                <span class="material-symbols-outlined text-[20px]">person_add</span>
            </button>

            <div class="text-center mt-4">
                <p class="text-sm text-gray-500 font-medium">
                    უკვე გაქვთ ანგარიში?
                    <a href="login.html" class="text-primary hover:underline font-bold ml-1">შესვლა</a>
                </p>
            </div>
        </div>

        <div class="text-center mt-8">
            <p class="text-xs text-gray-400 leading-relaxed">
                რეგისტრაციით თქვენ ეთანხმებით
                <a href="#" class="text-primary hover:underline font-bold">წესებსა და პირობებს</a>
            </p>
        </div>
    </div>
</body>

</html>
