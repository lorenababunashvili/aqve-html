<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AQUE - Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#14d0a1",
                        background: "#14d0a1", // Brand green background
                        card: "#ffffff"
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-[#14d0a1] text-gray-900 font-sans min-h-[100dvh] flex flex-col relative overflow-hidden">

    <!-- Header Area (Green Background) -->
    <div class="pt-12 pb-6 px-6 flex justify-between items-center z-10">
        <div class="text-white text-[15px] font-medium tracking-wide">9:41</div>
        <div class="flex items-center gap-1.5 opacity-90">
            <span class="material-symbols-rounded text-white text-[16px]">signal_cellular_alt</span>
            <span class="material-symbols-rounded text-white text-[16px]">wifi</span>
            <span class="material-symbols-rounded text-white text-[18px]">battery_full</span>
        </div>
    </div>

    <!-- White Card Container -->
    <div
        class="flex-1 bg-white rounded-t-[32px] mt-4 px-6 pt-8 pb-10 flex flex-col shadow-[0_-10px_40px_rgba(0,0,0,0.1)] z-20 overflow-y-auto">

        <!-- Logo -->
        <div class="flex items-center gap-2 mb-6">
            <img src="./Image/Final.png" class="h-8 w-auto drop-shadow-sm mix-blend-multiply" alt="AQVE Logo">
            <span class="text-[20px] font-extrabold text-[#001736] tracking-tight">AQVE</span>
        </div>

        <!-- Greeting -->
        <h1 class="text-[28px] font-bold text-gray-900 mb-6 tracking-tight">Create Account</h1>

        <!-- Toggle Tabs -->
        <div class="bg-gray-50 p-1 rounded-full flex mb-8 border border-gray-100 shadow-inner">
            <button onclick="window.location.href='login.html'"
                class="flex-1 py-3 text-gray-500 font-medium text-[15px] hover:text-gray-700 transition-colors rounded-full">
                Sign In
            </button>
            <button class="flex-1 py-3 text-[#14d0a1] font-semibold text-[15px] bg-white rounded-full shadow-sm">
                Register
            </button>
        </div>

        <!-- Form Elements -->
        <div class="w-full flex flex-col gap-4">

            <!-- Name -->
            <div class="flex flex-col gap-2">
                <label class="text-[14px] font-medium text-gray-700 ml-1">Name</label>
                <div class="relative group">
                    <div
                        class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400 group-focus-within:text-[#14d0a1] transition-colors">
                        <span class="material-symbols-rounded text-[22px]">person</span>
                    </div>
                    <input type="text"
                        class="w-full bg-white pl-[3rem] pr-4 py-3.5 rounded-2xl border border-gray-200 focus:border-[#14d0a1] focus:ring-4 focus:ring-[#14d0a1]/10 text-gray-900 text-[15px] outline-none transition-all placeholder:text-gray-400"
                        placeholder="Input your name">
                </div>
            </div>

            <!-- Email -->
            <div class="flex flex-col gap-2">
                <label class="text-[14px] font-medium text-gray-700 ml-1">Email</label>
                <div class="relative group">
                    <div
                        class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400 group-focus-within:text-[#14d0a1] transition-colors">
                        <span class="material-symbols-rounded text-[22px]">mail</span>
                    </div>
                    <input type="email"
                        class="w-full bg-white pl-[3rem] pr-4 py-3.5 rounded-2xl border border-gray-200 focus:border-[#14d0a1] focus:ring-4 focus:ring-[#14d0a1]/10 text-gray-900 text-[15px] outline-none transition-all placeholder:text-gray-400"
                        placeholder="Input your email">
                </div>
            </div>

            <!-- Password -->
            <div class="flex flex-col gap-2">
                <label class="text-[14px] font-medium text-gray-700 ml-1">Password</label>
                <div class="relative group">
                    <div
                        class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400 group-focus-within:text-[#14d0a1] transition-colors">
                        <span class="material-symbols-rounded text-[22px]">lock</span>
                    </div>
                    <input type="password"
                        class="w-full bg-white pl-[3rem] pr-12 py-3.5 rounded-2xl border border-gray-200 focus:border-[#14d0a1] focus:ring-4 focus:ring-[#14d0a1]/10 text-gray-900 text-[15px] outline-none transition-all placeholder:text-gray-400"
                        placeholder="Input your password">
                    <div
                        class="absolute inset-y-0 right-0 pr-4 flex items-center cursor-pointer text-gray-400 hover:text-gray-600 transition-colors">
                        <span class="material-symbols-rounded text-[22px]">visibility_off</span>
                    </div>
                </div>
            </div>

            <!-- Sign Up Button -->
            <button onclick="window.location.href='success.html'"
                class="w-full bg-[#14d0a1]/60 text-white font-semibold py-4 rounded-[20px] shadow-sm active:scale-[0.98] transition-all flex items-center justify-center text-[16px] hover:bg-[#14d0a1]/80 mt-2">
                Sign Up
            </button>

            <!-- Divider -->
            <div class="relative py-4 mt-2">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-gray-200"></div>
                </div>
                <div class="relative flex justify-center mt-[-0.6rem]">
                    <span class="px-4 bg-white text-gray-400 text-[13px] font-medium">Or Sign up with</span>
                </div>
            </div>

            <!-- Social Logins -->
            <div class="grid grid-cols-2 gap-4">
                <button
                    class="flex items-center justify-center py-3.5 rounded-[20px] border border-gray-200 shadow-sm hover:bg-gray-50 transition-colors active:scale-[0.98] bg-white">
                    <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-6 h-6" alt="Google">
                </button>
                <button
                    class="flex items-center justify-center py-3.5 rounded-[20px] border border-gray-200 shadow-sm hover:bg-gray-50 transition-colors active:scale-[0.98] bg-white text-[#000000]">
                    <svg class="w-6 h-6" viewBox="0 0 384 512" fill="currentColor">
                        <path
                            d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z" />
                    </svg>
                </button>
            </div>
            <div class="pb-6"></div>
        </div>
    </div>
</body>

</html>
