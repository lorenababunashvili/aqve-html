<!DOCTYPE html>
<html class="light" lang="ka">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>აქვე - პრომო კოდები</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link href="https://cdn.web-fonts.ge/fonts/bpg-phone-sans/css/bpg-phone-sans.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#009485",
                        "primary-bright": "#00C2AF",
                        "background-light": "#f8fafc",
                        "background-dark": "#0f2321",
                        "surface": "#ffffff",
                    },
                    fontFamily: {
                        "display": ["BPG Phone Sans", "sans-serif"],
                        "sans": ["BPG Phone Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "2xl": "1rem",
                        "3xl": "1.5rem",
                    },
                    boxShadow: {
                        "soft": "0 10px 40px -10px rgba(0,0,0,0.05)",
                    }
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'BPG Phone Sans', sans-serif;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body class="bg-gray-50 dark:bg-background-dark text-gray-900 dark:text-white min-h-screen flex flex-col">

    <!-- Header -->
    <div
        class="px-6 pt-12 pb-6 flex items-center justify-between z-10 sticky top-0 bg-gray-50/80 dark:bg-background-dark/80 backdrop-blur-md">
        <div class="flex items-center gap-4">
            <button onclick="history.back()"
                class="p-3 bg-white dark:bg-white/10 rounded-full shadow-sm hover:bg-gray-50 transition-colors">
                <span class="material-symbols-rounded text-gray-600 dark:text-gray-200">arrow_back</span>
            </button>
            <h1 class="text-xl font-bold text-gray-800 dark:text-white">პრომო კოდები</h1>
        </div>
        <div class="w-10"></div> <!-- Spacer -->
    </div>

    <!-- Scrollable Content -->
    <div class="flex-1 overflow-y-auto no-scrollbar pb-32 px-6">

        <!-- Add Promo Code Input -->
        <div
            class="bg-white dark:bg-white/5 p-2 pr-2 rounded-3xl shadow-sm border border-gray-100 dark:border-white/5 flex items-center gap-2 mb-8">
            <div class="flex-1 pl-4">
                <input type="text" placeholder="შეიყვანეთ პრომო კოდი"
                    class="w-full bg-transparent border-none focus:ring-0 p-0 text-gray-900 dark:text-white placeholder:text-gray-400 font-bold uppercase tracking-wider">
            </div>
            <button
                class="bg-primary hover:bg-primary-bright text-white p-3 rounded-2xl shadow-md shadow-primary/20 transition-all active:scale-95">
                <span class="material-symbols-rounded">check</span>
            </button>
        </div>

        <!-- Active Promo Codes -->
        <h2 class="text-sm font-bold text-gray-400 uppercase tracking-wider ml-2 mb-4">აქტიური</h2>

        <div class="flex flex-col gap-4 mb-8">
            <!-- Promo Code Card -->
            <div
                class="bg-white dark:bg-white/5 p-5 rounded-[2rem] shadow-sm border border-gray-100 dark:border-white/5 relative overflow-hidden group">
                <div
                    class="absolute -right-6 -top-6 w-24 h-24 bg-primary/10 rounded-full blur-xl group-hover:bg-primary/20 transition-colors">
                </div>

                <div class="flex justify-between items-start mb-2 relative z-10">
                    <div class="flex items-center gap-3">
                        <div class="w-12 h-12 bg-primary/10 rounded-2xl flex items-center justify-center text-primary">
                            <span class="material-symbols-rounded">percent</span>
                        </div>
                        <div>
                            <h3 class="font-bold text-lg text-primary">WELCOME50</h3>
                            <p class="text-gray-400 text-xs font-bold uppercase">50% ფასდაკლება</p>
                        </div>
                    </div>
                    <span
                        class="text-xs font-bold text-orange-400 bg-orange-100 dark:bg-orange-900/30 px-2 py-1 rounded-lg">
                        1 დღე
                    </span>
                </div>

                <p class="text-sm text-gray-500 dark:text-gray-400 relative z-10 mt-2">
                    მოქმედებს პირველ 3 პარკირებაზე ნებისმიერ ზონაში.
                </p>
            </div>
        </div>

        <!-- Expired Promo Codes -->
        <h2 class="text-sm font-bold text-gray-400 uppercase tracking-wider ml-2 mb-4">ვადაგასული</h2>

        <div class="flex flex-col gap-4 opacity-60 grayscale hover:grayscale-0 hover:opacity-100 transition-all">
            <!-- Expired Promo Code Card -->
            <div
                class="bg-white dark:bg-white/5 p-5 rounded-[2rem] shadow-sm border border-gray-100 dark:border-white/5 relative overflow-hidden">
                <div class="flex justify-between items-start mb-2 relative z-10">
                    <div class="flex items-center gap-3">
                        <div
                            class="w-12 h-12 bg-gray-100 dark:bg-white/10 rounded-2xl flex items-center justify-center text-gray-400">
                            <span class="material-symbols-rounded">redeem</span>
                        </div>
                        <div>
                            <h3 class="font-bold text-lg text-gray-500 dark:text-gray-300">FREE_RIDE</h3>
                            <p class="text-gray-400 text-xs font-bold uppercase">უფასო</p>
                        </div>
                    </div>
                </div>

                <p class="text-sm text-gray-500 dark:text-gray-400 relative z-10 mt-2">
                    უფასო პარკირება 1 საათით.
                </p>
            </div>
        </div>

    </div>

</body>

</html>
