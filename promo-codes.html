<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AQUE - Promo Codes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: "#14d0a1", background: "#f8f9fb" },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body class="bg-background text-gray-900 font-sans min-h-[100dvh] flex flex-col relative">

    <!-- Header -->
    <header
        class="px-5 pt-10 pb-4 flex items-center justify-between z-20 sticky top-0 bg-background/90 backdrop-blur-md">
        <div class="flex items-center gap-3">
            <button onclick="history.back()" class="p-1 text-[#001736]">
                <span class="material-symbols-rounded text-2xl">arrow_back</span>
            </button>
            <h1 class="text-[22px] font-extrabold text-[#001736] tracking-tight">Promo Codes</h1>
        </div>
        <div class="w-10"></div>
    </header>

    <!-- Scrollable Content -->
    <main class="flex-1 overflow-y-auto hide-scrollbar pb-10 px-5 pt-2">

        <!-- Add Promo Code Input -->
        <div
            class="bg-white p-2 pl-5 rounded-[24px] shadow-sm border border-gray-100 flex items-center gap-2 mb-8 focus-within:border-[#14d0a1] transition-colors relative">
            <div class="absolute -left-1.5 top-1/2 -translate-y-1/2 w-3 h-8 bg-[#14d0a1] rounded-r-lg opacity-0 transition-opacity"
                id="input-indicator"></div>

            <input type="text" placeholder="Enter Promo Code"
                class="flex-1 bg-transparent border-none focus:ring-0 p-0 text-[#001736] placeholder:text-gray-300 font-extrabold uppercase tracking-widest text-[16px] outline-none"
                onfocus="document.getElementById('input-indicator').style.opacity = '1'"
                onblur="document.getElementById('input-indicator').style.opacity = '0'">

            <button
                class="bg-[#001736] hover:bg-[#002a66] text-white p-3.5 rounded-[18px] shadow-md transition-all active:scale-95 flex items-center justify-center">
                <span class="material-symbols-rounded text-[20px]">add</span>
            </button>
        </div>

        <!-- Active Promo Codes -->
        <h2 class="text-[12px] font-bold text-gray-400 uppercase tracking-widest xl-1 mb-3">Active</h2>

        <div class="flex flex-col gap-3 mb-8">
            <!-- Active Promo Code Card -->
            <div class="bg-white p-5 rounded-[24px] shadow-sm border border-gray-100 relative overflow-hidden group">
                <div
                    class="absolute -right-6 -top-6 w-24 h-24 bg-[#14d0a1]/10 rounded-full blur-[20px] group-hover:bg-[#14d0a1]/20 transition-colors">
                </div>

                <div class="flex justify-between items-start mb-3 relative z-10">
                    <div class="flex items-center gap-4">
                        <div
                            class="w-12 h-12 bg-[#e4fff6] rounded-[16px] flex items-center justify-center text-[#14d0a1]">
                            <span class="material-symbols-rounded">percent</span>
                        </div>
                        <div class="flex flex-col">
                            <h3 class="font-extrabold text-[18px] text-[#14d0a1] tracking-wider">WELCOME50</h3>
                            <p class="text-gray-400 text-[11px] font-extrabold uppercase mt-0.5 tracking-widest">50%
                                Discount</p>
                        </div>
                    </div>
                    <span
                        class="text-[10px] font-bold text-amber-600 bg-amber-50 border border-amber-100 px-2.5 py-1 rounded-[8px] uppercase tracking-widest">
                        Expires in 1d
                    </span>
                </div>

                <div class="h-px bg-gray-100 w-full mb-3 relative z-10"></div>

                <p class="text-[13px] font-medium text-gray-500 relative z-10">
                    Valid for your first 3 parking sessions in any zone.
                </p>
            </div>
        </div>

        <!-- Expired Promo Codes -->
        <h2 class="text-[12px] font-bold text-gray-400 uppercase tracking-widest xl-1 mb-3">Expired</h2>

        <div class="flex flex-col gap-3">
            <!-- Expired Promo Code Card -->
            <div
                class="bg-white p-5 rounded-[24px] border border-gray-100 relative overflow-hidden opacity-60 grayscale transition-all hover:grayscale-0 hover:opacity-100">
                <div class="flex items-start mb-3 relative z-10">
                    <div class="flex items-center gap-4">
                        <div
                            class="w-12 h-12 bg-gray-100 rounded-[16px] flex items-center justify-center text-gray-400">
                            <span class="material-symbols-rounded">redeem</span>
                        </div>
                        <div class="flex flex-col">
                            <h3 class="font-extrabold text-[18px] text-gray-400 tracking-wider">FREE_RIDE</h3>
                            <p class="text-gray-300 text-[11px] font-extrabold uppercase mt-0.5 tracking-widest">Free
                                Parking</p>
                        </div>
                    </div>
                </div>

                <div class="h-px bg-gray-100 w-full mb-3 relative z-10"></div>

                <p class="text-[13px] font-medium text-gray-400 relative z-10">
                    Free parking for 1 hour.
                </p>
            </div>
        </div>

    </main>

</body>

</html>
