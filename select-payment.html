<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Select Payment Method</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#14d0a1",
                        background: "#f4f7f8",
                        textNavy: "#001e36",
                        textGray: "#8a96a3"
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
</head>

<body class="bg-background text-gray-900 font-sans min-h-[100dvh] flex flex-col relative overflow-hidden pb-8">

    <!-- Decorative Gradients -->
    <div class="absolute inset-0 z-0 pointer-events-none">
        <div
            class="absolute top-0 right-0 w-[400px] h-[400px] bg-[#14d0a1]/10 rounded-full blur-[80px] -translate-y-1/2 translate-x-1/3">
        </div>
    </div>

    <!-- Header -->
    <header class="px-6 pt-12 pb-6 flex items-center justify-between z-20 relative">
        <button onclick="history.back()"
            class="w-10 h-10 flex items-center justify-center bg-white rounded-full shadow-sm border border-gray-100 text-[#001e36]">
            <span class="material-symbols-rounded text-[20px]">arrow_back</span>
        </button>
        <h1 class="text-[18px] font-extrabold text-[#001e36] tracking-tight flex-1 text-center pr-10">Payment Method
        </h1>
    </header>

    <!-- Main Content -->
    <main class="flex-1 px-5 relative z-10 mt-2 flex flex-col">

        <h2 class="text-[20px] font-extrabold text-textNavy mb-6">Select a Card</h2>

        <div class="flex flex-col gap-4">
            <!-- Saved Card 1 -->
            <a href="extend-success.html"
                class="w-full bg-white border border-[#14d0a1] rounded-[20px] p-5 flex items-center gap-4 hover:bg-[#e4fff4] transition-colors relative overflow-hidden shadow-sm group">
                <div class="absolute inset-0 bg-[#14d0a1]/5 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                <!-- Card Icon / Logo -->
                <div
                    class="w-14 h-10 bg-gray-50 rounded-lg flex items-center justify-center border border-gray-100 p-2">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2a/Mastercard-logo.svg/1000px-Mastercard-logo.svg.png"
                        alt="Mastercard" class="h-6 w-auto object-contain">
                </div>
                <!-- Card Details -->
                <div class="flex flex-col flex-1 text-left">
                    <span class="text-textNavy font-bold text-[16px] tracking-wide mb-0.5">•••• 4589</span>
                    <span class="text-textGray text-[12px] font-medium">Mastercard</span>
                </div>
                <!-- Selected Check -->
                <div class="w-6 h-6 rounded-full bg-[#14d0a1] flex items-center justify-center text-white">
                    <span class="material-symbols-rounded text-[16px]">check</span>
                </div>
            </a>

            <!-- Saved Card 2 -->
            <a href="extend-success.html"
                class="w-full bg-white border border-transparent rounded-[20px] p-5 flex items-center gap-4 hover:border-gray-200 transition-colors shadow-sm cursor-pointer">
                <!-- Card Icon / Logo -->
                <div
                    class="w-14 h-10 bg-gray-50 rounded-lg flex items-center justify-center border border-gray-100 p-2">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/5/5e/Visa_Inc._logo.svg/2560px-Visa_Inc._logo.svg.png"
                        alt="Visa" class="h-4 w-auto object-contain">
                </div>
                <!-- Card Details -->
                <div class="flex flex-col flex-1 text-left">
                    <span class="text-textNavy font-bold text-[16px] tracking-wide mb-0.5">•••• 1234</span>
                    <span class="text-textGray text-[12px] font-medium">Visa</span>
                </div>
                <!-- Unselected placeholder -->
                <div class="w-6 h-6 rounded-full border-2 border-gray-200"></div>
            </a>

            <div class="h-px w-full bg-gray-200 my-4"></div>

            <!-- Apple Pay -->
            <a href="extend-success.html"
                class="w-full bg-black rounded-[20px] py-4 px-5 flex items-center justify-center gap-2 hover:opacity-90 transition-opacity shadow-md">
                <span class="text-white font-bold text-[18px]">Pay with</span>
                <svg viewBox="0 0 384 512" class="h-6 fill-white" xmlns="http://www.w3.org/2000/svg">
                    <path
                        d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z" />
                </svg>
            </a>

            <!-- Add New Card -->
            <button
                class="w-full bg-white border border-dashed border-gray-300 rounded-[20px] py-4 px-5 flex items-center justify-center gap-2 hover:bg-gray-50 transition-colors mt-2 text-textGray">
                <span class="material-symbols-rounded text-[24px]">add_card</span>
                <span class="font-bold text-[15px]">Add New Card</span>
            </button>
        </div>

    </main>

</body>

</html>
