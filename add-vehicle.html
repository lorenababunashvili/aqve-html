<!DOCTYPE html>
<html class="light" lang="ka">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>აქვე - ავტომობილის დამატება</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link href="https://cdn.web-fonts.ge/fonts/bpg-phone-sans/css/bpg-phone-sans.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#009485",
                        "primary-bright": "#00C2AF",
                        "background-light": "#f8fafc",
                        "background-dark": "#0f2321",
                        "surface": "#ffffff",
                    },
                    fontFamily: {
                        "display": ["BPG Phone Sans", "sans-serif"],
                        "sans": ["BPG Phone Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "2xl": "1rem",
                        "3xl": "1.5rem",
                    },
                    boxShadow: {
                        "soft": "0 10px 40px -10px rgba(0,0,0,0.05)",
                    }
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'BPG Phone Sans', sans-serif;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body class="bg-gray-50 dark:bg-background-dark text-gray-900 dark:text-white min-h-screen flex flex-col">

    <!-- Header -->
    <div
        class="px-6 pt-12 pb-6 flex items-center justify-between z-10 sticky top-0 bg-gray-50/80 dark:bg-background-dark/80 backdrop-blur-md">
        <div class="flex items-center gap-4">
            <button onclick="history.back()"
                class="p-3 bg-white dark:bg-white/10 rounded-full shadow-sm hover:bg-gray-50 transition-colors">
                <span class="material-symbols-rounded text-gray-600 dark:text-gray-200">arrow_back</span>
            </button>
            <h1 class="text-xl font-bold text-gray-800 dark:text-white">ავტომობილის დამატება</h1>
        </div>
        <div class="w-10"></div>
    </div>

    <!-- Scrollable Content -->
    <div class="flex-1 overflow-y-auto no-scrollbar pb-32 px-6">

        <form class="flex flex-col gap-6">

            <!-- Vehicle Type Selection -->
            <div>
                <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-3 ml-2">ტრანსპორტის
                    ტიპი</label>
                <div class="grid grid-cols-4 gap-3">
                    <!-- Car (Selected) -->
                    <label class="cursor-pointer">
                        <input type="radio" name="vehicle_type" value="car" class="peer sr-only" checked>
                        <div
                            class="bg-white dark:bg-white/5 border-2 border-transparent peer-checked:border-primary peer-checked:bg-primary/5 rounded-2xl p-3 flex flex-col items-center gap-2 transition-all">
                            <img src="https://img.icons8.com/fluency/48/car.png" class="w-8 h-8 object-contain">
                            <span
                                class="text-xs font-bold text-gray-600 dark:text-gray-300 peer-checked:text-primary">მანქანა</span>
                        </div>
                    </label>

                    <!-- Moto -->
                    <label class="cursor-pointer">
                        <input type="radio" name="vehicle_type" value="moto" class="peer sr-only">
                        <div
                            class="bg-white dark:bg-white/5 border-2 border-transparent peer-checked:border-primary peer-checked:bg-primary/5 rounded-2xl p-3 flex flex-col items-center gap-2 transition-all">
                            <img src="https://img.icons8.com/fluency/48/motorcycle.png"
                                class="w-8 h-8 object-contain grayscale-[0.5] peer-checked:grayscale-0">
                            <span
                                class="text-xs font-bold text-gray-600 dark:text-gray-300 peer-checked:text-primary">მოტო</span>
                        </div>
                    </label>

                    <!-- Truck -->
                    <label class="cursor-pointer">
                        <input type="radio" name="vehicle_type" value="truck" class="peer sr-only">
                        <div
                            class="bg-white dark:bg-white/5 border-2 border-transparent peer-checked:border-primary peer-checked:bg-primary/5 rounded-2xl p-3 flex flex-col items-center gap-2 transition-all">
                            <img src="https://img.icons8.com/fluency/48/truck.png"
                                class="w-8 h-8 object-contain grayscale-[0.5] peer-checked:grayscale-0">
                            <span
                                class="text-xs font-bold text-gray-600 dark:text-gray-300 peer-checked:text-primary">სატვირთო</span>
                        </div>
                    </label>

                    <!-- Bus -->
                    <label class="cursor-pointer">
                        <input type="radio" name="vehicle_type" value="bus" class="peer sr-only">
                        <div
                            class="bg-white dark:bg-white/5 border-2 border-transparent peer-checked:border-primary peer-checked:bg-primary/5 rounded-2xl p-3 flex flex-col items-center gap-2 transition-all">
                            <img src="https://img.icons8.com/fluency/48/bus.png"
                                class="w-8 h-8 object-contain grayscale-[0.5] peer-checked:grayscale-0">
                            <span
                                class="text-xs font-bold text-gray-600 dark:text-gray-300 peer-checked:text-primary">ავტობუსი</span>
                        </div>
                    </label>
                </div>
            </div>

            <!-- License Plate -->
            <div>
                <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-2 ml-2">სახელმწიფო
                    ნომერი</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <span class="font-bold text-gray-400">GE</span>
                        <div class="h-4 w-px bg-gray-300 mx-2"></div>
                    </div>
                    <input type="text"
                        class="w-full bg-white dark:bg-white/5 border-none rounded-xl py-4 pl-16 pr-4 font-mono text-lg font-bold tracking-wider uppercase placeholder:text-gray-300 focus:ring-2 focus:ring-primary/20"
                        placeholder="AA-000-AA">
                </div>
            </div>

            <!-- Vehicle Details -->
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-2 ml-2">მარკა</label>
                    <input type="text"
                        class="w-full bg-white dark:bg-white/5 border-none rounded-xl py-4 px-4 font-bold text-gray-800 dark:text-white placeholder:text-gray-400 focus:ring-2 focus:ring-primary/20"
                        placeholder="Toyota">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-2 ml-2">მოდელი</label>
                    <input type="text"
                        class="w-full bg-white dark:bg-white/5 border-none rounded-xl py-4 px-4 font-bold text-gray-800 dark:text-white placeholder:text-gray-400 focus:ring-2 focus:ring-primary/20"
                        placeholder="Prius">
                </div>
            </div>

            <!-- Color Selection (Optional visual flair) -->
            <div>
                <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-3 ml-2">ფერი</label>
                <div class="flex gap-3 overflow-x-auto no-scrollbar py-1 px-1">
                    <!-- White -->
                    <label class="cursor-pointer relative flex-shrink-0">
                        <input type="radio" name="color" value="white" class="peer sr-only" checked>
                        <div
                            class="w-10 h-10 rounded-full bg-white border border-gray-200 shadow-sm peer-checked:ring-2 peer-checked:ring-primary peer-checked:ring-offset-2 transition-all">
                        </div>
                        <span
                            class="material-symbols-rounded absolute inset-0 flex items-center justify-center text-primary opacity-0 peer-checked:opacity-100 transition-opacity">check</span>
                    </label>
                    <!-- Black -->
                    <label class="cursor-pointer relative flex-shrink-0">
                        <input type="radio" name="color" value="black" class="peer sr-only">
                        <div
                            class="w-10 h-10 rounded-full bg-gray-900 border border-gray-800 shadow-sm peer-checked:ring-2 peer-checked:ring-primary peer-checked:ring-offset-2 transition-all">
                        </div>
                        <span
                            class="material-symbols-rounded absolute inset-0 flex items-center justify-center text-white opacity-0 peer-checked:opacity-100 transition-opacity">check</span>
                    </label>
                    <!-- Silver/Grey -->
                    <label class="cursor-pointer relative flex-shrink-0">
                        <input type="radio" name="color" value="silver" class="peer sr-only">
                        <div
                            class="w-10 h-10 rounded-full bg-gray-400 border border-gray-400 shadow-sm peer-checked:ring-2 peer-checked:ring-primary peer-checked:ring-offset-2 transition-all">
                        </div>
                        <span
                            class="material-symbols-rounded absolute inset-0 flex items-center justify-center text-white opacity-0 peer-checked:opacity-100 transition-opacity">check</span>
                    </label>
                    <!-- Gray (Darker) -->
                    <label class="cursor-pointer relative flex-shrink-0">
                        <input type="radio" name="color" value="gray" class="peer sr-only">
                        <div
                            class="w-10 h-10 rounded-full bg-gray-600 border border-gray-600 shadow-sm peer-checked:ring-2 peer-checked:ring-primary peer-checked:ring-offset-2 transition-all">
                        </div>
                        <span
                            class="material-symbols-rounded absolute inset-0 flex items-center justify-center text-white opacity-0 peer-checked:opacity-100 transition-opacity">check</span>
                    </label>
                    <!-- Red -->
                    <label class="cursor-pointer relative flex-shrink-0">
                        <input type="radio" name="color" value="red" class="peer sr-only">
                        <div
                            class="w-10 h-10 rounded-full bg-red-600 border border-red-600 shadow-sm peer-checked:ring-2 peer-checked:ring-primary peer-checked:ring-offset-2 transition-all">
                        </div>
                        <span
                            class="material-symbols-rounded absolute inset-0 flex items-center justify-center text-white opacity-0 peer-checked:opacity-100 transition-opacity">check</span>
                    </label>
                    <!-- Blue -->
                    <label class="cursor-pointer relative flex-shrink-0">
                        <input type="radio" name="color" value="blue" class="peer sr-only">
                        <div
                            class="w-10 h-10 rounded-full bg-blue-700 border border-blue-700 shadow-sm peer-checked:ring-2 peer-checked:ring-primary peer-checked:ring-offset-2 transition-all">
                        </div>
                        <span
                            class="material-symbols-rounded absolute inset-0 flex items-center justify-center text-white opacity-0 peer-checked:opacity-100 transition-opacity">check</span>
                    </label>
                    <!-- Green -->
                    <label class="cursor-pointer relative flex-shrink-0">
                        <input type="radio" name="color" value="green" class="peer sr-only">
                        <div
                            class="w-10 h-10 rounded-full bg-green-600 border border-green-600 shadow-sm peer-checked:ring-2 peer-checked:ring-primary peer-checked:ring-offset-2 transition-all">
                        </div>
                        <span
                            class="material-symbols-rounded absolute inset-0 flex items-center justify-center text-white opacity-0 peer-checked:opacity-100 transition-opacity">check</span>
                    </label>
                    <!-- Yellow -->
                    <label class="cursor-pointer relative flex-shrink-0">
                        <input type="radio" name="color" value="yellow" class="peer sr-only">
                        <div
                            class="w-10 h-10 rounded-full bg-yellow-400 border border-yellow-400 shadow-sm peer-checked:ring-2 peer-checked:ring-primary peer-checked:ring-offset-2 transition-all">
                        </div>
                        <span
                            class="material-symbols-rounded absolute inset-0 flex items-center justify-center text-white opacity-0 peer-checked:opacity-100 transition-opacity">check</span>
                    </label>
                    <!-- Orange -->
                    <label class="cursor-pointer relative flex-shrink-0">
                        <input type="radio" name="color" value="orange" class="peer sr-only">
                        <div
                            class="w-10 h-10 rounded-full bg-orange-500 border border-orange-500 shadow-sm peer-checked:ring-2 peer-checked:ring-primary peer-checked:ring-offset-2 transition-all">
                        </div>
                        <span
                            class="material-symbols-rounded absolute inset-0 flex items-center justify-center text-white opacity-0 peer-checked:opacity-100 transition-opacity">check</span>
                    </label>
                    <!-- Purple -->
                    <label class="cursor-pointer relative flex-shrink-0">
                        <input type="radio" name="color" value="purple" class="peer sr-only">
                        <div
                            class="w-10 h-10 rounded-full bg-purple-600 border border-purple-600 shadow-sm peer-checked:ring-2 peer-checked:ring-primary peer-checked:ring-offset-2 transition-all">
                        </div>
                        <span
                            class="material-symbols-rounded absolute inset-0 flex items-center justify-center text-white opacity-0 peer-checked:opacity-100 transition-opacity">check</span>
                    </label>
                    <!-- Brown -->
                    <label class="cursor-pointer relative flex-shrink-0">
                        <input type="radio" name="color" value="brown" class="peer sr-only">
                        <div
                            class="w-10 h-10 rounded-full bg-[#5D4037] border border-[#5D4037] shadow-sm peer-checked:ring-2 peer-checked:ring-primary peer-checked:ring-offset-2 transition-all">
                        </div>
                        <span
                            class="material-symbols-rounded absolute inset-0 flex items-center justify-center text-white opacity-0 peer-checked:opacity-100 transition-opacity">check</span>
                    </label>
                </div>
            </div>

            <!-- Submit Button -->
            <button type="button" onclick="history.back()"
                class="w-full bg-primary text-white font-bold py-4 rounded-xl mt-4 shadow-lg shadow-primary/30 hover:bg-primary-dark transition-colors flex items-center justify-center gap-2">
                <span class="material-symbols-rounded">add_circle</span>
                დამატება
            </button>

        </form>

    </div>

</body>

</html>
