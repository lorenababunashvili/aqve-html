<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AQUE - Add Vehicle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: "#14d0a1", background: "#f8f9fb" },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body class="bg-background text-gray-900 font-sans min-h-[100dvh] flex flex-col relative pb-32">

    <!-- Header -->
    <header
        class="px-5 pt-10 pb-4 flex items-center justify-between z-20 sticky top-0 bg-background/90 backdrop-blur-md">
        <div class="flex items-center gap-3">
            <a href="vehicles.html"
                class="p-1 text-[#001736] hover:bg-gray-100 rounded-full transition-colors flex items-center justify-center">
                <span class="material-symbols-rounded text-[20px]">arrow_back</span>
            </a>
            <h1 class="text-[19px] font-extrabold text-[#001736] tracking-tight">Add Vehicle</h1>
        </div>
        <div class="w-8"></div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto hide-scrollbar px-5 pt-2 flex flex-col gap-6">

        <form class="bg-white p-5 rounded-[28px] shadow-sm border border-gray-100 flex flex-col gap-5">

            <!-- Vehicle Type -->
            <div class="flex flex-col gap-3">
                <label class="text-[12px] font-bold text-[#001736] ml-1">Vehicle Type</label>
                <div class="grid grid-cols-4 gap-2">

                    <!-- Car -->
                    <label
                        class="flex flex-col items-center justify-center gap-1.5 p-2 rounded-[16px] border-2 border-[#14d0a1] bg-[#e6f9f4] cursor-pointer cursor-pointer transition-colors">
                        <input type="radio" name="vehicle_type" value="car" class="hidden" checked>
                        <span class="material-symbols-rounded text-[#2196F3] text-[28px]">directions_car</span>
                        <span class="text-[11px] font-extrabold text-[#001736]">Car</span>
                    </label>

                    <!-- Moto -->
                    <label
                        class="flex flex-col items-center justify-center gap-1.5 p-2 rounded-[16px] border border-gray-100 hover:bg-gray-50 cursor-pointer transition-colors">
                        <input type="radio" name="vehicle_type" value="moto" class="hidden">
                        <span class="material-symbols-rounded text-[#F44336] text-[28px]">two_wheeler</span>
                        <span class="text-[11px] font-bold text-gray-500">Moto</span>
                    </label>

                    <!-- Truck -->
                    <label
                        class="flex flex-col items-center justify-center gap-1.5 p-2 rounded-[16px] border border-gray-100 hover:bg-gray-50 cursor-pointer transition-colors">
                        <input type="radio" name="vehicle_type" value="truck" class="hidden">
                        <span class="material-symbols-rounded text-[#607D8B] text-[28px]">local_shipping</span>
                        <span class="text-[11px] font-bold text-gray-500">Truck</span>
                    </label>

                    <!-- Bus -->
                    <label
                        class="flex flex-col items-center justify-center gap-1.5 p-2 rounded-[16px] border border-gray-100 hover:bg-gray-50 cursor-pointer transition-colors">
                        <input type="radio" name="vehicle_type" value="bus" class="hidden">
                        <span class="material-symbols-rounded text-[#E91E63] text-[28px]">directions_bus</span>
                        <span class="text-[11px] font-bold text-gray-500">Bus</span>
                    </label>
                </div>
            </div>

            <!-- License Plate -->
            <div class="flex flex-col gap-2">
                <label class="text-[12px] font-bold text-[#001736] ml-1">License Plate</label>
                <div
                    class="relative flex items-center bg-[#f8f9fb] border border-gray-100 rounded-[16px] overflow-hidden focus-within:ring-2 focus-within:ring-[#14d0a1]/20">
                    <div class="px-4 py-3.5 text-gray-400 font-extrabold text-[15px] border-r border-gray-200">
                        GE
                    </div>
                    <input type="text" placeholder="AA-000-AA"
                        class="w-full bg-transparent px-4 py-3.5 text-[#001736] font-bold text-[15px] outline-none uppercase placeholder-gray-300">
                </div>
            </div>

            <!-- Make and Model Row -->
            <div class="grid grid-cols-2 gap-3">
                <div class="flex flex-col gap-2">
                    <label class="text-[12px] font-bold text-[#001736] ml-1">Make</label>
                    <input type="text" placeholder="Toyota"
                        class="w-full bg-[#f8f9fb] border border-gray-100 rounded-[16px] px-4 py-3.5 text-[#001736] font-bold text-[14px] outline-none focus:bg-white focus:ring-2 focus:ring-[#14d0a1]/20 placeholder-gray-400">
                </div>
                <div class="flex flex-col gap-2">
                    <label class="text-[12px] font-bold text-[#001736] ml-1">Model</label>
                    <input type="text" placeholder="Prius"
                        class="w-full bg-[#f8f9fb] border border-gray-100 rounded-[16px] px-4 py-3.5 text-[#001736] font-bold text-[14px] outline-none focus:bg-white focus:ring-2 focus:ring-[#14d0a1]/20 placeholder-gray-400">
                </div>
            </div>

            <!-- Is Electric Toggle -->
            <div class="flex items-center justify-between mt-2 px-1">
                <div class="flex flex-col">
                    <span class="text-[14px] font-bold text-[#001736]">Electric Vehicle?</span>
                    <span class="text-[11px] text-gray-400 font-medium">To show EV charging locations</span>
                </div>
                <label class="relative inline-flex items-center cursor-pointer">
                    <input type="checkbox" value="" class="sr-only peer">
                    <div
                        class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-[#14d0a1]">
                    </div>
                </label>
            </div>

            <!-- Color Palette -->
            <div class="flex flex-col gap-2 mt-1">
                <label class="text-[12px] font-bold text-[#001736] ml-1">Color</label>
                <div class="flex flex-wrap gap-2.5">

                    <label class="relative cursor-pointer">
                        <input type="radio" name="color" class="hidden" checked>
                        <div class="w-8 h-8 rounded-full border-2 border-[#14d0a1] flex items-center justify-center">
                            <span class="material-symbols-rounded text-[#14d0a1] text-[16px]">check</span>
                        </div>
                    </label>

                    <label
                        class="w-8 h-8 rounded-full bg-[#1e293b] cursor-pointer hover:scale-110 transition-transform shadow-sm"></label>
                    <label
                        class="w-8 h-8 rounded-full bg-[#94a3b8] cursor-pointer hover:scale-110 transition-transform shadow-sm"></label>
                    <label
                        class="w-8 h-8 rounded-full bg-[#475569] cursor-pointer hover:scale-110 transition-transform shadow-sm"></label>
                    <label
                        class="w-8 h-8 rounded-full bg-[#ef4444] cursor-pointer hover:scale-110 transition-transform shadow-sm"></label>
                    <label
                        class="w-8 h-8 rounded-full bg-[#3b82f6] cursor-pointer hover:scale-110 transition-transform shadow-sm"></label>
                    <label
                        class="w-8 h-8 rounded-full bg-[#22c55e] cursor-pointer hover:scale-110 transition-transform shadow-sm"></label>
                    <label
                        class="w-8 h-8 rounded-full bg-[#facc15] cursor-pointer hover:scale-110 transition-transform shadow-sm"></label>

                </div>
            </div>

            <!-- Submit Button Space -->
            <div class="mt-4">
                <button type="button"
                    class="w-full bg-[#14d0a1] text-white hover:opacity-90 font-extrabold py-4 rounded-[16px] shadow-[0_8px_16px_rgba(20,208,161,0.25)] flex items-center justify-center gap-2 transition-all active:scale-[0.98]">
                    <span class="material-symbols-rounded text-[20px]">add_circle</span>
                    Add Vehicle
                </button>
            </div>

        </form>

    </main>

</body>

</html>
