<!DOCTYPE html>
<html class="light" lang="ka">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>აქვე - ბარათის დამატება</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link href="https://cdn.web-fonts.ge/fonts/bpg-phone-sans/css/bpg-phone-sans.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#009485",
                        "primary-bright": "#00C2AF",
                        "background-light": "#f8fafc",
                        "background-dark": "#0f2321",
                        "surface": "#ffffff",
                    },
                    fontFamily: {
                        "display": ["BPG Phone Sans", "sans-serif"],
                        "sans": ["BPG Phone Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "2xl": "1rem",
                        "3xl": "1.5rem",
                    },
                    boxShadow: {
                        "soft": "0 10px 40px -10px rgba(0,0,0,0.05)",
                    }
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'BPG Phone Sans', sans-serif;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body class="bg-gray-50 dark:bg-background-dark text-gray-900 dark:text-white min-h-screen flex flex-col">

    <!-- Header -->
    <div
        class="px-6 pt-12 pb-6 flex items-center justify-between z-10 sticky top-0 bg-gray-50/80 dark:bg-background-dark/80 backdrop-blur-md">
        <div class="flex items-center gap-4">
            <button onclick="history.back()"
                class="p-3 bg-white dark:bg-white/10 rounded-full shadow-sm hover:bg-gray-50 transition-colors">
                <span class="material-symbols-rounded text-gray-600 dark:text-gray-200">arrow_back</span>
            </button>
            <h1 class="text-xl font-bold text-gray-800 dark:text-white">ბარათის დამატება</h1>
        </div>
        <div class="w-10"></div>
    </div>

    <!-- Scrollable Content -->
    <div class="flex-1 overflow-y-auto no-scrollbar pb-32 px-6">

        <!-- Card Preview (Visual) -->
        <div
            class="bg-gradient-to-br from-gray-800 to-gray-900 text-white p-6 rounded-[1.5rem] shadow-xl mb-8 relative overflow-hidden h-48 flex flex-col justify-between">
            <div class="absolute top-0 right-0 w-32 h-32 bg-white/5 rounded-full -mr-10 -mt-10 blur-xl"></div>
            <div class="absolute bottom-0 left-0 w-24 h-24 bg-black/20 rounded-full -ml-8 -mb-8 blur-xl"></div>

            <div class="flex justify-between items-start relative z-10">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/5e/Visa_Inc._logo.svg"
                    class="h-8 filter brightness-0 invert opacity-80">
                <span class="material-symbols-rounded text-white/50">contactless</span>
            </div>

            <div class="relative z-10">
                <div class="mb-4">
                    <p class="font-mono text-xl tracking-widest opacity-80" id="card-number-preview">•••• •••• •••• ••••
                    </p>
                </div>
                <div class="flex justify-between items-end">
                    <div>
                        <p class="text-[10px] uppercase text-white/50 mb-0.5">CARD HOLDER</p>
                        <p class="font-bold tracking-wide uppercase text-sm" id="card-holder-preview">YOUR NAME</p>
                    </div>
                    <div>
                        <p class="text-[10px] uppercase text-white/50 mb-0.5">EXPIRES</p>
                        <p class="font-bold tracking-wide text-sm" id="card-expiry-preview">MM/YY</p>
                    </div>
                </div>
            </div>
        </div>

        <form class="flex flex-col gap-5">

            <!-- Card Number -->
            <div>
                <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-2 ml-2">ბარათის ნომერი</label>
                <div class="relative">
                    <input type="text"
                        class="w-full bg-white dark:bg-white/5 border-none rounded-xl py-4 pl-12 pr-4 font-mono font-bold text-gray-800 dark:text-white placeholder:text-gray-400 focus:ring-2 focus:ring-primary/20"
                        placeholder="0000 0000 0000 0000">
                    <span
                        class="material-symbols-rounded absolute left-4 top-1/2 -translate-y-1/2 text-gray-400">credit_card</span>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <!-- Expiry Date -->
                <div>
                    <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-2 ml-2">ვადა</label>
                    <input type="text"
                        class="w-full bg-white dark:bg-white/5 border-none rounded-xl py-4 px-4 font-mono font-bold text-center text-gray-800 dark:text-white placeholder:text-gray-400 focus:ring-2 focus:ring-primary/20"
                        placeholder="MM/YY">
                </div>
                <!-- CVV -->
                <div>
                    <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-2 ml-2">CVV</label>
                    <div class="relative">
                        <input type="text"
                            class="w-full bg-white dark:bg-white/5 border-none rounded-xl py-4 px-4 font-mono font-bold text-center text-gray-800 dark:text-white placeholder:text-gray-400 focus:ring-2 focus:ring-primary/20"
                            placeholder="123">
                        <span
                            class="material-symbols-rounded absolute right-4 top-1/2 -translate-y-1/2 text-gray-400 text-sm cursor-help">help</span>
                    </div>
                </div>
            </div>

            <!-- Card Holder Name -->
            <div>
                <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-2 ml-2">მფლობელის
                    სახელი</label>
                <input type="text"
                    class="w-full bg-white dark:bg-white/5 border-none rounded-xl py-4 px-4 font-bold text-gray-800 dark:text-white placeholder:text-gray-400 focus:ring-2 focus:ring-primary/20"
                    placeholder="YOUR NAME">
            </div>

            <!-- Save Card Checkbox -->
            <label class="flex items-center gap-3 p-2 cursor-pointer">
                <input type="checkbox"
                    class="w-5 h-5 rounded border-gray-300 text-primary focus:ring-primary bg-gray-100 dark:bg-white/10 dark:border-transparent dark:checked:bg-primary"
                    checked>
                <span class="text-sm font-medium text-gray-600 dark:text-gray-300">დაიმახსოვრე ბარათი შემდეგი
                    გადახდისთვის</span>
            </label>

            <!-- Submit Button -->
            <button type="button" onclick="history.back()"
                class="w-full bg-primary text-white font-bold py-4 rounded-xl mt-4 shadow-lg shadow-primary/30 hover:bg-primary-dark transition-colors flex items-center justify-center gap-2">
                <span class="material-symbols-rounded">add_card</span>
                დამატება
            </button>

        </form>

    </div>

</body>

</html>
