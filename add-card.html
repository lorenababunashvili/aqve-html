<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AQUE - Add Card</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: "#14d0a1", background: "#f8f9fb" },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body class="bg-background text-gray-900 font-sans min-h-[100dvh] flex flex-col relative pb-10">

    <!-- Header -->
    <header
        class="px-5 pt-10 pb-4 flex items-center justify-between z-20 sticky top-0 bg-background/90 backdrop-blur-md">
        <div class="flex items-center gap-3">
            <button onclick="history.back()" class="p-1 text-[#001736]">
                <span class="material-symbols-rounded text-2xl">arrow_back</span>
            </button>
            <h1 class="text-[22px] font-extrabold text-[#001736]">Add New Card</h1>
        </div>
        <div class="w-10"></div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto hide-scrollbar px-5 pt-4 pb-10">

        <!-- Card Preview (Visual) -->
        <div
            class="w-full bg-[#001736] text-white p-6 rounded-[28px] shadow-xl mb-8 relative overflow-hidden h-[200px] flex flex-col justify-between border border-gray-800">
            <div class="absolute -right-6 -top-6 w-36 h-36 bg-[#14d0a1]/20 rounded-full blur-[32px]"></div>
            <div class="absolute bottom-0 left-0 w-24 h-24 bg-blue-500/20 rounded-full blur-[24px]"></div>

            <div class="flex justify-between items-start relative z-10 w-full mt-1">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/5e/Visa_Inc._logo.svg"
                    class="h-6 filter brightness-0 invert opacity-90" alt="Card Brand">
                <span class="material-symbols-rounded text-white/50 text-[32px]">contactless</span>
            </div>

            <div class="relative z-10 w-full">
                <div class="mb-5">
                    <p class="font-mono text-[22px] tracking-[0.2em] font-medium" id="card-number-preview">
                        •••• •••• •••• ••••
                    </p>
                </div>
                <div class="flex justify-between items-end w-full">
                    <div class="flex flex-col">
                        <p class="text-[10px] uppercase font-bold text-white/50 tracking-widest mb-0.5">Card Holder</p>
                        <p class="font-bold tracking-widest uppercase text-[14px]" id="card-holder-preview">YOUR NAME
                        </p>
                    </div>
                    <div class="flex flex-col items-end">
                        <p class="text-[10px] uppercase font-bold text-white/50 tracking-widest mb-0.5">Expires</p>
                        <p class="font-bold tracking-widest text-[14px] font-mono" id="card-expiry-preview">MM/YY</p>
                    </div>
                </div>
            </div>
        </div>

        <form class="flex flex-col gap-5">

            <!-- Card Number -->
            <div class="flex flex-col gap-1.5">
                <label class="text-[12px] font-bold uppercase tracking-wider text-gray-400 ml-1">Card Number</label>
                <div class="relative group">
                    <input type="text"
                        class="w-full bg-white pl-12 pr-4 py-3.5 rounded-[20px] border border-gray-100 shadow-sm font-mono font-bold text-[16px] tracking-widest outline-none transition-all placeholder:font-normal placeholder:tracking-normal placeholder:text-gray-400 focus:border-[#14d0a1]"
                        placeholder="0000 0000 0000 0000">
                    <div
                        class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-gray-400 group-focus-within:text-[#14d0a1] transition-colors">
                        <span class="material-symbols-rounded text-[20px]">credit_card</span>
                    </div>
                </div>
            </div>

            <!-- Expiry & CVV Row -->
            <div class="grid grid-cols-2 gap-4">
                <div class="flex flex-col gap-1.5">
                    <label class="text-[12px] font-bold uppercase tracking-wider text-gray-400 ml-1">Expiry Date</label>
                    <input type="text"
                        class="w-full bg-white px-4 py-3.5 rounded-[20px] border border-gray-100 shadow-sm font-mono font-bold text-[16px] text-center outline-none transition-all placeholder:font-normal placeholder:text-gray-400 focus:border-[#14d0a1]"
                        placeholder="MM/YY">
                </div>
                <div class="flex flex-col gap-1.5">
                    <label class="text-[12px] font-bold uppercase tracking-wider text-gray-400 ml-1">CVV</label>
                    <div class="relative group">
                        <input type="password"
                            class="w-full bg-white px-4 py-3.5 rounded-[20px] border border-gray-100 shadow-sm font-mono font-bold text-[16px] text-center outline-none transition-all placeholder:font-normal placeholder:text-gray-400 focus:border-[#14d0a1]"
                            placeholder="123" maxlength="4">
                        <div
                            class="absolute inset-y-0 right-0 pr-4 flex items-center pointer-events-none text-gray-300">
                            <span class="material-symbols-rounded text-[18px]">help</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Card Holder Name -->
            <div class="flex flex-col gap-1.5">
                <label class="text-[12px] font-bold uppercase tracking-wider text-gray-400 ml-1">Card Holder
                    Name</label>
                <input type="text"
                    class="w-full bg-white px-4 py-3.5 rounded-[20px] border border-gray-100 shadow-sm font-bold text-[15px] uppercase outline-none transition-all placeholder:font-normal placeholder:normal-case placeholder:text-gray-400 focus:border-[#14d0a1]"
                    placeholder="E.g. John Doe">
            </div>

            <!-- Save Card Toggle -->
            <div class="flex items-center justify-between p-2 mt-2 cursor-pointer bg-white rounded-2xl border border-gray-50 p-4 shadow-sm"
                onclick="const cb = document.getElementById('saveCard'); cb.checked = !cb.checked;">
                <span class="text-[14px] font-bold text-[#001736]">Save card for future payments</span>
                <label class="relative inline-flex items-center cursor-pointer pointer-events-none">
                    <input type="checkbox" id="saveCard" class="sr-only peer" checked>
                    <div
                        class="w-11 h-6 bg-gray-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-[#14d0a1]">
                    </div>
                </label>
            </div>

            <!-- Submit Button -->
            <button type="button" onclick="history.back()"
                class="w-full bg-gradient-to-r from-[#17e3ae] to-[#8affda] text-[#003822] font-bold py-4 rounded-2xl shadow-[0_8px_16px_rgba(20,208,161,0.25)] active:scale-[0.98] transition-all flex items-center justify-center gap-2 text-[16px] mt-6 hover:opacity-90">
                <span class="material-symbols-rounded text-[20px]">add_card</span>
                <span>Add Card</span>
            </button>

        </form>

    </main>

</body>

</html>
