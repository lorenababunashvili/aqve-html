<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Active Session</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: "#14d0a1",
                        background: "#f4f7f8", /* Light blue-grayish background */
                        textNavy: "#001e36",
                        textGray: "#8a96a3"
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        .circular-progress {
            position: relative;
            width: 240px;
            height: 240px;
            margin: 0 auto;
        }

        .circular-progress svg {
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }

        .circular-progress circle {
            fill: none;
            stroke-width: 16;
            stroke-linecap: round;
        }

        .circular-progress .track {
            stroke: #ffffff;
        }

        .circular-progress .progress {
            stroke: #14d0a1;
            /* Dash array matching circumference: 2 * pi * r. r=100 (for 240x240 box padded) -> circ = ~628 */
            stroke-dasharray: 628;
            stroke-dashoffset: 140;
            /* ~75% filled */
            transition: stroke-dashoffset 0.5s ease;
        }

        /* Subtle glowing background shadow behind circle */
        .circle-glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            height: 200px;
            background: rgba(20, 208, 161, 0.15);
            filter: blur(40px);
            border-radius: 50%;
            z-index: 0;
        }

        .circle-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
            width: 100%;
        }
    </style>
</head>

<body class="bg-background text-gray-900 font-sans min-h-[100dvh] flex flex-col relative overflow-hidden pb-8">

    <!-- Decorative Gradients -->
    <div class="absolute inset-0 z-0 pointer-events-none">
        <div
            class="absolute top-0 right-0 w-[400px] h-[400px] bg-[#14d0a1]/10 rounded-full blur-[80px] -translate-y-1/2 translate-x-1/3">
        </div>
        <div
            class="absolute bottom-0 left-0 w-[300px] h-[300px] bg-[#14d0a1]/10 rounded-full blur-[60px] translate-y-1/3 -translate-x-1/3">
        </div>
    </div>

    <!-- Header -->
    <header class="px-6 pt-12 pb-6 flex items-center justify-between z-20 relative">
        <button onclick="history.back()" class="w-8 h-8 flex items-center justify-center text-[#001e36]">
            <span class="material-symbols-rounded text-[24px]">close</span>
        </button>

        <div
            class="bg-[#e4fff4] text-[#14d0a1] font-extrabold text-[10px] tracking-wider uppercase px-4 py-1.5 rounded-full">
            Active Session
        </div>

        <button class="w-8 h-8 flex items-center justify-center text-gray-400">
            <span class="material-symbols-rounded text-[24px]">more_vert</span>
        </button>
    </header>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col px-5 relative z-10">

        <!-- Timer Circle -->
        <div class="mt-4 mb-8">
            <div class="circular-progress">
                <div class="circle-glow"></div>
                <svg viewBox="0 0 240 240">
                    <!-- r=100 so it has some padding from the 240px edge for the thick stroke -->
                    <circle class="track" cx="120" cy="120" r="100"></circle>
                    <circle class="progress" cx="120" cy="120" r="100"></circle>
                </svg>
                <div class="circle-content flex flex-col items-center">
                    <span class="text-textGray font-bold text-[11px] tracking-wide uppercase mb-0.5">Time
                        Remaining</span>
                    <span class="text-textNavy font-black text-[42px] tracking-tight leading-none my-1">01:24:05</span>
                    <span class="text-[#14d0a1] font-bold text-[13px] mt-1">Ends at 11:00 AM</span>
                </div>
            </div>
        </div>

        <!-- Details Card -->
        <div class="bg-white rounded-[24px] p-5 shadow-[0_4px_20px_rgba(0,0,0,0.02)] mb-4 relative overflow-hidden">
            <!-- Subtle decorative shape in the top right of this card -->
            <div class="absolute top-0 right-0 w-32 h-32 bg-[#f0fbf8] rounded-bl-full z-0 opacity-60"></div>

            <div class="relative z-10">
                <h2 class="text-[18px] font-extrabold text-textNavy tracking-tight">Freedom Square Parking</h2>
                <div class="flex items-center gap-1 mt-1.5 mb-5 text-textGray">
                    <span class="material-symbols-rounded text-[14px]">location_on</span>
                    <span class="text-[13px] font-medium">Tbilisi, Freedom Square</span>
                </div>

                <div class="flex gap-3">
                    <div
                        class="flex-1 bg-[#f8f9fb] rounded-[16px] py-4 flex flex-col items-center justify-center border border-gray-50">
                        <span class="text-textGray text-[11px] font-bold mb-1">Parking Slot</span>
                        <span class="text-textNavy text-[18px] font-black">B - 1</span>
                    </div>

                    <button
                        class="flex-1 bg-white rounded-[16px] py-4 flex flex-col items-center justify-center border-[1.5px] border-dashed border-gray-200 hover:bg-gray-50 transition-colors">
                        <span
                            class="material-symbols-rounded text-textNavy text-[22px] mb-1 !font-['Material_Symbols_Rounded']"
                            style="font-variation-settings: 'FILL' 0, 'wght' 600;">qr_code_2</span>
                        <span class="text-textGray text-[11px] font-bold">Show QR</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- Cost Card -->
        <div
            class="bg-white rounded-[20px] p-5 shadow-[0_4px_20px_rgba(0,0,0,0.02)] flex items-center justify-between mb-8">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 rounded-full bg-[#f4f7fa] flex items-center justify-center text-textNavy">
                    <span class="material-symbols-rounded text-[20px]">payments</span>
                </div>
                <div class="flex flex-col">
                    <span class="text-textNavy font-bold text-[14px]">Total Accrued</span>
                    <span class="text-textGray font-medium text-[11px]">Auto-pay enabled</span>
                </div>
            </div>
            <div class="text-[#14d0a1] font-black text-[20px]">
                ₾12.00
            </div>
        </div>

        <!-- Spacer to push buttons down if needed, or just let them sit -->
        <div class="flex-1"></div>

        <!-- Action Buttons -->
        <div class="flex flex-col gap-3">
            <a href="extend-time.html"
                class="w-full bg-gradient-to-r from-[#14d0a1] to-[#2de0b6] text-white font-bold text-[16px] py-4 rounded-[16px] shadow-[0_8px_20px_rgba(20,208,161,0.25)] flex items-center justify-center gap-2 hover:opacity-90 transition-opacity">
                <span class="material-symbols-rounded text-[20px]">update</span>
                Extend Time
            </a>

            <a href="end-session.html"
                class="w-full bg-[#fff5f5] text-[#ff4b6a] font-bold text-[15px] py-4 rounded-[16px] border border-[#ffeaeb] hover:bg-[#ffebeb] transition-colors flex justify-center items-center">
                End Session Early
            </a>
        </div>

    </main>

</body>

</html>
