<!DOCTYPE html>
<html class="light" lang="ka">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>აქვე - მიმდინარე სესია</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link href="https://cdn.web-fonts.ge/fonts/bpg-phone-sans/css/bpg-phone-sans.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#009485",
                        "primary-bright": "#00C2AF",
                        "background-light": "#f5f8f8",
                        "background-dark": "#0f2321",
                        "success": "#22C55E",
                        "warning": "#F59E0B",
                        "surface": "#ffffff",
                        "surface-dark": "#18181b"
                    },
                    fontFamily: {
                        "display": ["BPG Phone Sans", "sans-serif"],
                        "sans": ["BPG Phone Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "2xl": "1rem",
                        "3xl": "1.5rem",
                    },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'BPG Phone Sans', sans-serif;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .dark .glass-panel {
            background: rgba(15, 35, 33, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        @keyframes pulse-ring {
            0% {
                transform: scale(0.8);
                opacity: 0.5;
            }

            100% {
                transform: scale(2);
                opacity: 0;
            }
        }

        .timer-dot {
            position: relative;
        }

        .timer-dot::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: inherit;
            border-radius: 50%;
            z-index: -1;
            animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark text-gray-900 dark:text-white min-h-screen flex flex-col relative overflow-hidden">

    <!-- Background Decoration -->
    <div
        class="fixed top-[-10%] right-[-10%] w-[80vw] h-[80vw] bg-primary/20 rounded-full blur-3xl pointer-events-none">
    </div>
    <div
        class="fixed bottom-[-10%] left-[-10%] w-[60vw] h-[60vw] bg-primary-bright/10 rounded-full blur-3xl pointer-events-none">
    </div>

    <!-- Header -->
    <div class="px-6 pt-8 pb-4 z-10 flex items-center gap-4">
        <a href="home.html"
            class="p-2.5 bg-white dark:bg-surface-dark rounded-xl shadow-sm border border-gray-100 dark:border-gray-800 text-gray-600 dark:text-gray-300">
            <span class="material-symbols-outlined">arrow_back</span>
        </a>
        <h1 class="text-xl font-bold">მიმდინარე სესია</h1>
    </div>

    <div class="flex-1 px-6 pb-8 z-10 flex flex-col gap-6 overflow-y-auto">

        <!-- Timer Card -->
        <div
            class="glass-panel p-8 rounded-[2.5rem] shadow-sm flex flex-col items-center gap-2 relative overflow-hidden">
            <!-- Status Indicator -->
            <div class="absolute top-6 right-6">
                <div class="flex items-center gap-2 bg-green-100 dark:bg-green-900/30 px-3 py-1 rounded-full">
                    <div class="w-2 h-2 bg-success rounded-full timer-dot"></div>
                    <span class="text-xs font-bold text-success uppercase">აქტიური</span>
                </div>
            </div>

            <span class="text-sm font-bold text-gray-400 uppercase tracking-wider mt-4">პარკინგის დრო</span>
            <div id="timer" class="text-6xl font-extrabold text-primary font-mono tracking-tighter tabular-nums">
                00:00:00
            </div>
            <p class="text-gray-500 dark:text-gray-400 text-sm font-medium">დაიწყო: <span
                    id="start-time-display">--:--</span></p>
        </div>

        <!-- Cost Card -->
        <div class="grid grid-cols-2 gap-4">
            <div class="glass-panel p-5 rounded-3xl shadow-sm flex flex-col gap-1">
                <span class="material-symbols-outlined text-primary text-[28px] mb-2">payments</span>
                <span class="text-xs text-gray-500 font-bold uppercase">მიმდინარე</span>
                <div>
                    <span id="current-cost" class="text-2xl font-extrabold text-[#101818] dark:text-white">0.00</span>
                    <span class="text-sm font-bold text-gray-400">₾</span>
                </div>
            </div>
            <div class="glass-panel p-5 rounded-3xl shadow-sm flex flex-col gap-1">
                <span class="material-symbols-outlined text-warning text-[28px] mb-2">bolt</span>
                <span class="text-xs text-gray-500 font-bold uppercase">ტარიფი</span>
                <div>
                    <span class="text-2xl font-extrabold text-[#101818] dark:text-white">3.00</span>
                    <span class="text-sm font-bold text-gray-400">₾/სთ</span>
                </div>
            </div>
        </div>

        <!-- Location Card -->
        <div class="glass-panel p-1 rounded-3xl shadow-sm">
            <div class="relative w-full aspect-video rounded-[1.2rem] overflow-hidden">
                <!-- Static Map Placeholder -->
                <div class="absolute inset-0 bg-cover bg-center"
                    style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuBhUpmqkWwK4oj2zkFSL9OnTDov1_PBmdIfG_4qyXusxZloJhLbwIdR_8_zMDQ10Uc_9VznLg5TZUHod2IrWivVCr8aHkF7a3jw7_Vpwy0no8AKR7Yug37EtkNe9lU6pzULnlIMxndvr8DHeTROdN2vpQUCZaHk6tkGwD64ZCJGn1wAEz2m9g1RLHRfLrSA6Bq5X1-7OFoKw7qdvuDw4inFvJSdz5PRQpWwEmkexxWVdMWG_7gikihntgEuV9YX41PCNNuil9Kv5ME");'>
                </div>
                <div class="absolute inset-0 bg-black/10"></div>

                <!-- Pin -->
                <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2">
                    <div class="relative flex items-center justify-center">
                        <div class="absolute h-12 w-12 rounded-full bg-primary/30 animate-pulse"></div>
                        <div class="h-4 w-4 bg-primary rounded-full border-2 border-white shadow-lg"></div>
                    </div>
                </div>

                <div class="absolute bottom-3 left-3 right-3">
                    <div
                        class="bg-white/90 dark:bg-black/80 backdrop-blur-md rounded-xl p-3 flex items-center justify-between shadow-sm">
                        <div class="flex flex-col">
                            <span class="text-xs text-gray-500 font-bold uppercase">ლოკაცია</span>
                            <span class="text-sm font-bold text-gray-900 dark:text-white">ჭავჭავაძის გამზ. #34</span>
                        </div>
                        <a href="home.html" class="p-2 bg-white dark:bg-zinc-800 rounded-lg shadow-sm">
                            <span class="material-symbols-outlined text-primary text-[20px]">near_me</span>
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <!-- Actions -->
        <div class="mt-auto">
            <a href="receipt.html"
                class="w-full bg-red-500 hover:bg-red-600 text-white font-bold py-4 rounded-2xl shadow-lg shadow-red-500/30 transition-all flex items-center justify-center gap-2 active:scale-[0.98]">
                <span>სესიის დასრულება</span>
                <span class="material-symbols-outlined">stop_circle</span>
            </a>
            <p class="text-xs text-center text-gray-400 mt-4 font-medium">სესიის დასრულების შემდეგ თანხა ავტომატურად
                ჩამოიჭრება</p>
        </div>

    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const timerEl = document.getElementById('timer');
            const costEl = document.getElementById('current-cost');
            const startTimeDisplay = document.getElementById('start-time-display');
            const RATE_PER_HOUR = 3.00;
            const RATE_PER_SECOND = RATE_PER_HOUR / 3600;

            // Simulate start time (e.g., 45 minutes ago for demo purposes)
            const startTime = new Date();
            startTime.setMinutes(startTime.getMinutes() - 45);
            startTime.setSeconds(startTime.getSeconds() - 12);

            // Format start time display
            startTimeDisplay.textContent = startTime.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });

            function updateTimer() {
                const now = new Date();
                const diff = now - startTime;

                // Calculate HH:MM:SS
                const hours = Math.floor(diff / 3600000);
                const minutes = Math.floor((diff % 3600000) / 60000);
                const seconds = Math.floor((diff % 60000) / 1000);

                const formattedTime =
                    (hours < 10 ? "0" + hours : hours) + ":" +
                    (minutes < 10 ? "0" + minutes : minutes) + ":" +
                    (seconds < 10 ? "0" + seconds : seconds);

                timerEl.textContent = formattedTime;

                // Calculate Cost
                const totalSeconds = diff / 1000;
                const cost = totalSeconds * RATE_PER_SECOND;
                costEl.textContent = cost.toFixed(2);
            }

            // Update every second
            setInterval(updateTimer, 1000);
            updateTimer(); // Initial call
        });
    </script>
</body>

</html>
