<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AQUE - Map View</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: "#14d0a1", background: "#f8f9fb" },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .tear-drop {
            position: relative;
            width: 48px;
            height: 52px;
            background: #001736;
            border-radius: 50% 50% 50% 0;
            transform: rotate(-45deg);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 16px rgba(0,23,54, 0.25);
            transition: all 0.2s ease;
        }
        .tear-drop:active { transform: rotate(-45deg) scale(0.95); }
        .tear-drop > span { transform: rotate(45deg); }
        .tear-drop-primary {
            background: #14d0a1;
            box-shadow: 0 8px 16px rgba(20,208,161, 0.4);
        }
        
        /* Car Splash Animation from original code */
        @keyframes drive { to { offset-distance: 100%; } }
        @keyframes drawRoad { to { stroke-dashoffset: 0; } }
        @keyframes fadeOutSplash { 0% { opacity: 1; visibility: visible; } 85% { opacity: 1; visibility: visible; } 100% { opacity: 0; visibility: hidden; } }
        @keyframes textReveal { 0% { opacity: 0; transform: translateY(20px); } 100% { opacity: 1; transform: translateY(0); } }

        .splash-container { position: fixed; inset: 0; z-index: 9999; background-color: #f8f9fb; display: flex; justify-content: center; align-items: center; animation: fadeOutSplash 7.5s forwards; pointer-events: none; }
        .road-path { fill: none; stroke: #e5e7eb; stroke-width: 120; stroke-linecap: round; }
        .road-texture { opacity: 0.1; mix-blend-mode: multiply; }
        .road-trail { fill: none; stroke: #14d0a1; stroke-width: 120; stroke-linecap: round; stroke-dasharray: 1400; stroke-dashoffset: 1400; animation: drawRoad 6s cubic-bezier(0.45, 0, 0.1, 1) forwards; filter: url(#glow); }
        .car-group { offset-path: path('M-150,250 C150,250 50,50 350,50 C650,50 550,300 800,300'); offset-distance: 0%; offset-rotate: auto; animation: drive 6s cubic-bezier(0.45, 0, 0.1, 1) forwards; transform-box: fill-box; transform-origin: center; transform: scale(1.5); }
        .logo-text { font-family: 'Inter', sans-serif; font-weight: 900; fill: #14d0a1; font-size: 64px; opacity: 0; animation: textReveal 0.8s ease-out 5s forwards; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); letter-spacing: -2px; }
    </style>
</head>

<body class="font-sans bg-background text-[#001736] min-h-[100dvh]">

    <div class="relative flex h-[100dvh] w-full flex-col overflow-hidden">

        <!-- Map Background (Zoomed Image simulating Map) -->
        <div class="absolute inset-0 z-0">
            <div class="h-full w-full bg-cover bg-center"
                style='background-image: url("https://lh3.googleusercontent.com/aida-public/AB6AXuBhUpmqkWwK4oj2zkFSL9OnTDov1_PBmdIfG_4qyXusxZloJhLbwIdR_8_zMDQ10Uc_9VznLg5TZUHod2IrWivVCr8aHkF7a3jw7_Vpwy0no8AKR7Yug37EtkNe9lU6pzULnlIMxndvr8DHeTROdN2vpQUCZaHk6tkGwD64ZCJGn1wAEz2m9g1RLHRfLrSA6Bq5X1-7OFoKw7qdvuDw4inFvJSdz5PRQpWwEmkexxWVdMWG_7gikihntgEuV9YX41PCNNuil9Kv5ME"); filter: brightness(0.95);'>

                <!-- Map Markers -->
                <a href="lot-details.html" class="absolute top-[35%] left-[20%]">
                    <div class="tear-drop border-[3px] border-white">
                        <span class="text-[13px] font-extrabold text-white">1.5₾</span>
                    </div>
                </a>
                <a href="lot-details.html" class="absolute top-[25%] right-[30%]">
                    <div class="tear-drop border-[3px] border-white">
                        <span class="text-[13px] font-extrabold text-white">2₾</span>
                    </div>
                </a>

                <!-- Main Selected Marker (Current Location Indicator) -->
                <div class="absolute top-[52%] left-[52%] transform -translate-x-1/2 -translate-y-1/2 z-10">
                    <div class="relative flex items-center justify-center">
                        <div class="absolute h-24 w-24 rounded-full bg-[#14d0a1]/20 animate-ping"></div>
                        <div class="absolute h-16 w-16 rounded-full bg-[#14d0a1]/40 animate-pulse"></div>
                        <div class="w-8 h-8 bg-white rounded-full shadow-lg flex items-center justify-center z-10">
                            <div class="w-5 h-5 bg-[#14d0a1] rounded-full border-2 border-white"></div>
                        </div>
                    </div>
                </div>

                <a href="lot-details.html" class="absolute bottom-[42%] left-[15%]">
                    <div class="tear-drop border-[3px] border-white">
                        <span class="text-[13px] font-extrabold text-white">3₾</span>
                    </div>
                </a>
            </div>
        </div>

        <!-- Foreground UI layer -->
        <div class="relative z-10 flex h-full flex-col pointer-events-none">

            <!-- Top Dashboard / Search -->
            <div
                class="px-5 pt-14 pb-6 flex flex-col gap-4 pointer-events-auto bg-white shadow-sm rounded-b-[40px] mb-4 border-b border-gray-100">

                <!-- Header with Back Button -->
                <div class="flex items-center gap-3">
                    <button onclick="window.location.href='home.html'"
                        class="w-10 h-10 bg-gray-50 rounded-full flex items-center justify-center shadow-sm hover:bg-gray-100 active:scale-95 transition-all text-gray-900 border border-gray-100">
                        <span class="material-symbols-rounded text-[20px]">arrow_back</span>
                    </button>
                    <h1 class="text-[18px] font-bold text-[#001736]">Current Location</h1>
                </div>

                <!-- Search Bar -->
                <div class="flex flex-col gap-3 pointer-events-auto w-full">
                    <div
                        class="w-full flex items-center bg-[#f8f9fb] rounded-[20px] h-[56px] px-5 gap-3 border-[1.5px] border-transparent focus-within:border-[#14d0a1] focus-within:bg-white transition-all">
                        <span class="material-symbols-rounded text-gray-400 text-[20px]">search</span>
                        <input
                            class="flex-1 bg-transparent border-none focus:ring-0 text-[15px] font-bold text-gray-900 placeholder:text-gray-900"
                            placeholder="Where do you want to park?" type="text" />
                        <div class="h-6 w-[1.5px] bg-gray-200"></div>
                        <button
                            class="text-[#001736] hover:text-[#14d0a1] transition-colors flex items-center justify-center p-1">
                            <span class="material-symbols-rounded text-[20px]">tune</span>
                        </button>
                    </div>

                    <!-- Quick Filters -->
                    <div class="flex gap-2 overflow-x-auto hide-scrollbar pb-1">
                        <button
                            class="flex shrink-0 items-center justify-center rounded-[16px] bg-white border border-gray-200 px-5 py-2.5 shadow-sm hover:border-[#14d0a1] transition-colors active:scale-95 group">
                            <span class="text-[13px] font-bold text-gray-600 group-hover:text-[#14d0a1]">Free
                                Slot</span>
                        </button>
                        <button
                            class="flex shrink-0 items-center justify-center gap-1.5 rounded-[16px] bg-gradient-to-r from-[#17e3ae] to-[#8affda] px-5 py-2.5 shadow-md active:scale-95 text-[#003822]">
                            <span class="material-symbols-rounded text-[16px]">verified</span>
                            <span class="text-[13px] font-bold">Premium</span>
                        </button>
                        <button
                            class="flex shrink-0 items-center justify-center gap-1.5 rounded-[16px] bg-white border border-gray-200 px-5 py-2.5 shadow-sm hover:border-[#14d0a1] transition-colors active:scale-95 group">
                            <span class="material-symbols-rounded text-[16px] text-green-500">ev_station</span>
                            <span class="text-[13px] font-bold text-gray-600 group-hover:text-[#14d0a1]">EV
                                Charger</span>
                        </button>
                    </div>
                </div>

                <!-- Spacer Line -->
                <div class="w-full h-px bg-gray-100 my-1"></div>

                <!-- Vehicles / Categories -->
                <div class="flex flex-col gap-2">
                    <div class="flex justify-between items-center px-1">
                        <h2 class="text-[14px] font-bold text-[#001736]">Vehicle Type</h2>
                    </div>

                    <div class="flex gap-3 overflow-x-auto hide-scrollbar pb-2 px-1 -mx-1">
                        <!-- Car (Active) -->
                        <button class="flex-shrink-0 relative group outline-none">
                            <div
                                class="w-[88px] h-[88px] bg-[#001736] rounded-[24px] p-2 flex flex-col justify-between items-start shadow-md transition-transform active:scale-95 border-[1.5px] border-[#001736]">
                                <img src="https://img.icons8.com/fluency/94/car.png"
                                    class="w-10 h-10 object-contain self-center filter brightness-110 drop-shadow-md"
                                    alt="Car">
                                <span class="text-white font-bold text-[13px] ml-1.5 mb-0.5 tracking-wide">Car</span>
                            </div>
                        </button>

                        <!-- Bike -->
                        <button class="flex-shrink-0 relative group outline-none">
                            <div
                                class="w-[88px] h-[88px] bg-white rounded-[24px] p-2 flex flex-col justify-between items-start shadow-sm border-[1.5px] border-gray-100 transition-transform active:scale-95 hover:border-[#14d0a1]">
                                <img src="https://img.icons8.com/fluency/94/motorcycle.png"
                                    class="w-10 h-10 object-contain self-center drop-shadow-sm transition-all"
                                    alt="Bike">
                                <span class="text-gray-500 font-bold text-[13px] ml-1.5 mb-0.5">Moto</span>
                            </div>
                        </button>

                        <!-- Truck -->
                        <button class="flex-shrink-0 relative group outline-none">
                            <div
                                class="w-[88px] h-[88px] bg-white rounded-[24px] p-2 flex flex-col justify-between items-start shadow-sm border-[1.5px] border-gray-100 transition-transform active:scale-95 hover:border-[#14d0a1]">
                                <img src="https://img.icons8.com/fluency/94/truck.png"
                                    class="w-10 h-10 object-contain self-center drop-shadow-sm transition-all"
                                    alt="Truck">
                                <span class="text-gray-500 font-bold text-[13px] ml-1.5 mb-0.5">Truck</span>
                            </div>
                        </button>

                        <!-- Bus -->
                        <button class="flex-shrink-0 relative group outline-none">
                            <div
                                class="w-[88px] h-[88px] bg-white rounded-[24px] p-2 flex flex-col justify-between items-start shadow-sm border-[1.5px] border-gray-100 transition-transform active:scale-95 hover:border-[#14d0a1]">
                                <img src="https://img.icons8.com/fluency/94/bus.png"
                                    class="w-10 h-10 object-contain self-center drop-shadow-sm transition-all"
                                    alt="Bus">
                                <span class="text-gray-500 font-bold text-[13px] ml-1.5 mb-0.5">Bus</span>
                            </div>
                        </button>
                    </div>
                </div>
            </div>

            <div class="flex-1"></div>

            <!-- Floating Controls (e.g., precise location) -->
            <div class="flex flex-col items-end px-5 mb-[100px] gap-3 pointer-events-auto">
                <button
                    class="w-[52px] h-[52px] bg-white rounded-[20px] shadow-[0_8px_24px_rgba(0,0,0,0.12)] border border-gray-100 flex items-center justify-center text-[#14d0a1] hover:bg-gray-50 transition-colors active:scale-95">
                    <span class="material-symbols-rounded">my_location</span>
                </button>
            </div>
        </div>

        <!-- Floating Bottom Navigation -->
        <div
            class="fixed bottom-6 left-2 right-2 z-[100] flex justify-center pointer-events-none w-full max-w-[calc(100%-16px)] mx-auto">
            <nav
                class="bg-[#f0f9f6]/95 backdrop-blur-2xl border border-white/50 shadow-[0_4px_20px_rgba(0,0,0,0.06)] rounded-[32px] px-3 py-4 flex items-center justify-between w-full pointer-events-auto h-[72px]">

                <a href="home.html" class="flex flex-col items-center justify-center text-[#21d0a1] relative w-14">
                    <span class="material-symbols-rounded text-[28px]">home</span>
                    <span class="text-[11px] mt-1 font-bold">Home</span>
                </a>

                <a href="charging.html"
                    class="flex flex-col items-center justify-center text-[#6e7b8a] hover:text-[#21d0a1] transition-colors w-14 group">
                    <span class="material-symbols-rounded text-[28px]">ev_station</span>
                    <span class="text-[11px] mt-1 font-medium group-hover:font-bold">Charging</span>
                </a>

                <a href="history.html"
                    class="flex flex-col items-center justify-center text-[#6e7b8a] hover:text-[#21d0a1] transition-colors w-14 group">
                    <span class="material-symbols-rounded text-[28px]">schedule</span>
                    <span class="text-[11px] mt-1 font-medium group-hover:font-bold">Bookings</span>
                </a>

                <a href="vehicles.html"
                    class="flex flex-col items-center justify-center text-[#6e7b8a] hover:text-[#21d0a1] transition-colors w-14 group">
                    <span class="material-symbols-rounded text-[28px]">directions_car</span>
                    <span class="text-[11px] mt-1 font-medium group-hover:font-bold">Vehicles</span>
                </a>

                <a href="profile.html"
                    class="flex flex-col items-center justify-center text-[#6e7b8a] hover:text-[#21d0a1] transition-colors w-14 group">
                    <span class="material-symbols-rounded text-[28px]">person</span>
                    <span class="text-[11px] mt-1 font-medium group-hover:font-bold">Profile</span>
                </a>

            </nav>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const splashScreen = document.getElementById('splash-screen');
            setTimeout(() => {
                if (splashScreen) {
                    splashScreen.style.opacity = '0';
                    splashScreen.style.transition = 'opacity 0.5s ease-out';
                    setTimeout(() => splashScreen.remove(), 500);
                }
            }, 3000); // reduced from 4000
        });
    </script>
</body>

</html>
