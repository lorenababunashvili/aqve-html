<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AQUE - My Vehicles</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: "#14d0a1", background: "#f8f9fb" },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body class="bg-background text-gray-900 font-sans min-h-[100dvh] flex flex-col relative pb-32">

    <!-- Header -->
    <header
        class="px-5 pt-10 pb-4 flex items-center justify-between z-20 sticky top-0 bg-background/90 backdrop-blur-md">
        <div class="flex items-center gap-3">
            <a href="profile.html"
                class="p-1 text-[#001736] hover:bg-gray-100 rounded-full transition-colors flex items-center justify-center">
                <span class="material-symbols-rounded text-[20px]">arrow_back</span>
            </a>
            <h1 class="text-[19px] font-extrabold text-[#001736] tracking-tight">My Vehicles</h1>
        </div>
        <!-- Notification Icon -->
        <button
            class="w-10 h-10 bg-white rounded-full flex items-center justify-center text-gray-400 shadow-sm border border-gray-100 hover:text-gray-800 transition-colors">
            <span class="material-symbols-rounded text-[20px]">notifications</span>
        </button>
    </header>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto hide-scrollbar px-5 pt-2 flex flex-col gap-6">

        <!-- Add Vehicle Button -->
        <a href="add-vehicle.html"
            class="w-full border border-dashed border-[#14d0a1]/60 hover:bg-[#14d0a1]/5 transition-colors rounded-[16px] py-3.5 flex items-center justify-center gap-2 shadow-sm">
            <span class="material-symbols-rounded text-[18px] text-[#14d0a1]">add</span>
            <span class="text-[14px] font-bold text-[#14d0a1]">Add Vehicle</span>
        </a>

        <!-- My Vehicles Section -->
        <div class="flex flex-col gap-4">
            <h2 class="text-[12px] font-bold text-gray-500 mb-1 ml-1 tracking-[0.05em] uppercase">Active</h2>

            <!-- Vehicle 1 (Main) -->
            <div
                class="bg-gradient-to-br from-[#eaf6fd] to-white rounded-[24px] shadow-[0_4px_20px_rgba(0,0,0,0.03)] border border-white flex flex-col relative group cursor-pointer hover:shadow-[0_8px_30px_rgba(0,0,0,0.06)] transition-all overflow-hidden min-h-[160px]">

                <!-- Details Container -->
                <div class="p-5 flex flex-col justify-between h-full z-10 w-[65%] gap-6">
                    <div class="flex items-start gap-3">
                        <div
                            class="w-10 h-10 bg-black rounded-[12px] flex items-center justify-center shrink-0 shadow-sm border border-gray-100">
                            <!-- Placeholder Toyota Logo -->
                            <img src="https://upload.wikimedia.org/wikipedia/commons/e/e8/Toyota_logo_%282019%29.png"
                                alt="Toyota Logo" class="w-6 h-6 object-contain filter invert">
                        </div>
                        <div class="flex flex-col">
                            <h3 class="font-extrabold text-[16px] text-[#001736] leading-tight">Toyota Prius</h3>
                            <span class="text-[12px] text-gray-500 font-medium mt-0.5">Sedan • Hybrid</span>
                        </div>
                    </div>

                    <div class="flex flex-col gap-1 border-t border-gray-100/50 pt-3 relative">
                        <div class="absolute -top-[1px] left-0 w-[65%] border-t border-dashed border-gray-200">
                        </div>
                        <span class="text-[10px] font-bold text-gray-400 tracking-wider uppercase">License Plate</span>
                        <span
                            class="text-[15px] font-bold text-[#001736] tracking-[0.08em] mt-0.5 font-mono">BB-777-BB</span>
                    </div>
                </div>

                <!-- Right Side Badge & Image -->
                <div class="absolute top-0 right-0 h-full w-[45%] flex flex-col justify-between items-end">
                    <div
                        class="bg-[#def7ef] text-[#14d0a1] px-2 py-1 rounded-md text-[10px] font-extrabold uppercase tracking-wide mt-4 mr-4 z-20">
                        MAIN
                    </div>
                    <!-- Car Image -->
                    <div class="absolute bottom-0 right-0 h-[70%] w-[90%] flex items-end">
                        <img src="https://images.unsplash.com/photo-1549317661-bd32c8ce0db2?q=80&w=400&auto=format&fit=crop"
                            class="w-full h-full object-contain object-right-bottom transform translate-y-2 pr-2"
                            alt="Red Sedan Car">
                    </div>
                </div>
            </div>

            <!-- Vehicle 2 -->
            <div
                class="bg-white rounded-[24px] shadow-[0_4px_20px_rgba(0,0,0,0.03)] border border-gray-100 flex flex-col relative group cursor-pointer hover:shadow-[0_8px_30px_rgba(0,0,0,0.06)] transition-all overflow-hidden min-h-[160px]">

                <!-- Details Container -->
                <div class="p-5 flex flex-col justify-between h-full z-10 w-[65%] gap-6">
                    <div class="flex items-start gap-3">
                        <div
                            class="w-10 h-10 bg-black rounded-[12px] flex items-center justify-center shrink-0 shadow-sm border border-gray-100">
                            <!-- Placeholder BMW Logo -->
                            <img src="https://upload.wikimedia.org/wikipedia/commons/4/44/BMW.svg" alt="BMW Logo"
                                class="w-6 h-6 object-contain">
                        </div>
                        <div class="flex flex-col">
                            <h3 class="font-extrabold text-[16px] text-[#001736] leading-tight">BMW X5</h3>
                            <span class="text-[12px] text-gray-500 font-medium mt-0.5">SUV • Diesel</span>
                        </div>
                    </div>

                    <div class="flex flex-col gap-1 border-t border-gray-100/50 pt-3 relative">
                        <div class="absolute -top-[1px] left-0 w-[65%] border-t border-dashed border-gray-200">
                        </div>
                        <span class="text-[10px] font-bold text-gray-400 tracking-wider uppercase">License Plate</span>
                        <span
                            class="text-[15px] font-bold text-[#001736] tracking-[0.08em] mt-0.5 font-mono">GG-123-WP</span>
                    </div>
                </div>

                <!-- Right Side Image -->
                <div class="absolute bottom-0 right-0 h-[70%] w-[50%] flex items-end pointer-events-none">
                    <img src="https://images.unsplash.com/photo-1555215695-3004980ad54e?q=80&w=400&auto=format&fit=crop"
                        class="absolute right-0 bottom-2 max-h-[80%] max-w-[110%] object-contain object-right-bottom transform translate-x-2"
                        alt="BMW SUV">
                </div>
            </div>

            <!-- Vehicle 3 (Tesla) -->
            <div
                class="bg-white rounded-[24px] shadow-[0_4px_20px_rgba(0,0,0,0.03)] border border-gray-100 flex flex-col relative group cursor-pointer hover:shadow-[0_8px_30px_rgba(0,0,0,0.06)] transition-all overflow-hidden min-h-[160px]">

                <!-- Details Container -->
                <div class="p-5 flex flex-col justify-between h-full z-10 w-full gap-6">
                    <div class="flex items-start gap-3">
                        <div
                            class="w-10 h-10 bg-gray-50 rounded-[12px] flex items-center justify-center shrink-0 border border-gray-100/50 text-gray-300 font-bold text-[18px]">
                            T
                        </div>
                        <div class="flex flex-col">
                            <h3 class="font-extrabold text-[16px] text-gray-600 leading-tight">Tesla Model 3</h3>
                            <span class="text-[12px] text-gray-400 font-medium mt-0.5">Electric • Performance</span>
                        </div>
                    </div>

                    <div class="flex justify-between items-end border-t border-gray-100/50 pt-3 relative w-[60%]">
                        <div class="absolute -top-[1px] left-0 w-full border-t border-dashed border-gray-200"></div>
                        <div class="flex flex-col gap-1">
                            <span class="text-[10px] font-bold text-gray-400 tracking-wider uppercase">License
                                Plate</span>
                            <span
                                class="text-[15px] font-bold text-gray-500 tracking-[0.08em] mt-0.5 font-mono">EL-999-EV</span>
                        </div>
                        <div class="text-gray-400 hover:text-gray-900 transition-colors cursor-pointer p-1">
                            <span class="material-symbols-rounded text-[20px]">more_horiz</span>
                        </div>
                    </div>
                </div>

                <!-- Right Side Image (Tesla Placeholder) -->
                <div class="absolute bottom-0 right-0 h-[70%] w-[50%] flex items-end pointer-events-none">
                    <img src="https://images.unsplash.com/photo-1560958089-b8a1929cea89?q=80&w=400&auto=format&fit=crop"
                        class="absolute right-0 bottom-2 max-h-[80%] max-w-[110%] object-contain object-right-bottom transform translate-x-2"
                        alt="White Tesla Model 3">
                </div>
            </div>

        </div>

    </main>
</body>

</html>
