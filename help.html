<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AQUE - Help & Support</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: "#14d0a1", background: "#f8f9fb" },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body class="bg-background text-gray-900 font-sans min-h-[100dvh] flex flex-col relative pb-32">

    <!-- Header -->
    <header
        class="px-5 pt-10 pb-4 flex items-center justify-between z-20 sticky top-0 bg-background/90 backdrop-blur-md">
        <div class="flex items-center gap-3">
            <a href="profile.html"
                class="p-1 text-[#001736] hover:bg-gray-100 rounded-full transition-colors flex items-center justify-center">
                <span class="material-symbols-rounded text-[20px]">arrow_back</span>
            </a>
            <h1 class="text-[19px] font-extrabold text-[#001736] tracking-tight">Help & Support</h1>
        </div>
        <div class="w-8"></div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto hide-scrollbar px-5 pt-2 flex flex-col gap-6">

        <!-- Search Bar -->
        <div class="relative w-full">
            <div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-gray-400">
                <span class="material-symbols-rounded text-[20px]">search</span>
            </div>
            <input type="text" placeholder="How can we help?"
                class="w-full bg-white border border-gray-100 rounded-[20px] pl-12 pr-4 py-4 text-[#001736] shadow-sm font-bold text-[14px] outline-none placeholder-gray-400 focus:ring-2 focus:ring-[#14d0a1]/20">
        </div>

        <!-- FAQ Section -->
        <div class="flex flex-col gap-3">
            <h2 class="text-[12px] font-bold text-gray-500 mb-1 ml-1 tracking-wide uppercase">Frequently Asked Questions
            </h2>

            <!-- FAQ Items -->
            <div class="bg-white rounded-[24px] shadow-sm border border-gray-100 flex flex-col overflow-hidden">

                <a href="#"
                    class="p-4 flex items-center justify-between hover:bg-gray-50 transition-colors border-b border-gray-100 last:border-0 relative">
                    <span class="font-extrabold text-[14px] text-[#001736]">How to add a card?</span>
                    <span class="material-symbols-rounded text-gray-400 text-[20px]">add_circle</span>
                </a>

                <a href="#"
                    class="p-4 flex items-center justify-between hover:bg-gray-50 transition-colors border-b border-gray-100 last:border-0 relative">
                    <span class="font-extrabold text-[14px] text-[#001736]">How to change password?</span>
                    <span class="material-symbols-rounded text-gray-400 text-[20px]">add_circle</span>
                </a>

                <a href="#"
                    class="p-4 flex items-center justify-between hover:bg-gray-50 transition-colors border-b border-gray-100 last:border-0 relative">
                    <span class="font-extrabold text-[14px] text-[#001736]">Refund Policy</span>
                    <span class="material-symbols-rounded text-gray-400 text-[20px]">description</span>
                </a>

            </div>
        </div>

        <!-- Contact Us Section -->
        <div class="flex flex-col gap-3 mt-2">
            <h2 class="text-[12px] font-bold text-gray-500 mb-1 ml-1 tracking-wide uppercase">Contact Us</h2>

            <!-- 2-Column Contact Options -->
            <div class="grid grid-cols-2 gap-3">

                <!-- Chat -->
                <a href="#"
                    class="bg-white p-5 rounded-[24px] shadow-sm border border-gray-100 flex flex-col items-center justify-center gap-3 hover:bg-gray-50 transition-colors">
                    <div
                        class="w-12 h-12 bg-[#e6f4fb] text-[#2ba1e3] rounded-full flex items-center justify-center mb-1">
                        <span class="material-symbols-rounded text-[22px]">forum</span>
                    </div>
                    <span class="font-extrabold text-[#001736] text-[14px]">Chat</span>
                </a>

                <!-- Call -->
                <a href="#"
                    class="bg-white p-5 rounded-[24px] shadow-sm border border-gray-100 flex flex-col items-center justify-center gap-3 hover:bg-gray-50 transition-colors">
                    <div
                        class="w-12 h-12 bg-[#eafce4] text-[#4ea826] rounded-full flex items-center justify-center mb-1">
                        <span class="material-symbols-rounded text-[22px]">call</span>
                    </div>
                    <span class="font-extrabold text-[#001736] text-[14px]">Call</span>
                </a>

            </div>

            <!-- Full Width Email -->
            <a href="mailto:support@aque.ge"
                class="bg-white p-6 rounded-[24px] shadow-sm border border-gray-100 flex flex-col items-center justify-center gap-2 hover:bg-gray-50 transition-colors w-full mt-1">
                <div class="w-12 h-12 bg-[#fff1e5] text-[#f89547] rounded-full flex items-center justify-center mb-1">
                    <span class="material-symbols-rounded text-[22px]">mail</span>
                </div>
                <div class="flex flex-col items-center">
                    <span class="font-extrabold text-[#001736] text-[14px]">Email</span>
                    <span class="text-gray-400 text-[12px] font-medium tracking-wide">support@aque.ge</span>
                </div>
            </a>

        </div>

    </main>

</body>

</html>
