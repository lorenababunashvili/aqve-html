<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AQUE - Payment Methods</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: "#14d0a1", background: "#f8f9fb" },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body class="bg-background text-gray-900 font-sans min-h-[100dvh] flex flex-col relative pb-32">

    <!-- Header -->
    <header
        class="px-5 pt-10 pb-4 flex items-center justify-between z-20 sticky top-0 bg-background/90 backdrop-blur-md">
        <div class="flex items-center gap-3">
            <a href="profile.html"
                class="p-1 text-[#001736] hover:bg-gray-100 rounded-full transition-colors flex items-center justify-center">
                <span class="material-symbols-rounded text-xl">arrow_back</span>
            </a>
            <h1 class="text-[19px] font-extrabold text-[#001736] tracking-tight">Payment Methods</h1>
        </div>
        <div class="w-8"></div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto hide-scrollbar px-5 pt-2 flex flex-col gap-6">

        <!-- Add Card Button -->
        <a href="#"
            class="w-full bg-[#f0f9f6] border border-dashed border-[#14d0a1] hover:bg-[#e6f5f0] transition-colors rounded-[24px] py-4 flex items-center justify-center gap-3 shadow-sm">
            <div class="w-8 h-8 rounded-full bg-[#14d0a1]/20 text-[#14d0a1] flex items-center justify-center">
                <span class="material-symbols-rounded text-[18px]">add_card</span>
            </div>
            <span class="text-[15px] font-extrabold text-[#14d0a1]">Add New Card</span>
        </a>

        <!-- My Cards Section -->
        <div class="flex flex-col gap-3">
            <h2 class="text-[13px] font-bold text-gray-400 mb-1 ml-1 tracking-wide">My Cards</h2>

            <!-- Card 1 (Visa - Main) -->
            <div
                class="bg-white p-5 rounded-[24px] shadow-sm border border-gray-100 flex flex-col gap-6 relative group cursor-pointer hover:border-gray-200 transition-colors">

                <div class="flex justify-between items-start">
                    <div class="flex items-center gap-4">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/5/5e/Visa_Inc._logo.svg"
                            class="h-4 object-contain" alt="Visa">
                        <div class="flex flex-col">
                            <h3 class="font-extrabold text-[16px] text-[#001736] leading-tight">TBC Bank</h3>
                            <span class="text-[13px] text-gray-500 font-medium">Visa Classic</span>
                        </div>
                    </div>
                    <div class="flex flex-col items-end gap-2">
                        <div
                            class="bg-[#e6f9f4] text-[#14d0a1] px-2.5 py-1 rounded-md text-[11px] font-extrabold uppercase tracking-wide">
                            Main
                        </div>
                    </div>
                </div>

                <div class="flex justify-between items-end">
                    <div class="flex flex-col gap-1">
                        <span class="text-[11px] font-bold text-gray-400 tracking-wide uppercase">Card Number</span>
                        <div class="flex items-center gap-2">
                            <span class="text-[16px] font-mono text-[#001736] font-bold tracking-widest mt-1">••••
                                4242</span>
                        </div>
                    </div>
                    <span class="text-[14px] font-semibold text-gray-500">09/28</span>
                </div>

                <div class="absolute top-4 right-4 text-gray-400 hover:text-gray-900 transition-colors">
                    <span class="material-symbols-rounded text-[20px]">more_vert</span>
                </div>

            </div>

            <!-- Card 2 (Mastercard) -->
            <div
                class="bg-white p-5 rounded-[24px] shadow-sm border border-gray-100 flex flex-col gap-6 relative group cursor-pointer hover:border-gray-200 transition-colors">

                <div class="flex justify-between items-start">
                    <div class="flex items-center gap-4">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/2/2a/Mastercard-logo.svg"
                            class="h-6 object-contain" alt="Mastercard">
                        <div class="flex flex-col">
                            <h3 class="font-extrabold text-[16px] text-[#001736] leading-tight">Bank of Georgia</h3>
                            <span class="text-[13px] text-gray-500 font-medium">Mastercard Gold</span>
                        </div>
                    </div>
                </div>

                <div class="flex justify-between items-end">
                    <div class="flex flex-col gap-1">
                        <span class="text-[11px] font-bold text-gray-400 tracking-wide uppercase">Card Number</span>
                        <div class="flex items-center gap-2">
                            <span class="text-[16px] font-mono text-[#001736] font-bold tracking-widest mt-1">••••
                                9889</span>
                        </div>
                    </div>
                    <span class="text-[14px] font-semibold text-gray-500">12/26</span>
                </div>

                <div class="absolute top-4 right-4 text-gray-400 hover:text-gray-900 transition-colors">
                    <span class="material-symbols-rounded text-[20px]">more_vert</span>
                </div>

            </div>

        </div>

    </main>

</body>

</html>
