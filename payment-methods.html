<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AQUE - Payment Methods</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0"
        rel="stylesheet" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: "#14d0a1", background: "#f8f9fb" },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body class="bg-background text-gray-900 font-sans min-h-[100dvh] flex flex-col relative pb-10">

    <!-- Header -->
    <header
        class="px-5 pt-10 pb-4 flex items-center justify-between z-20 sticky top-0 bg-background/90 backdrop-blur-md">
        <div class="flex items-center gap-3">
            <button onclick="history.back()" class="p-1 text-[#001736]">
                <span class="material-symbols-rounded text-2xl">arrow_back</span>
            </button>
            <h1 class="text-[22px] font-extrabold text-[#001736]">Payment Methods</h1>
        </div>
        <div class="w-10"></div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto hide-scrollbar px-5 pt-2 pb-10">

        <!-- Add New Card Button -->
        <a href="add-card.html"
            class="w-full bg-white p-4 rounded-[20px] border-[1.5px] border-dashed border-[#14d0a1]/40 flex items-center justify-center gap-3 group hover:bg-[#14d0a1]/5 transition-all mb-8 shadow-sm">
            <div
                class="w-12 h-12 rounded-full bg-[#14d0a1]/10 flex items-center justify-center text-[#14d0a1] group-hover:scale-110 transition-transform">
                <span class="material-symbols-rounded text-[24px]">add_card</span>
            </div>
            <span class="font-bold text-[#14d0a1] text-[15px]">Add New Card</span>
        </a>

        <h2 class="text-[13px] font-bold text-gray-400 uppercase tracking-widest ml-1 mb-4">My Saved Cards</h2>

        <div class="flex flex-col gap-4">

            <!-- Visa Card (Main) -->
            <div
                class="bg-white p-5 rounded-[24px] shadow-sm border border-gray-100 relative overflow-hidden group hover:shadow-md transition-shadow cursor-default">
                <div
                    class="absolute -right-6 -top-6 w-32 h-32 bg-blue-500/10 rounded-full blur-[24px] group-hover:bg-blue-500/15 transition-colors">
                </div>

                <div class="flex justify-between items-start mb-6 relative z-10">
                    <div class="flex items-center gap-4">
                        <div
                            class="w-14 h-10 bg-[#f4f5f8] rounded-xl flex items-center justify-center p-1.5 border border-gray-200">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/5/5e/Visa_Inc._logo.svg"
                                class="h-full object-contain" alt="Visa">
                        </div>
                        <div class="flex flex-col">
                            <h3 class="font-bold text-[16px] text-[#001736]">TBC Bank</h3>
                            <p class="text-gray-400 text-[13px] font-semibold">Visa Classic</p>
                        </div>
                    </div>

                    <div class="flex items-center gap-2">
                        <span
                            class="bg-[#e4fff6] text-[#14d0a1] px-3 py-1 rounded-lg text-[11px] font-extrabold uppercase tracking-wide">
                            Primary
                        </span>
                        <button class="p-1.5 rounded-full hover:bg-gray-100 transition-colors text-gray-400">
                            <span class="material-symbols-rounded">more_vert</span>
                        </button>
                    </div>
                </div>

                <div class="flex items-end justify-between relative z-10">
                    <div class="flex flex-col gap-0.5">
                        <span class="text-[11px] text-gray-400 font-bold uppercase tracking-widest">Card Number</span>
                        <span class="font-mono text-[18px] font-bold tracking-widest text-[#001736]">•••• 4242</span>
                    </div>
                    <span class="text-[14px] font-extrabold text-gray-400 font-mono">09/28</span>
                </div>
            </div>

            <!-- Mastercard -->
            <div
                class="bg-white p-5 rounded-[24px] shadow-sm border border-gray-100 relative overflow-hidden group hover:shadow-md transition-shadow cursor-default">
                <div
                    class="absolute -right-6 -top-6 w-32 h-32 bg-orange-500/10 rounded-full blur-[24px] group-hover:bg-orange-500/15 transition-colors">
                </div>

                <div class="flex justify-between items-start mb-6 relative z-10">
                    <div class="flex items-center gap-4">
                        <div
                            class="w-14 h-10 bg-[#f4f5f8] rounded-xl flex items-center justify-center p-1 border border-gray-200">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/2/2a/Mastercard-logo.svg"
                                class="h-full object-contain" alt="Mastercard">
                        </div>
                        <div class="flex flex-col">
                            <h3 class="font-bold text-[16px] text-[#001736]">Bank of Georgia</h3>
                            <p class="text-gray-400 text-[13px] font-semibold">Mastercard Gold</p>
                        </div>
                    </div>

                    <button class="p-1.5 rounded-full hover:bg-gray-100 transition-colors text-gray-400">
                        <span class="material-symbols-rounded">more_vert</span>
                    </button>
                </div>

                <div class="flex items-end justify-between relative z-10">
                    <div class="flex flex-col gap-0.5">
                        <span class="text-[11px] text-gray-400 font-bold uppercase tracking-widest">Card Number</span>
                        <span class="font-mono text-[18px] font-bold tracking-widest text-[#001736]">•••• 9889</span>
                    </div>
                    <span class="text-[14px] font-extrabold text-gray-400 font-mono">12/26</span>
                </div>
            </div>

        </div>
    </main>

</body>

</html>
