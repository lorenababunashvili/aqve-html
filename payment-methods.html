<!DOCTYPE html>
<html class="light" lang="ka">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>აქვე - გადახდის მეთოდები</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <link href="https://cdn.web-fonts.ge/fonts/bpg-phone-sans/css/bpg-phone-sans.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#009485",
                        "primary-bright": "#00C2AF",
                        "background-light": "#f8fafc",
                        "background-dark": "#0f2321",
                        "surface": "#ffffff",
                    },
                    fontFamily: {
                        "display": ["BPG Phone Sans", "sans-serif"],
                        "sans": ["BPG Phone Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "2xl": "1rem",
                        "3xl": "1.5rem",
                    },
                    boxShadow: {
                        "soft": "0 10px 40px -10px rgba(0,0,0,0.05)",
                    }
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'BPG Phone Sans', sans-serif;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>

<body class="bg-gray-50 dark:bg-background-dark text-gray-900 dark:text-white min-h-screen flex flex-col">

    <!-- Header -->
    <div
        class="px-6 pt-12 pb-6 flex items-center justify-between z-10 sticky top-0 bg-gray-50/80 dark:bg-background-dark/80 backdrop-blur-md">
        <div class="flex items-center gap-4">
            <button onclick="history.back()"
                class="p-3 bg-white dark:bg-white/10 rounded-full shadow-sm hover:bg-gray-50 transition-colors">
                <span class="material-symbols-rounded text-gray-600 dark:text-gray-200">arrow_back</span>
            </button>
            <h1 class="text-xl font-bold text-gray-800 dark:text-white">გადახდის მეთოდები</h1>
        </div>
        <div class="w-10"></div> <!-- Spacer -->
    </div>

    <!-- Scrollable Content -->
    <div class="flex-1 overflow-y-auto no-scrollbar pb-32 px-6">

        <!-- Add New Card Button -->
        <a href="add-card.html"
            class="w-full bg-white dark:bg-white/5 p-4 rounded-3xl border-2 border-dashed border-primary/30 flex items-center justify-center gap-3 group hover:bg-primary/5 transition-all mb-6">
            <div
                class="w-12 h-12 rounded-full bg-primary/10 flex items-center justify-center text-primary group-hover:scale-110 transition-transform">
                <span class="material-symbols-rounded text-[24px]">add_card</span>
            </div>
            <span class="font-bold text-primary">ახალი ბარათის დამატება</span>
        </a>

        <h2 class="text-sm font-bold text-gray-400 uppercase tracking-wider ml-2 mb-4">ჩემი ბარათები</h2>

        <div class="flex flex-col gap-4">
            <!-- Visa Card (Main) -->
            <div
                class="bg-white dark:bg-white/5 p-5 rounded-[2rem] shadow-sm border border-gray-100 dark:border-white/5 relative overflow-hidden group">

                <div
                    class="absolute -right-6 -top-6 w-32 h-32 bg-blue-500/10 rounded-full blur-2xl group-hover:bg-blue-500/20 transition-colors">
                </div>

                <div class="flex justify-between items-start mb-6 relative z-10">
                    <div class="flex items-center gap-4">
                        <div
                            class="w-14 h-10 bg-white/80 dark:bg-white/10 rounded-lg flex items-center justify-center p-1">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/5/5e/Visa_Inc._logo.svg"
                                class="h-full object-contain" alt="Visa">
                        </div>
                        <div>
                            <h3 class="font-bold text-lg">TBC Bank</h3>
                            <p class="text-gray-400 text-sm">Visa Classic</p>
                        </div>
                    </div>

                    <div class="flex items-center gap-2">
                        <span class="bg-primary/10 text-primary px-3 py-1 rounded-full text-xs font-bold">
                            მთავარი
                        </span>
                        <button
                            class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-white/10 transition-colors text-gray-400">
                            <span class="material-symbols-rounded">more_vert</span>
                        </button>
                    </div>
                </div>

                <div class="flex items-end justify-between relative z-10">
                    <div class="flex flex-col gap-1">
                        <span class="text-xs text-gray-400 font-medium">ბარათის ნომერი</span>
                        <span class="font-mono text-xl font-bold tracking-wider text-gray-600 dark:text-gray-300">••••
                            4242</span>
                    </div>
                    <span class="text-sm font-bold text-gray-400">09/28</span>
                </div>
            </div>

            <!-- Mastercard -->
            <div
                class="bg-white dark:bg-white/5 p-5 rounded-[2rem] shadow-sm border border-gray-100 dark:border-white/5 relative overflow-hidden group">

                <div
                    class="absolute -right-6 -top-6 w-32 h-32 bg-orange-500/10 rounded-full blur-2xl group-hover:bg-orange-500/20 transition-colors">
                </div>

                <div class="flex justify-between items-start mb-6 relative z-10">
                    <div class="flex items-center gap-4">
                        <div
                            class="w-14 h-10 bg-white/80 dark:bg-white/10 rounded-lg flex items-center justify-center p-1">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/2/2a/Mastercard-logo.svg"
                                class="h-full object-contain" alt="Mastercard">
                        </div>
                        <div>
                            <h3 class="font-bold text-lg">Bank of Georgia</h3>
                            <p class="text-gray-400 text-sm">Mastercard Gold</p>
                        </div>
                    </div>

                    <button
                        class="p-2 rounded-full hover:bg-gray-100 dark:hover:bg-white/10 transition-colors text-gray-400">
                        <span class="material-symbols-rounded">more_vert</span>
                    </button>
                </div>

                <div class="flex items-end justify-between relative z-10">
                    <div class="flex flex-col gap-1">
                        <span class="text-xs text-gray-400 font-medium">ბარათის ნომერი</span>
                        <span class="font-mono text-xl font-bold tracking-wider text-gray-600 dark:text-gray-300">••••
                            9889</span>
                    </div>
                    <span class="text-sm font-bold text-gray-400">12/26</span>
                </div>
            </div>

        </div>
    </div>

</body>

</html>
